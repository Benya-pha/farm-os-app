            primary: '#10b981',
            'primary-dark': '#059669',

  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { 
      font-family: 'Prompt', sans-serif; 
      -webkit-tap-highlight-color: transparent; 
    }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .modal-enter { animation: modalFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    .area-chart-path { 
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
      stroke-dasharray: 2000;
      stroke-dashoffset: 0;
      animation: drawLine 1.5s ease-out forwards;
    }

    @keyframes drawLine {
      from { stroke-dashoffset: 2000; }
      to { stroke-dashoffset: 0; }
    }
    
    /* Glassmorphism Utilities */
    .glass-nav {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.05);
      border-top: 1px solid rgba(255,255,255,0.8);
    }
    .dark .glass-nav {
      background: rgba(15, 23, 42, 0.85); /* slate-900 */
      box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.4);
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .card-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.06); }
    .dark .card-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.3); }

    /* Farm Map Realistic Grid */
    .farm-pattern {
      background-color: #e0e7ff; 
      background-image: 
        linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .dark .farm-pattern {
      background-color: #1e1b4b; /* deep indigo */
      background-image: 
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #059669, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .dark .gradient-text {
      background: linear-gradient(135deg, #34d399, #6ee7b7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    input[type="range"] { accent-color: #10b981; }
    input[type="range"]:disabled { accent-color: #9ca3af; cursor: not-allowed; }
  </style>

</head>

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      apiKey: "AIzaSyDs8yRihR4Vz123JRjEA6SWcF-pw77c-qU",
      authDomain: "m4kul-1.firebaseapp.com",
      projectId: "m4kul-1",
      storageBucket: "m4kul-1.firebasestorage.app",
      messagingSenderId: "973526589558",
      appId: "1:973526589558:web:01a944e291077e240bff57"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'farm-os-app';
    
    // Logo Component
    const AppLogo = ({ className }) => (
      <img 
        src="LOGO (2).png" 
        alt="Farm OS Logo" 
        className={`${className} object-contain filter dark:brightness-110`} 
        onError={(e) => {
          e.target.onerror = null;
          e.target.src = "https://lh3.googleusercontent.com/d/1Idx_06TR21D44uHQjWC1arrQM0hD4LZ8"; 
        }}
      />
    );

    // --- Main App Component ---
    function App() {
      const [currentScreen, setCurrentScreen] = useState('splash');
      const [authStatus, setAuthStatus] = useState('checking');
      
      const [lang, setLang] = useState('th');
      const [isDarkMode, setIsDarkMode] = useState(false);
      const t = i18n[lang];

      // Multi-Account System State
      const [savedAccounts, setSavedAccounts] = useState(() => {
        const saved = localStorage.getItem('farmos_accounts');
        return saved ? JSON.parse(saved) : [];
      });

      useEffect(() => {
        localStorage.setItem('farmos_accounts', JSON.stringify(savedAccounts));
      }, [savedAccounts]);

      useEffect(() => {
        if (isDarkMode) { document.documentElement.classList.add('dark'); } 
        else { document.documentElement.classList.remove('dark'); }
      }, [isDarkMode]);

      const [userData, setUserData] = useState({ 
        id: null, isGoogleAuth: false, name: '', email: '', farmName: '', phone: '', role: 'Owner', 
        avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Farmer&backgroundColor=e2e8f0' 
      });
      
      const [robots, setRobots] = useState([
        { id: 1, name: 'FarmBot-Alpha', ip: '192.168.1.101', status: 'Active', battery: 85, image: 'https://api.dicebear.com/7.x/bottts/svg?seed=Alpha&backgroundColor=dcfce7' },
        { id: 2, name: 'FarmBot-Beta', ip: '192.168.1.102', status: 'Active', battery: 100, image: 'https://api.dicebear.com/7.x/bottts/svg?seed=Beta&backgroundColor=e0e7ff' },
      ]);

      const [plantZones, setPlantZones] = useState([
        { id: 'A', name: 'สลัด (Salad)', moisture: 45, health: 95, icon: '🥬', top: '15%', left: '15%', color: 'from-green-400 to-green-300' },
        { id: 'B', name: 'มะเขือเทศ (Tomato)', moisture: 30, health: 65, icon: '🍅', top: '15%', left: '60%', color: 'from-red-400 to-red-300' },
        { id: 'C', name: 'เมลอน (Melon)', moisture: 38, health: 82, icon: '🍈', top: '55%', left: '15%', color: 'from-yellow-400 to-orange-300' },
        { id: 'D', name: 'สตรอว์เบอร์รี (Strawberry)', moisture: 52, health: 88, icon: '🍓', top: '55%', left: '60%', color: 'from-pink-400 to-rose-300' },
      ]);

      const [soilStats, setSoilStats] = useState({ N: 65, P: 40, K: 55, moisture: 45 });
      
      const [alerts] = useState([
        { id: 1, type: 'critical', title: 'พบเชื้อราในมะเขือเทศ (Fungus Detected)', zone: 'Zone B', time: '10 min ago', detail: 'AI ตรวจพบความผิดปกติบนใบ 94%' },
        { id: 2, type: 'warning', title: 'ดินโซน B แห้งเกินไป (Soil Dry)', zone: 'Zone B', time: '1 hr ago', detail: 'ความชื้นลดลงเหลือ 30%' },
        { id: 3, type: 'info', title: 'หุ่นยนต์เชื่อมต่อสำเร็จ (Bot Connected)', zone: 'System', time: '2 hrs ago', detail: 'FarmBot-Beta ออนไลน์' },
      ]);

      // Load Robots uniquely for each Account
      useEffect(() => {
        if (userData.role !== 'guest' && userData.id) {
          if (userData.isGoogleAuth && auth.currentUser) {
            // Load from Firebase
            const userId = auth.currentUser.uid;
            const robotsRef = db.collection('artifacts').doc(appId).collection('users').doc(userId).collection('robots');
            const unsubscribe = robotsRef.onSnapshot(snapshot => {
              if (!snapshot.empty) {
                const loadedRobots = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.data().id || doc.id }));
                setRobots(loadedRobots);
              } else {
                robots.forEach(bot => robotsRef.doc(bot.id.toString()).set(bot));
              }
            }, (error) => console.error("Error loading robots:", error));
            return () => unsubscribe();
          } else {
            // Load from LocalStorage for local random profiles
            const localRobots = localStorage.getItem('farmos_robots_' + userData.id);
            if (localRobots) {
              setRobots(JSON.parse(localRobots));
            } else {
              localStorage.setItem('farmos_robots_' + userData.id, JSON.stringify(robots));
            }
          }
        }
      }, [userData.id, userData.role, userData.isGoogleAuth]);

      const navigate = (screen) => setCurrentScreen(screen);

      const handleLogout = () => {
        if (userData.isGoogleAuth && auth.currentUser) { auth.signOut().catch(()=>{}); }
        setUserData({ id: null, isGoogleAuth: false, name: '', email: '', farmName: '', phone: '', role: 'Owner', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Farmer&backgroundColor=e2e8f0' });
        navigate('login');
      };

      const sharedProps = { t, lang, setLang, isDarkMode, setIsDarkMode, savedAccounts, setSavedAccounts };

      return (
        <div className="min-h-screen font-sans">
          {currentScreen === 'splash' && <SplashScreen onFinish={() => navigate('login')} t={t} />}
          {currentScreen === 'login' && <LoginScreen 
            onRegister={() => navigate('register')} 
            onLoginDirect={() => navigate('dashboard')}
            onGuest={() => {
              setUserData({...userData, id: 'guest_'+Date.now(), name: lang==='th'?'ผู้เยี่ยมชม':'Guest User', farmName: 'Demo Farm', role: 'guest', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Guest&backgroundColor=f3f4f6'});
              navigate('dashboard');
            }} 
            setUserData={setUserData} userData={userData} {...sharedProps} 
          />}
          {currentScreen === 'register' && <RegisterScreen userData={userData} setUserData={setUserData} onNext={() => navigate('robot_setup')} {...sharedProps} />}
          {currentScreen === 'robot_setup' && <RobotSetup userData={userData} robots={robots} setRobots={setRobots} onNext={() => navigate('dashboard')} {...sharedProps} />}
          {currentScreen === 'dashboard' && (
            <FarmOS 
              userData={userData} setUserData={setUserData}
              robots={robots} setRobots={setRobots}
              plantZones={plantZones} setPlantZones={setPlantZones}
              soilStats={soilStats} setSoilStats={setSoilStats}
              alerts={alerts}
              onLogout={handleLogout} 
              setCurrentScreen={setCurrentScreen}
              {...sharedProps}
            />
          )}
        </div>
      );
    }

    // --- Shared Top Controls (Theme & Lang) ---
    const TopControls = ({ lang, setLang, isDarkMode, setIsDarkMode }) => (
       <div className="absolute top-4 right-4 z-[100] flex items-center gap-2">
         <button onClick={() => setLang(lang === 'th' ? 'en' : 'th')} className="px-3 py-1.5 bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-full text-xs font-bold text-emerald-600 dark:text-emerald-400 border border-gray-200 dark:border-slate-700 shadow-sm hover:scale-105 transition-all">
            {lang === 'th' ? 'EN' : 'TH'}
         </button>
         <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-1.5 bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm rounded-full text-gray-600 dark:text-yellow-400 border border-gray-200 dark:border-slate-700 shadow-sm hover:scale-105 transition-all">
            {isDarkMode ? <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg> 
                        : <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>}
         </button>
       </div>
    );

    // --- Screens ---
    const SplashScreen = ({ onFinish, t }) => {
      useEffect(() => { const timer = setTimeout(onFinish, 2500); return () => clearTimeout(timer); }, [onFinish]);
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-white dark:bg-slate-950 relative overflow-hidden transition-colors duration-500">
          <div className="absolute inset-0 bg-gradient-to-br from-emerald-50 dark:from-emerald-900/20 to-white dark:to-slate-950 z-0"></div>
          <div className="z-10 flex flex-col items-center animate-in fade-in zoom-in duration-1000">
            <div className="relative mb-6">
              <div className="absolute inset-0 bg-emerald-400 dark:bg-emerald-600 blur-3xl opacity-20 animate-pulse"></div>
              <AppLogo className="w-40 h-40 drop-shadow-2xl relative z-10 hover:scale-105 transition-transform" />
            </div>
            <h1 className="text-5xl font-extrabold gradient-text tracking-tight mb-2">{t.app_name}</h1>
            <p className="text-emerald-600/70 dark:text-emerald-400/70 font-semibold text-sm uppercase tracking-[0.4em]">{t.smart_eco}</p>
          </div>
        </div>
      );
    };

    const LoginScreen = ({ onRegister, onLoginDirect, onGuest, setUserData, userData, savedAccounts, setSavedAccounts, t, lang, setLang, isDarkMode, setIsDarkMode }) => {
      const [isLoading, setIsLoading] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');

      const loginWithSaved = (acc) => {
        setUserData(acc);
        onLoginDirect();
      };

      const removeAccount = (id) => {
        setSavedAccounts(prev => prev.filter(acc => acc.id !== id));
      };

      const handleGoogleLogin = () => {
        setIsLoading(true); setErrorMsg('');
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider)
          .then((result) => {
            const newAcc = { 
              id: result.user.uid, isGoogleAuth: true, name: result.user.displayName, email: result.user.email, 
              avatar: result.user.photoURL, farmName: lang === 'th' ? `ฟาร์มของ ${result.user.displayName}` : `${result.user.displayName}'s Farm`, role: 'Owner' 
            };
            if (!savedAccounts.find(a => a.id === newAcc.id)) { setSavedAccounts(prev => [...prev, newAcc]); }
            setUserData(newAcc);
            setIsLoading(false); 
            // If new account, let them set up profile, else go direct
            savedAccounts.find(a => a.id === newAcc.id) ? onLoginDirect() : onRegister();
          })
          .catch((error) => {
            setIsLoading(false);
            if (error.code === 'auth/unauthorized-domain' || error.code === 'auth/operation-not-supported-in-this-environment') {
              setErrorMsg(t.demo_mode_msg);
              setTimeout(() => { createRandomProfile(); }, 2000);
            } else { setErrorMsg(error.message); }
          });
      };

      const createRandomProfile = () => {
        const namesTh = ['สมชาย', 'มานะ', 'สมหญิง', 'ลุงจอน', 'ลุงพล'];
        const farmsTh = ['ฟาร์มสุขใจ', 'ฟาร์มพอเพียง', 'ไร่ตะวัน', 'ฟาร์มรักษ์โลก'];
        const namesEn = ['John', 'Alice', 'Bob', 'Emma', 'David'];
        const farmsEn = ['Happy Farm', 'Sunrise Valley', 'Green Acres', 'Eco Farm'];
        
        const randomName = lang === 'th' ? namesTh[Math.floor(Math.random() * namesTh.length)] : namesEn[Math.floor(Math.random() * namesEn.length)];
        const randomFarm = lang === 'th' ? farmsTh[Math.floor(Math.random() * farmsTh.length)] : farmsEn[Math.floor(Math.random() * farmsEn.length)];
        const randomSeed = Math.random().toString(36).substring(7);
        
        const newAcc = {
          id: 'local_' + Date.now(),
          isGoogleAuth: false,
          name: randomName,
          farmName: randomFarm,
          role: 'Owner',
          avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${randomSeed}&backgroundColor=e2e8f0`
        };
        
        setSavedAccounts(prev => [newAcc, ...prev]);
        setUserData(newAcc);
        onLoginDirect();
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-4 sm:p-6 bg-gray-50 dark:bg-slate-950 relative transition-colors duration-500">
          <TopControls lang={lang} setLang={setLang} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />
          
          <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-emerald-400 dark:bg-emerald-700 rounded-full mix-blend-multiply dark:mix-blend-lighten filter blur-[128px] opacity-40 dark:opacity-20 animate-blob"></div>
          <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-400 dark:bg-blue-700 rounded-full mix-blend-multiply dark:mix-blend-lighten filter blur-[128px] opacity-40 dark:opacity-20 animate-blob animation-delay-2000"></div>
          
          <div className="w-full max-w-md bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl p-8 sm:p-12 rounded-[2.5rem] card-shadow border border-white dark:border-slate-800 relative z-10 modal-enter">
            <div className="text-center mb-8">
              <AppLogo className="w-16 h-16 sm:w-20 sm:h-20 mx-auto mb-4 drop-shadow-md" />
              <h2 className="text-2xl sm:text-3xl font-bold text-gray-800 dark:text-white tracking-tight">{t.login}</h2>
              <p className="text-gray-500 dark:text-gray-400 mt-1 text-sm">{t.platform_desc}</p>
            </div>
            
            <div className="space-y-4 w-full">
              {/* Saved Accounts List */}
              {savedAccounts.length > 0 && (
                <div className="mb-6 w-full text-left">
                   <p className="text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-3 pl-2">{t.saved_accounts}</p>
                   <div className="space-y-2 max-h-[220px] overflow-y-auto hide-scrollbar">
                     {savedAccounts.map(acc => (
                       <div key={acc.id} onClick={() => loginWithSaved(acc)} className="flex items-center gap-3 p-3 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-[1.5rem] cursor-pointer hover:border-emerald-400 dark:hover:border-emerald-500 transition-all group shadow-sm hover:shadow-md">
                          <img src={acc.avatar} className="w-12 h-12 rounded-full object-cover border-2 border-white dark:border-slate-700 shadow-sm" />
                          <div className="flex-1 overflow-hidden">
                            <p className="text-sm font-bold text-gray-800 dark:text-white truncate">{acc.name}</p>
                            <p className="text-[10px] text-emerald-600 dark:text-emerald-400 font-semibold truncate">{acc.farmName}</p>
                          </div>
                          <button onClick={(e) => { e.stopPropagation(); removeAccount(acc.id); }} className="p-2 text-gray-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-xl transition-colors md:opacity-0 md:group-hover:opacity-100">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                          </button>
                       </div>
                     ))}
                   </div>
                </div>
              )}

              <button onClick={handleGoogleLogin} disabled={isLoading} className="w-full bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-gray-700 dark:text-slate-200 py-3.5 rounded-2xl font-semibold hover:bg-gray-50 dark:hover:bg-slate-700 flex items-center justify-center gap-3 transition-all active:scale-[0.98] shadow-sm">
                <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                {isLoading ? t.connecting : t.login_google}
              </button>

              <button onClick={createRandomProfile} className="w-full bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 py-3.5 rounded-2xl font-semibold hover:bg-emerald-100 dark:hover:bg-emerald-900/50 transition-all active:scale-[0.98] shadow-sm flex items-center justify-center gap-2 border border-emerald-100 dark:border-transparent">
                 <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                 {t.random_profile}
              </button>

              <div className="relative flex items-center py-2">
                <div className="flex-grow border-t border-gray-200 dark:border-slate-700"></div>
                <span className="flex-shrink-0 mx-4 text-gray-400 dark:text-gray-500 text-[10px] uppercase tracking-widest">{t.or_choice}</span>
                <div className="flex-grow border-t border-gray-200 dark:border-slate-700"></div>
              </div>

              <button onClick={onGuest} className="w-full bg-white dark:bg-slate-800 border-2 border-dashed border-gray-300 dark:border-slate-600 text-gray-500 dark:text-gray-400 py-3.5 rounded-2xl font-semibold hover:border-emerald-400 dark:hover:border-emerald-500 hover:text-emerald-600 dark:hover:text-emerald-400 transition-all flex items-center justify-center gap-2">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                {t.guest_login}
              </button>
            </div>
            {errorMsg && <div className="mt-6 p-4 bg-red-50 dark:bg-red-900/30 rounded-xl text-red-600 dark:text-red-400 text-sm text-center font-medium animate-pulse">{errorMsg}</div>}
          </div>
        </div>
      );
    };

    const RegisterScreen = ({ userData, setUserData, savedAccounts, setSavedAccounts, onNext, t, lang, setLang, isDarkMode, setIsDarkMode }) => {
      const fileRef = useRef();
      const handleImg = (e) => {
        const r = new FileReader(); r.onload = (ev) => setUserData({...userData, avatar: ev.target.result}); r.readAsDataURL(e.target.files[0]);
      };
      
      const handleSaveAndNext = () => {
         const newAcc = { ...userData, id: userData.id || 'local_' + Date.now() };
         const existingIndex = savedAccounts.findIndex(a => a.id === newAcc.id);
         if (existingIndex >= 0) {
            const newSaved = [...savedAccounts];
            newSaved[existingIndex] = newAcc;
            setSavedAccounts(newSaved);
         } else {
            setSavedAccounts([newAcc, ...savedAccounts]);
         }
         setUserData(newAcc);
         onNext();
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-gray-50 dark:bg-slate-950 transition-colors">
          <TopControls lang={lang} setLang={setLang} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />
          <div className="w-full max-w-md bg-white dark:bg-slate-900 p-8 sm:p-12 rounded-[2.5rem] card-shadow border border-gray-100 dark:border-slate-800 modal-enter">
            <h2 className="text-2xl font-bold text-gray-800 dark:text-white mb-2 text-center">{t.create_profile}</h2>
            <p className="text-gray-500 dark:text-gray-400 mb-8 text-center text-sm">{t.setup_desc}</p>
            <div className="relative w-28 h-28 mx-auto mb-8 group cursor-pointer" onClick={() => fileRef.current.click()}>
              <div className="absolute inset-0 rounded-full border-4 border-emerald-100 dark:border-emerald-800 group-hover:border-emerald-300 dark:group-hover:border-emerald-600 transition-colors"></div>
              <img src={userData.avatar} className="w-full h-full rounded-full object-cover p-1" />
              <div className="absolute bottom-1 right-1 bg-emerald-500 text-white p-2 rounded-full shadow-lg hover:scale-110 transition-transform"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></div>
              <button title={t.random_avatar} onClick={(e) => { e.stopPropagation(); setUserData({...userData, avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${Math.random().toString(36).substring(7)}&backgroundColor=e2e8f0`}); }} className="absolute bottom-1 left-1 bg-blue-500 text-white p-2 rounded-full shadow-lg hover:scale-110 transition-transform"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg></button>
              <input type="file" ref={fileRef} className="hidden" accept="image/*" onChange={handleImg} />
            </div>
            <div className="space-y-4">
              <div><label className="text-xs font-semibold text-gray-500 dark:text-gray-400 ml-1 mb-1 block">{t.name}</label><input type="text" className="w-full border border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-800 p-4 rounded-2xl text-gray-800 dark:text-white placeholder-gray-400 transition-all" value={userData.name} onChange={e => setUserData({...userData, name: e.target.value})} /></div>
              <div><label className="text-xs font-semibold text-gray-500 dark:text-gray-400 ml-1 mb-1 block">{t.farm_name}</label><input type="text" className="w-full border border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-800 p-4 rounded-2xl text-gray-800 dark:text-white placeholder-gray-400 transition-all" value={userData.farmName} onChange={e => setUserData({...userData, farmName: e.target.value})} /></div>
            </div>
            <button onClick={handleSaveAndNext} className="w-full mt-10 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-emerald-500/30 hover:-translate-y-0.5 transition-all">{t.next}</button>
          </div>
        </div>
      );
    };

    const RobotSetup = ({ userData, robots, setRobots, onNext, t, lang, setLang, isDarkMode, setIsDarkMode }) => {
       const [editingBot, setEditingBot] = useState(null);
       const [isManage, setIsManage] = useState(false);
       const botFileRef = useRef();

       const handleSaveBot = () => {
         if (userData.role !== 'guest') {
           if (userData.isGoogleAuth && auth.currentUser) {
             const userId = auth.currentUser.uid;
             db.collection('artifacts').doc(appId).collection('users').doc(userId).collection('robots').doc(editingBot.id.toString()).set(editingBot);
           } else {
             const newRobots = robots.find(r=>r.id===editingBot.id) ? robots.map(r=>r.id===editingBot.id?editingBot:r) : [...robots, editingBot];
             setRobots(newRobots);
             localStorage.setItem('farmos_robots_' + userData.id, JSON.stringify(newRobots));
           }
         } else {
           if(robots.find(r=>r.id===editingBot.id)) { setRobots(robots.map(r=>r.id===editingBot.id?editingBot:r)); } 
           else { setRobots([...robots, editingBot]); }
         }
         setEditingBot(null);
       };

       const handleDeleteBot = (botId) => {
         if (userData.role !== 'guest') {
           if (userData.isGoogleAuth && auth.currentUser) {
             const userId = auth.currentUser.uid;
             db.collection('artifacts').doc(appId).collection('users').doc(userId).collection('robots').doc(botId.toString()).delete();
           } else {
             const newRobots = robots.filter(b => b.id !== botId);
             setRobots(newRobots);
             localStorage.setItem('farmos_robots_' + userData.id, JSON.stringify(newRobots));
           }
         } else {
           setRobots(robots.filter(b => b.id !== botId));
         }
       };

       return (
        <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-gray-50 dark:bg-slate-950 transition-colors">
          <TopControls lang={lang} setLang={setLang} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />
          {editingBot ? (
            <div className="bg-white dark:bg-slate-900 p-8 md:p-10 rounded-[2.5rem] card-shadow border border-gray-100 dark:border-slate-800 w-full max-w-sm modal-enter">
              <h2 className="text-2xl font-bold text-gray-800 dark:text-white mb-8 text-center">{t.setup_bot}</h2>
              <div className="relative w-28 h-28 mx-auto mb-8 cursor-pointer group" onClick={() => botFileRef.current.click()}>
                 <div className="absolute inset-0 bg-gray-100 dark:bg-slate-800 rounded-2xl group-hover:bg-gray-200 dark:group-hover:bg-slate-700 transition-colors"></div>
                 <img src={editingBot.image} className="w-full h-full rounded-2xl object-cover p-2 relative z-10" />
                 <div className="absolute -bottom-3 -right-3 bg-emerald-500 text-white p-2 rounded-xl shadow-lg z-20 hover:scale-110 transition-transform"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></div>
                 <button title={t.random_avatar} onClick={(e) => { e.stopPropagation(); setEditingBot({...editingBot, image: `https://api.dicebear.com/7.x/bottts/svg?seed=${Math.random().toString(36).substring(7)}&backgroundColor=f3f4f6`}); }} className="absolute -bottom-3 -left-3 bg-blue-500 text-white p-2 rounded-xl shadow-lg z-20 hover:scale-110 transition-transform"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg></button>
                 <input type="file" ref={botFileRef} className="hidden" accept="image/*" onChange={(e)=>{ const r = new FileReader(); r.onload=(ev)=>setEditingBot({...editingBot, image: ev.target.result}); r.readAsDataURL(e.target.files[0]); }} />
              </div>
              <div className="space-y-4 mb-8">
                <div><label className="text-xs font-semibold text-gray-500 dark:text-gray-400 ml-1 mb-1 block">{t.bot_name}</label><input type="text" className="w-full border border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-800 p-4 rounded-2xl text-gray-800 dark:text-white" value={editingBot.name} onChange={e=>setEditingBot({...editingBot, name: e.target.value})} /></div>
              </div>
              <div className="flex gap-3">
                <button onClick={() => setEditingBot(null)} className="flex-1 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 py-3.5 rounded-xl font-semibold text-gray-600 dark:text-gray-300">{t.cancel}</button>
                <button onClick={handleSaveBot} className="flex-1 bg-emerald-500 text-white py-3.5 rounded-xl font-semibold shadow-lg shadow-emerald-500/30">{t.save}</button>
              </div>
            </div>
          ) : (
            <div className="w-full max-w-4xl flex flex-col items-center">
              <h1 className="text-3xl md:text-4xl font-extrabold text-gray-800 dark:text-white mb-2 text-center tracking-tight">Fleet Management</h1>
              <p className="text-gray-500 dark:text-gray-400 text-sm mb-12 text-center">{t.manage_bots}</p>
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:flex lg:flex-wrap justify-center gap-6 md:gap-8 w-full max-w-2xl lg:max-w-none">
                {robots.map(r => (
                  <div key={r.id} className="relative flex flex-col items-center group">
                    {isManage && <button onClick={() => handleDeleteBot(r.id)} className="absolute -top-3 -right-3 md:-top-2 md:-right-2 bg-red-500 text-white w-8 h-8 rounded-full z-10 font-bold shadow-lg flex items-center justify-center">✕</button>}
                    <div onClick={() => isManage && setEditingBot(r)} className={`w-32 h-32 md:w-40 md:h-40 rounded-[2rem] bg-white dark:bg-slate-800 card-shadow flex items-center justify-center overflow-hidden border-2 ${isManage ? 'border-blue-400 cursor-pointer scale-105' : 'border-transparent dark:border-slate-700'} transition-all duration-300 relative`}><img src={r.image} className="w-[80%] h-[80%] object-contain relative z-10 group-hover:scale-110 transition-transform duration-500" /></div>
                    <p className="mt-4 font-semibold text-sm text-gray-700 dark:text-gray-300 text-center w-full truncate px-2">{r.name}</p>
                  </div>
                ))}
                <div onClick={() => setEditingBot({id:Date.now(), name:'New Bot', ip:'', image:'https://api.dicebear.com/7.x/bottts/svg?seed='+Date.now()+'&backgroundColor=f3f4f6'})} className="w-32 h-32 md:w-40 md:h-40 mx-auto rounded-[2rem] border-2 border-dashed border-gray-300 dark:border-slate-700 flex items-center justify-center text-gray-400 dark:text-gray-500 cursor-pointer hover:border-emerald-500 dark:hover:border-emerald-500 hover:text-emerald-500 hover:bg-emerald-50/50 dark:hover:bg-slate-800 transition-all flex-col gap-2">
                  <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg><span className="text-xs font-semibold">{t.add_bot}</span>
                </div>

                     ))}
                  </div>
               </div>
            )}

            {/* TAB: RESOURCE (Control) */}
            {activeTab === 'resource' && (
               <div className="space-y-6 animate-in fade-in duration-500 mt-4 lg:mt-0">
                  <div>
                    <h2 className="text-2xl font-bold text-gray-800 dark:text-white">{t.resource_control}</h2>
                    <p className="text-sm text-gray-500 dark:text-gray-400">{t.manual_auto}</p>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                     {plantZones.map(z => (
                        <div key={z.id} className={`p-6 md:p-8 bg-white dark:bg-slate-900 rounded-[2.5rem] card-shadow border border-gray-100 dark:border-slate-800 flex flex-col group transition-colors ${!isGuest ? 'hover:border-emerald-200 dark:hover:border-emerald-700' : ''}`}>
                           <div className="flex justify-between items-start mb-8">
                              <div>
                                <h3 className="font-bold text-xl text-gray-800 dark:text-white">{t.zone} {z.id}</h3>
                                <p className="text-sm text-gray-500 dark:text-gray-400">{z.name}</p>
                              </div>
                              <div className="text-center">
                                <span className={`w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center font-bold text-lg sm:text-xl ${z.moisture < 40 ? 'bg-orange-50 dark:bg-orange-900/30 text-orange-500 dark:text-orange-400 border border-orange-100 dark:border-orange-800/50' : 'bg-blue-50 dark:bg-blue-900/30 text-blue-500 dark:text-blue-400 border border-blue-100 dark:border-blue-800/50'}`}>
                                  {z.moisture}%
                                </span>
                                <p className="text-[10px] text-gray-400 dark:text-gray-500 mt-1">{t.soil_moisture}</p>
                              </div>
                           </div>
                           <div className="mt-auto">
                             <button disabled={isGuest} className={`w-full py-3.5 rounded-xl font-bold transition-all flex items-center justify-center gap-2 text-sm sm:text-base ${isGuest ? 'bg-gray-100 dark:bg-slate-800 text-gray-400 dark:text-gray-500 border border-gray-200 dark:border-slate-700 cursor-not-allowed' : 'bg-blue-50 dark:bg-blue-900/30 hover:bg-blue-500 text-blue-600 dark:text-blue-400 hover:text-white border border-blue-100 dark:border-blue-800/50 hover:border-blue-500'}`}>
                               {isGuest ? (
                                  <><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg> {t.guest_locked_btn}</>
                               ) : (
                                  <><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg> {t.irrigation_on}</>
                               )}
                             </button>
                           </div>
                        </div>
                     ))}
                  </div>
               </div>
            )}

          </main>

          {/* Bottom Nav Mobile (Floating Glassmorphism) */}
          <div className="lg:hidden fixed bottom-4 sm:bottom-6 left-4 sm:left-6 right-4 sm:right-6 z-[400]">
            <nav className="glass-nav rounded-[2rem] flex justify-around items-center p-2 shadow-lg">
               {menuItems.map(item => (
                 <button 
                   key={item.id} 
                   onClick={() => setActiveTab(item.id)} 
                   className={`p-2.5 sm:p-3 rounded-2xl transition-all duration-300 flex flex-col items-center gap-1 ${activeTab === item.id ? 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 scale-110' : 'text-gray-400 hover:text-gray-600 dark:hover:text-white'}`}
                 >
                   {item.icon}
                 </button>
               ))}
               {/* Mobile Menu Button */}
               <button onClick={() => setShowMobileMenu(true)} className={`p-2.5 sm:p-3 rounded-2xl transition-all duration-300 flex flex-col items-center gap-1 ${['robot_list', 'reports', 'alerts'].includes(activeTab) ? 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 scale-110' : 'text-gray-400 hover:text-gray-600 dark:hover:text-white'}`}>
                 <svg className="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                   <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
                 </svg>
                 {alerts.length > 0 && <span className="absolute top-3 right-3 w-2 h-2 bg-red-500 rounded-full"></span>}
               </button>
            </nav>
          </div>
          
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
