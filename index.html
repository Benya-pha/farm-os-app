<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Farm OS | Smart Agriculture Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- ฟอนต์ Itim สำหรับความโค้งมน -->
  <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Itim', cursive; background-color: #FDFCF0; -webkit-tap-highlight-color: transparent; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .modal-enter { animation: zoomIn 0.3s ease-out; }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .area-chart-path { transition: d 0.6s ease-in-out; }
    
    /* Earth Tone Utilities */
    .bg-earth-beige { background-color: #FDFCF0; }
    .bg-earth-sidebar { background-color: #EAE4D3; }
    .bg-earth-green { background-color: #4A5D23; }
    .text-earth-green { color: #4A5D23; }
    .border-earth-green { border-color: #4A5D23; }
    
    /* Range input styling */
    input[type=range] { -webkit-appearance: none; background: transparent; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #e5e7eb; border-radius: 10px; }
    input[type=range]::-webkit-slider-thumb { height: 20px; width: 20px; border-radius: 50%; background: #4A5D23; cursor: pointer; -webkit-appearance: none; margin-top: -6px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="text-[#3E3A34] overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyDs8yRihR4Vz123JRjEA6SWcF-pw77c-qU",
      authDomain: "m4kul-1.firebaseapp.com",
      projectId: "m4kul-1",
      storageBucket: "m4kul-1.firebasestorage.app",
      messagingSenderId: "973526589558",
      appId: "1:973526589558:web:01a944e291077e240bff57",
      measurementId: "G-7QT0GT3J9J"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    
    // Direct Image Link Fix
    const APP_LOGO = "https://lh3.googleusercontent.com/d/1Idx_06TR21D44uHQjWC1arrQM0hD4LZ8";

    function App() {
      const [currentScreen, setCurrentScreen] = useState('splash');
      const [authStatus, setAuthStatus] = useState('checking');
      const [userData, setUserData] = useState({ 
        name: '', email: '', farmName: '', phone: '', role: 'เจ้าของฟาร์ม', 
        avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Somchai' 
      });
      
      const [robots, setRobots] = useState([
        { id: 1, name: 'FarmBot-Alpha', ip: '192.168.1.101', status: 'สแกนโรคพืช', battery: 85, image: 'https://api.dicebear.com/7.x/bottts/svg?seed=Alpha' },
        { id: 2, name: 'FarmBot-Beta', ip: '192.168.1.102', status: 'สแตนด์บาย', battery: 100, image: 'https://api.dicebear.com/7.x/bottts/svg?seed=Beta' },
      ]);

      // State สำหรับโซนพืช (ต้องถูกส่งไป FarmOS ด้วย)
      const [plantZones, setPlantZones] = useState([
        { id: 'A', name: 'ผักสลัด', moisture: 45, temp: 28, health: 95 },
        { id: 'B', name: 'มะเขือเทศ', moisture: 30, temp: 31, health: 65 },
      ]);

      const [soilStats, setSoilStats] = useState({ N: 65, P: 40, K: 55, moisture: 45 });
      
      const [alerts] = useState([
        { id: 1, type: 'critical', title: 'พบร่องรอยโรคราน้ำค้าง', zone: 'โซน B', time: '10 นาทีที่แล้ว', detail: 'AI ตรวจพบความผิดปกติบนใบ' },
        { id: 2, type: 'warning', title: 'ความชื้นดินต่ำกว่าเกณฑ์', zone: 'โซน B', time: '1 ชั่วโมงที่แล้ว', detail: 'ความชื้นลดลงเหลือ 30%' },
        { id: 3, type: 'info', title: 'ระบบอัปเดตซอฟต์แวร์', zone: 'หุ่นยนต์', time: '5 ชั่วโมงที่แล้ว', detail: 'FarmBot ทุกตัวอัปเดตเป็น v2.1' },
      ]);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((user) => {
          if (user) {
            setUserData(prev => ({ ...prev, name: user.displayName, email: user.email, avatar: user.photoURL || prev.avatar }));
            setAuthStatus('logged_in');
          } else { setAuthStatus('logged_out'); }
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (currentScreen === 'login' && authStatus === 'logged_in') { setCurrentScreen('dashboard'); }
      }, [currentScreen, authStatus]);

      const navigate = (screen) => setCurrentScreen(screen);

      return (
        <div className="min-h-screen">
          {currentScreen === 'splash' && <SplashScreen onFinish={() => navigate('login')} />}
          {currentScreen === 'login' && <LoginScreen onNext={() => navigate('register')} setUserData={setUserData} userData={userData} />}
          {currentScreen === 'register' && <RegisterScreen userData={userData} setUserData={setUserData} onNext={() => navigate('robot_setup')} />}
          {currentScreen === 'robot_setup' && <RobotSetup robots={robots} setRobots={setRobots} onNext={() => navigate('dashboard')} />}
          {currentScreen === 'dashboard' && (
            <FarmOS 
              userData={userData} setUserData={setUserData}
              robots={robots} setRobots={setRobots}
              plantZones={plantZones} setPlantZones={setPlantZones}
              soilStats={soilStats} setSoilStats={setSoilStats}
              alerts={alerts}
              onLogout={() => auth.signOut().then(() => navigate('login'))} 
              setCurrentScreen={setCurrentScreen}
            />
          )}
        </div>
      );
    }

    const SplashScreen = ({ onFinish }) => {
      useEffect(() => { const timer = setTimeout(onFinish, 2500); return () => clearTimeout(timer); }, [onFinish]);
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-earth-beige animate-in fade-in duration-1000">
          <img src={APP_LOGO} className="w-32 h-32 object-contain mb-4 drop-shadow-xl animate-bounce" />
          <h1 className="text-4xl font-black text-[#4A5D23] tracking-tighter">Farm OS</h1>
          <p className="text-[#8B5A2B] font-bold text-xs uppercase tracking-[0.4em]">Smart Ecosystem</p>
        </div>
      );
    };

    const LoginScreen = ({ onNext, setUserData, userData }) => {
      const [isLoading, setIsLoading] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');

      const handleGoogleLogin = () => {
        setIsLoading(true); setErrorMsg('');
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider)
          .then((result) => {
            setUserData({ ...userData, name: result.user.displayName, email: result.user.email, avatar: result.user.photoURL });
            setIsLoading(false); onNext();
          })
          .catch((error) => {
            setIsLoading(false);
            if (error.code === 'auth/unauthorized-domain') {
              setErrorMsg("โดเมนยังไม่ได้รับอนุญาตใน Firebase \nกรุณาเพิ่ม benya-pha.github.io ใน Authorized Domains");
            } else if (error.code === 'auth/operation-not-supported-in-this-environment') {
              setErrorMsg("Preview Mode ไม่รองรับ Google Login \nระบบจะจำลองข้อมูลให้ชั่วคราว...");
              setTimeout(() => { setUserData({...userData, name: 'คุณสมชาย (จำลอง)'}); onNext(); }, 2000);
            } else { setErrorMsg(error.message); }
          });
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-earth-beige">
          <div className="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl border border-gray-100 text-center animate-in zoom-in duration-500">
            <img src={APP_LOGO} className="w-20 h-20 mx-auto mb-8" />
            <h2 className="text-3xl font-black text-[#4A5D23] mb-2 tracking-tight tracking-tight">เข้าสู่ระบบ</h2>
            <p className="text-gray-400 mb-10 font-bold">Smart Farming Ecosystem</p>
            <div className="space-y-4">
              <button onClick={handleGoogleLogin} className="w-full bg-white border-2 border-gray-100 text-gray-700 py-4 rounded-[1.5rem] font-black hover:bg-gray-50 flex items-center justify-center gap-3 transition-all">🌐 ล็อกอินด้วย Google</button>
              <button onClick={onNext} className="w-full bg-[#4A5D23] text-white py-4 rounded-[1.5rem] font-black hover:bg-[#3a4a1c] shadow-xl transition-all">📱 เบอร์โทรศัพท์ / อีเมล</button>
            </div>
            {errorMsg && <p className="mt-6 text-red-600 text-[10px] whitespace-pre-line font-bold leading-relaxed">{errorMsg}</p>}
          </div>
        </div>
      );
    };

    const RegisterScreen = ({ userData, setUserData, onNext }) => {
      const fileRef = useRef();
      const handleImg = (e) => {
          const r = new FileReader(); r.onload = (ev) => setUserData({...userData, avatar: ev.target.result}); r.readAsDataURL(e.target.files[0]);
      };
      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-earth-beige">
          <div className="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl border border-gray-100 text-center">
            <h2 className="text-2xl font-black text-[#4A5D23] mb-8">ข้อมูลโปรไฟล์</h2>
            <div className="relative w-28 h-28 mx-auto mb-6 group">
              <img src={userData.avatar} className="w-full h-full rounded-full border-4 border-[#4A5D23] shadow-xl object-cover" />
              <button onClick={() => fileRef.current.click()} className="absolute bottom-0 right-0 bg-white p-2 rounded-full shadow-lg border border-gray-100 transition-transform active:scale-90">📷</button>
              <input type="file" ref={fileRef} className="hidden" accept="image/*" onChange={handleImg} />
            </div>
            <button onClick={() => setUserData({...userData, avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${Math.random()}`})} className="text-xs text-blue-500 font-bold mb-8 block underline decoration-blue-200 underline-offset-4">🎲 สุ่มรูปใหม่</button>
            <div className="space-y-4 text-left">
              <div><label className="text-[10px] font-bold text-gray-400 ml-3 uppercase">ชื่อเล่น</label><input type="text" className="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-green-100" value={userData.name} onChange={e => setUserData({...userData, name: e.target.value})} /></div>
              <div><label className="text-[10px] font-bold text-gray-400 ml-3 uppercase">ชื่อฟาร์ม</label><input type="text" className="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-green-100" value={userData.farmName} onChange={e => setUserData({...userData, farmName: e.target.value})} /></div>
            </div>
            <button onClick={onNext} className="w-full mt-10 bg-[#4A5D23] text-white py-4 rounded-2xl font-black text-xl shadow-xl transition-all active:scale-95">เริ่มต้นใช้งาน →</button>
          </div>
        </div>
      );
    };

    const RobotSetup = ({ robots, setRobots, onNext }) => {
      const [editingBot, setEditingBot] = useState(null);
      const [isManage, setIsManage] = useState(false);
      const botFileRef = useRef();

      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-earth-beige">
          {editingBot ? (
            <div className="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm modal-enter text-center">
              <h2 className="text-xl font-bold mb-8">ตั้งค่าหุ่นยนต์</h2>
              <div className="relative w-24 h-24 mx-auto mb-6">
                 <img src={editingBot.image} className="w-full h-full rounded-[1.5rem] object-cover shadow-inner border" />
                 <button onClick={() => botFileRef.current.click()} className="absolute -bottom-2 -right-2 bg-white p-2 rounded-full shadow border">📷</button>
                 <input type="file" ref={botFileRef} className="hidden" accept="image/*" onChange={(e)=>{
                   const r = new FileReader(); r.onload=(ev)=>setEditingBot({...editingBot, image: ev.target.result}); r.readAsDataURL(e.target.files[0]);
                 }} />
              </div>
              <input type="text" placeholder="ชื่อหุ่นยนต์" className="w-full border p-3 rounded-xl mb-4 outline-none" value={editingBot.name} onChange={e=>setEditingBot({...editingBot, name: e.target.value})} />
              <input type="text" placeholder="IP Address" className="w-full border p-3 rounded-xl mb-8 outline-none" value={editingBot.ip} onChange={e=>setEditingBot({...editingBot, ip: e.target.value})} />
              <div className="flex gap-2">
                <button onClick={() => setEditingBot(null)} className="flex-1 bg-gray-50 py-3 rounded-xl font-bold text-gray-400">ยกเลิก</button>
                <button onClick={() => { if(robots.find(r=>r.id===editingBot.id)) { setRobots(robots.map(r=>r.id===editingBot.id?editingBot:r)); } else { setRobots([...robots, editingBot]); } setEditingBot(null); }} className="flex-1 bg-[#4A5D23] text-white py-3 rounded-xl font-bold shadow-lg">บันทึก</button>
              </div>
            </div>
          ) : (
            <div className="w-full max-w-4xl flex flex-col items-center">
              <h1 className="text-3xl font-black text-[#4A5D23] mb-2 tracking-tight text-center">เลือกหุ่นยนต์</h1>
              <p className="text-gray-400 text-xs font-bold mb-10 text-center uppercase tracking-widest">Select robot to manage</p>
              <div className="flex flex-wrap justify-center gap-6">
                {robots.map(r => (
                  <div key={r.id} className="relative group">
                    {isManage && <button onClick={() => setRobots(robots.filter(b => b.id !== r.id))} className="absolute -top-2 -right-2 bg-red-500 text-white w-7 h-7 rounded-full z-10 font-bold shadow-lg border-2 border-white flex items-center justify-center">✕</button>}
                    <div onClick={() => isManage && setEditingBot(r)} className={`w-32 h-32 rounded-[2.5rem] bg-white shadow-xl flex items-center justify-center overflow-hidden border-4 ${isManage ? 'border-blue-200 scale-105' : 'border-white'} transition-all`}><img src={r.image} className="w-full h-full object-cover" /></div>
                    <p className="text-center mt-3 font-bold text-gray-600">{r.name}</p>
                  </div>
                ))}
                <div onClick={() => setEditingBot({id:Date.now(), name:'New Bot', ip:'', image:'https://api.dicebear.com/7.x/bottts/svg?seed='+Date.now()})} className="w-32 h-32 rounded-[2.5rem] border-4 border-dashed border-gray-300 flex items-center justify-center text-3xl text-gray-300 cursor-pointer hover:border-[#4A5D23] hover:text-[#4A5D23] transition-all">➕</div>
              </div>
              <div className="mt-16 flex flex-col gap-4 w-full max-w-xs">
                 <button onClick={onNext} className="w-full bg-[#4A5D23] text-white py-4 rounded-full font-black text-xl shadow-2xl hover:scale-105 transition-all">ไปที่แดชบอร์ด →</button>
                 <button onClick={() => setIsManage(!isManage)} className="text-blue-600 font-bold text-sm underline">{isManage ? 'เสร็จสิ้นการตั้งค่า' : 'จัดการหุ่นยนต์'}</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- Components: SVG Area Chart (Unigrade Style) ---
    const AreaChart = ({ data, color, labels }) => {
      const maxVal = 100;
      const stepX = 100 / (data.length - 1);
      const points = data.map((d, i) => `${i * stepX},${100 - (d / maxVal) * 100}`).join(' ');
      const fillPoints = `0,100 ${points} 100,100`;

      return (
        <div className="w-full h-full flex flex-col">
          <div className="flex-1 relative mt-4">
             <svg viewBox="0 0 100 100" className="w-full h-full overflow-visible" preserveAspectRatio="none">
               {/* Grid Lines */}
               {[0, 25, 50, 75, 100].map(v => <line key={v} x1="0" y1={v} x2="100" y2={v} stroke="#f3f4f6" strokeWidth="0.5" />)}
               {/* Area Fill */}
               <polygon points={fillPoints} fill={color} fillOpacity="0.15" className="area-chart-path" />
               {/* Main Line */}
               <polyline points={points} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="area-chart-path" />
               {/* Points */}
               {data.map((d, i) => <circle key={i} cx={i * stepX} cy={100 - (d / maxVal) * 100} r="2.5" fill="white" stroke={color} strokeWidth="1.5" />)}
             </svg>
          </div>
          <div className="flex justify-between mt-4">
             {labels.map(l => <span key={l} className="text-[10px] font-black text-gray-400 uppercase tracking-widest">{l}</span>)}
          </div>
        </div>
      );
    };

    const FarmOS = ({ userData, setUserData, robots, setRobots, plantZones, soilStats, setSoilStats, alerts, onLogout, setCurrentScreen }) => {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [alertFilter, setAlertFilter] = useState('all');
      const [showProfileEditor, setShowProfileEditor] = useState(false);
      const [showMobileMenu, setShowMobileMenu] = useState(false);
      const profFileRef = useRef();

      const filteredAlerts = alertFilter === 'all' ? alerts : alerts.filter(a => a.type === alertFilter);

      const MobileMenu = () => (
        <div className="fixed inset-0 bg-black/60 z-[500] flex items-end backdrop-blur-sm">
           <div className="w-full bg-white rounded-t-[3rem] p-8 pb-14 modal-enter shadow-2xl">
              <div className="flex justify-between items-center mb-8"><h3 className="text-2xl font-black text-[#4A5D23]">เมนูจัดการ</h3><button onClick={()=>setShowMobileMenu(false)} className="text-3xl text-gray-200">✕</button></div>
              <div className="grid grid-cols-2 gap-4">
                 <button onClick={()=>{setActiveTab('robot_list'); setShowMobileMenu(false);}} className="p-6 bg-gray-50 rounded-[2rem] flex flex-col items-center gap-2 border">🤖 <span className="font-bold">หุ่นยนต์</span></button>
                 <button onClick={()=>{setActiveTab('reports'); setShowMobileMenu(false);}} className="p-6 bg-gray-50 rounded-[2rem] flex flex-col items-center gap-2 border">📈 <span className="font-bold">สถิติ</span></button>
                 <button onClick={()=>{setShowProfileEditor(true); setShowMobileMenu(false);}} className="col-span-2 p-6 bg-blue-50 rounded-[2rem] flex flex-col items-center gap-2 border border-blue-100 text-blue-700 font-bold underline">แก้ไขโปรไฟล์</button>
              </div>
              <button onClick={onLogout} className="w-full mt-6 py-4 bg-red-50 text-red-500 rounded-2xl font-black">ออกจากระบบ</button>
           </div>
        </div>
      );

      return (
        <div className="flex flex-col md:flex-row h-screen relative bg-earth-beige">
          {showMobileMenu && <MobileMenu />}
          
          {showProfileEditor && (
            <div className="fixed inset-0 bg-black/50 z-[600] flex items-center justify-center p-4 backdrop-blur-sm">
               <div className="bg-white p-8 rounded-[2.5rem] w-full max-w-sm modal-enter text-center">
                  <h3 className="text-xl font-black mb-8">แก้ไขโปรไฟล์</h3>
                  <div className="relative w-24 h-24 mx-auto mb-6">
                    <img src={userData.avatar} className="w-full h-full rounded-full border-4 border-[#4A5D23] object-cover shadow-xl" />
                    <button onClick={()=>profFileRef.current.click()} className="absolute bottom-0 right-0 bg-white p-2 rounded-full shadow border transition-transform active:scale-90">📷</button>
                    <input type="file" ref={profFileRef} className="hidden" accept="image/*" onChange={(e)=>{
                      const r = new FileReader(); r.onload = (ev) => setUserData({...userData, avatar: ev.target.result}); r.readAsDataURL(e.target.files[0]);
                    }} />
                  </div>
                  <input type="text" className="w-full border p-3 rounded-xl mb-4" value={userData.name} onChange={e=>setUserData({...userData, name: e.target.value})} placeholder="ชื่อ" />
                  <input type="text" className="w-full border p-3 rounded-xl mb-6" value={userData.farmName} onChange={e=>setUserData({...userData, farmName: e.target.value})} placeholder="ฟาร์ม" />
                  <button onClick={() => setShowProfileEditor(false)} className="w-full bg-[#4A5D23] text-white py-3 rounded-2xl font-bold shadow-lg transition-transform active:scale-95">บันทึก</button>
                  <button onClick={() => setShowProfileEditor(false)} className="mt-4 text-gray-400 font-bold block w-full text-center">ปิด</button>
               </div>
            </div>
          )}

          {/* Sidebar Desktop */}
          <aside className="hidden md:flex flex-col w-64 bg-earth-sidebar h-full border-r border-[#D9D1BE] p-6 shadow-sm">
            <div className="flex items-center gap-3 mb-10">
              <img src={APP_LOGO} className="w-10 h-10 object-contain" />
              <h1 className="text-xl font-black text-[#4A5D23] truncate">{userData.farmName || 'Farm OS'}</h1>
            </div>
            <div className="flex-1 space-y-1.5 overflow-y-auto hide-scrollbar">
              {[ {id:'dashboard',l:'ภาพรวม',i:'📊'}, {id:'plant',l:'สุขภาพพืช',i:'🌿'}, {id:'soil',l:'วิเคราะห์ดิน',i:'🧪'}, {id:'resource',l:'ควบคุมระบบ',i:'💧'} ].map(item => (
                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-left transition-all ${activeTab === item.id ? 'bg-[#4A5D23] text-white shadow-xl scale-105' : 'text-[#5C564B] hover:bg-white/40'}`}>
                   <span className="text-xl">{item.i}</span> {item.l}
                </button>
              ))}
              <button onClick={() => setActiveTab('robot_list')} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold transition-all ${activeTab === 'robot_list' ? 'bg-[#4A5D23] text-white shadow-xl' : 'text-[#5C564B] hover:bg-white/40'}`}><span>🤖</span> หุ่นยนต์</button>
              <button onClick={() => setActiveTab('reports')} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold transition-all ${activeTab === 'reports' ? 'bg-[#4A5D23] text-white shadow-xl' : 'text-[#5C564B] hover:bg-white/40'}`}><span>📈</span> สถิติ</button>
              <button onClick={() => setActiveTab('alerts')} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold transition-all ${activeTab === 'alerts' ? 'bg-[#4A5D23] text-white shadow-xl' : 'text-[#5C564B] hover:bg-white/40'}`}><span>🔔</span> แจ้งเตือน</button>
            </div>
            <div className="mt-4 pt-6 border-t border-[#D9D1BE]">
                <div onClick={()=>setShowProfileEditor(true)} className="flex items-center gap-3 p-3 bg-white/40 rounded-2xl mb-4 cursor-pointer hover:bg-white transition-all group">
                   <img src={userData.avatar} className="w-10 h-10 rounded-full border-2 border-white object-cover shadow-md group-hover:scale-110 transition-all" />
                   <div className="overflow-hidden"><p className="text-sm font-black truncate">{userData.name}</p><p className="text-[10px] text-[#8B5A2B] font-black uppercase tracking-widest">Admin Profile</p></div>
                </div>
            </div>
          </aside>

          {/* Main Area */}
          <main className="flex-1 h-full overflow-y-auto p-4 md:p-8 pb-32">
            
            <div className="md:hidden flex justify-between items-center mb-8">
                <div className="flex items-center gap-3">
                   <img src={APP_LOGO} className="w-10 h-10 object-contain" />
                   <h1 className="text-xl font-black text-[#4A5D23] truncate max-w-[150px]">{userData.farmName}</h1>
                </div>
                <div onClick={()=>setShowProfileEditor(true)} className="w-10 h-10 rounded-full border-2 border-[#4A5D23] overflow-hidden shadow-md"><img src={userData.avatar} className="w-full h-full object-cover" /></div>
            </div>

            {/* TAB: DASHBOARD */}
            {activeTab === 'dashboard' && (
              <div className="space-y-6 animate-in fade-in duration-500">
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  <div className="p-5 bg-white rounded-3xl shadow-sm border border-gray-100"><p className="text-[10px] font-bold text-gray-400 uppercase">Hum.</p><h3 className="text-2xl font-black text-blue-500">{soilStats.moisture}%</h3></div>
                  <div className="p-5 bg-white rounded-3xl shadow-sm border border-gray-100"><p className="text-[10px] font-bold text-gray-400 uppercase">Temp</p><h3 className="text-2xl font-black text-orange-500">32°C</h3></div>
                  <div className="p-5 bg-white rounded-3xl shadow-sm border border-gray-100"><p className="text-[10px] font-bold text-gray-400 uppercase">Active</p><h3 className="text-2xl font-black text-green-700">{robots.length}</h3></div>
                  <div className="p-5 bg-white rounded-3xl shadow-sm border border-gray-100"><p className="text-[10px] font-bold text-gray-400 uppercase">Alerts</p><h3 className="text-2xl font-black text-red-500">{alerts.length}</h3></div>
                </div>
                <div className="w-full h-[350px] bg-[#D4E0C2] rounded-[3rem] relative border-4 border-white shadow-xl flex items-center justify-center overflow-hidden">
                    <span className="text-earth-green font-black opacity-30 text-2xl tracking-tighter uppercase">Live Sat-Map</span>
                    {robots.map((r, i) => (
                      <div key={r.id} className="absolute bg-white p-1 rounded-full shadow-2xl border-4 border-orange-400 animate-bounce w-14 h-14 z-10 overflow-hidden flex items-center justify-center" style={{top: 20+(i*20)+'%', left: 40+(i*15)+'%'}}>
                        <img src={r.image} className="w-full h-full object-cover rounded-full" />
                      </div>
                    ))}
                    {plantZones.map((z, i) => (
                        <div key={z.id} className="absolute bg-white/90 px-3 py-1 rounded-full shadow-sm text-[10px] font-black text-earth-green border" style={{top: (i*25)+10+'%', left: (i*15)+5+'%'}}>Zone {z.id}</div>
                    ))}
                </div>
              </div>
            )}

            {/* TAB: SOIL (Tester) */}
            {activeTab === 'soil' && (
              <div className="space-y-6 animate-in fade-in duration-500">
                <h2 className="text-2xl font-black text-[#4A5D23]">วิเคราะห์คุณภาพดิน</h2>
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                  <div className="p-8 bg-white rounded-[2.5rem] border shadow-xl">
                    <h3 className="font-black text-[#8B5A2B] mb-8 border-b pb-4 uppercase text-xs">🕹️ Soil Simulator</h3>
                    <div className="space-y-6">
                       <div><label className="text-[10px] font-bold text-green-600 block mb-2 uppercase">Nitrogen (N): {soilStats.N}%</label><input type="range" className="w-full accent-[#4A5D23]" min="0" max="100" value={soilStats.N} onChange={e=>setSoilStats({...soilStats, N: Number(e.target.value)})} /></div>
                       <div><label className="text-[10px] font-bold text-orange-600 block mb-2 uppercase">Phosphorus (P): {soilStats.P}%</label><input type="range" className="w-full accent-orange-500" min="0" max="100" value={soilStats.P} onChange={e=>setSoilStats({...soilStats, P: Number(e.target.value)})} /></div>
                       <div><label className="text-[10px] font-bold text-yellow-600 block mb-2 uppercase">Potassium (K): {soilStats.K}%</label><input type="range" className="w-full accent-yellow-500" min="0" max="100" value={soilStats.K} onChange={e=>setSoilStats({...soilStats, K: Number(e.target.value)})} /></div>
                       <div className="pt-4 border-t"><label className="text-[10px] font-bold text-blue-600 block mb-2 tracking-widest uppercase">Moisture: {soilStats.moisture}%</label><input type="range" className="w-full accent-blue-600" min="0" max="100" value={soilStats.moisture} onChange={e=>setSoilStats({...soilStats, moisture: Number(e.target.value)})} /></div>
                    </div>
                  </div>
                  <div className="lg:col-span-2 p-10 bg-white rounded-[3rem] shadow-sm flex flex-col items-center">
                    <h3 className="font-black text-gray-400 mb-8 uppercase text-[10px] tracking-[0.2em]">Visualized Trends (Area Chart)</h3>
                    <div className="w-full h-64 border-b border-l border-gray-100 mb-2">
                        <AreaChart data={[soilStats.N, soilStats.P, soilStats.K, soilStats.moisture]} color="#4A5D23" labels={['N','P','K','Hum.']} />
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* TAB: PLANT HEALTH */}
            {activeTab === 'plant' && (
              <div className="space-y-6 animate-in fade-in duration-500 text-center">
                <h2 className="text-2xl font-black text-left">Plant Health Intelligence</h2>
                <div className="p-8 bg-white rounded-[3rem] shadow-sm border border-white">
                    <h3 className="font-black text-gray-400 mb-8 uppercase text-[10px] tracking-widest underline decoration-green-400 decoration-4">Health Index</h3>
                    <div className="w-40 h-40 rounded-full border-[15px] border-[#4A5D23] border-t-gray-100 mx-auto flex items-center justify-center shadow-xl shadow-green-50"><span className="text-4xl font-black text-[#4A5D23]">92%</span></div>
                    <p className="mt-8 text-gray-400 font-bold text-sm uppercase italic">"Overall Condition: Optimal"</p>
                </div>
                <div className="p-6 bg-red-50 rounded-[2rem] border border-red-100 flex gap-4 text-left items-center">
                    <span className="text-4xl">🍄</span>
                    <div><h4 className="font-bold text-red-700">พบเชื้อราในโซน B</h4><p className="text-xs text-red-500 font-bold opacity-70">AI ตรวจพบความเสี่ยงสูง แนะนำให้ลดความชื้นในดินทันที</p></div>
                </div>
              </div>
            )}

            {/* TAB: ROBOT LIST (Fleet management) */}
            {activeTab === 'robot_list' && (
               <div className="space-y-6 animate-in fade-in duration-500">
                  <div className="flex justify-between items-center"><h2 className="text-2xl font-black">Bot Fleet</h2><button onClick={()=>setCurrentScreen('robot_setup')} className="bg-[#4A5D23] text-white px-5 py-2.5 rounded-full font-black text-xs shadow-xl transition-transform active:scale-95">+ จัดการหุ่นยนต์</button></div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                     {robots.map(r => (
                        <div key={r.id} className="p-6 bg-white rounded-[2.5rem] shadow-sm border border-white flex items-center gap-5">
                           <img src={r.image} className="w-20 h-20 rounded-2xl object-cover shadow-md border" />
                           <div className="flex-1">
                              <h4 className="font-black text-xl leading-tight">{r.name}</h4>
                              <p className="text-[10px] text-blue-500 font-bold uppercase tracking-widest mb-2">{r.status}</p>
                              <div className="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-green-500" style={{width:r.battery+'%'}}></div></div>
                              <p className="text-[8px] font-black text-gray-300 mt-1">BATTERY: {r.battery}%</p>
                           </div>
                        </div>
                     ))}
                  </div>
               </div>
            )}

            {/* TAB: REPORTS */}
            {activeTab === 'reports' && (
              <div className="space-y-6 animate-in fade-in duration-500">
                 <h2 className="text-2xl font-black">Statistics</h2>
                 <div className="p-10 bg-white rounded-[3.5rem] shadow-sm border border-white text-center">
                    <h3 className="font-black text-gray-400 mb-10 uppercase text-[10px] tracking-[0.2em]">Yield Performance (Mock)</h3>
                    <div className="flex justify-center items-end gap-10 h-40 border-b border-gray-50 pb-2 mb-8">
                       <div className="flex flex-col items-center gap-3"><div className="w-14 bg-gray-100 rounded-t-xl shadow-inner" style={{height:'35%'}}></div><span className="text-[8px] font-black opacity-40 uppercase">Normal</span></div>
                       <div className="flex flex-col items-center gap-3"><div className="w-14 bg-[#4A5D23] rounded-t-xl shadow-xl animate-pulse" style={{height:'88%'}}></div><span className="text-[8px] font-black text-[#4A5D23] uppercase tracking-widest">Farm OS (+45%)</span></div>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                       <div className="p-4 bg-green-50 rounded-2xl"><p className="text-[10px] font-bold text-green-700">ผลผลิต</p><p className="text-xl font-black">2.4 ตัน</p></div>
                       <div className="p-4 bg-orange-50 rounded-2xl"><p className="text-[10px] font-bold text-orange-700">ต้นทุน</p><p className="text-xl font-black">45,000 บ.</p></div>
                    </div>
                 </div>
              </div>
            )}

            {/* TAB: ALERTS (Notification Center with Filter) */}
            {activeTab === 'alerts' && (
              <div className="space-y-6 animate-in fade-in duration-500">
                 <h2 className="text-2xl font-black">Alerts</h2>
                 <div className="flex gap-2 overflow-x-auto pb-4 hide-scrollbar">
                    {['all', 'critical', 'warning', 'info'].map(f => (
                       <button key={f} onClick={()=>setAlertFilter(f)} className={`px-5 py-2.5 rounded-full text-[10px] font-black transition-all border-2 ${alertFilter===f ? 'bg-black border-black text-white shadow-xl' : 'bg-white border-gray-100 text-gray-400'}`}>
                          {f==='all' ? 'All' : f==='critical' ? '🔴 Critical' : f==='warning' ? '🟡 Warning' : '🔵 Info'}
                       </button>
                    ))}
                 </div>
                 <div className="space-y-4">
                    {filteredAlerts.length > 0 ? filteredAlerts.map(a => (
                       <div key={a.id} className={`p-6 rounded-[2rem] border-2 shadow-sm ${a.type==='critical' ? 'bg-red-50 border-red-100 text-red-700' : 'bg-white border-gray-50'}`}>
                          <div className="flex justify-between items-center mb-1"><h4 className="font-black text-lg">{a.title}</h4><span className="text-[10px] opacity-30 font-black">{a.time}</span></div>
                          <p className="text-sm opacity-60 font-bold mb-3">{a.detail}</p>
                          <span className="text-[9px] bg-gray-100 px-3 py-0.5 rounded-full font-black uppercase tracking-widest opacity-40">{a.zone}</span>
                       </div>
                    )) : <div className="text-center py-20 font-bold text-gray-300 italic">"No alerts found"</div>}
                 </div>
              </div>
            )}
            
            {activeTab === 'resource' && (
               <div className="space-y-6 animate-in fade-in duration-500">
                  <h2 className="text-2xl font-black">Controls</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                     {plantZones.map(z => (
                        <div key={z.id} className="p-8 bg-white rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col group hover:border-[#4A5D23] transition-all">
                           <div className="flex justify-between items-start mb-8">
                              <div><h3 className="font-black text-2xl tracking-tight tracking-tight">Zone {z.id}</h3><p className="text-xs text-gray-400 font-bold uppercase">{z.name}</p></div>
                              <span className={`w-14 h-14 rounded-2xl flex items-center justify-center font-black text-xl shadow-inner ${z.moisture < 40 ? 'bg-orange-100 text-orange-600 animate-pulse' : 'bg-blue-100 text-blue-600'}`}>{z.moisture}%</span>
                           </div>
                           <button className="w-full bg-blue-500 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-100 transition-transform active:scale-95">รดน้ำตอนนี้</button>
                        </div>
                     ))}
                  </div>
               </div>
            )}

          </main>

          {/* Nav Mobile */}
          <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-4 z-[400] rounded-t-[2.5rem] shadow-[0_-10px_25px_rgba(0,0,0,0.05)] pb-safe">
             <button onClick={() => setActiveTab('dashboard')} className={`text-2xl transition-all ${activeTab === 'dashboard' ? 'scale-125 text-[#4A5D23] opacity-100' : 'opacity-20'}`}>📊</button>
             <button onClick={() => setActiveTab('plant')} className={`text-2xl transition-all ${activeTab === 'plant' ? 'scale-125 text-[#4A5D23] opacity-100' : 'opacity-20'}`}>🌿</button>
             <button onClick={() => setActiveTab('soil')} className={`text-2xl transition-all ${activeTab === 'soil' ? 'scale-125 text-[#4A5D23] opacity-100' : 'opacity-20'}`}>🧪</button>
             <button onClick={() => setActiveTab('alerts')} className={`text-2xl transition-all ${activeTab === 'alerts' ? 'scale-125 text-[#4A5D23] opacity-100' : 'opacity-20'}`}>🔔</button>
             <button onClick={() => setShowMobileMenu(true)} className={`text-2xl transition-all ${showMobileMenu ? 'scale-125 text-[#4A5D23] opacity-100' : 'opacity-20'}`}>⚙️</button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
