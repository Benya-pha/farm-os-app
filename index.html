<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Farm OS | Smart Agriculture Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- ฟอนต์ Itim สำหรับความโค้งมน -->
  <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Itim', cursive; background-color: #FDFCF0; -webkit-tap-highlight-color: transparent; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .modal-enter { animation: zoomIn 0.3s ease-out; }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .area-chart-path { transition: d 0.6s ease-in-out; }
    
    /* Earth Tone Palette */
    .bg-earth-beige { background-color: #FDFCF0; }
    .bg-earth-sidebar { background-color: #EAE4D3; }
    .bg-earth-green { background-color: #4A5D23; }
    .text-earth-green { color: #4A5D23; }
    .border-earth-green { border-color: #4A5D23; }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="text-[#3E3A34] overflow-x-hidden">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Firebase Config ---
    const firebaseConfig = {
      apiKey: "AIzaSyDs8yRihR4Vz123JRjEA6SWcF-pw77c-qU",
      authDomain: "m4kul-1.firebaseapp.com",
      projectId: "m4kul-1",
      storageBucket: "m4kul-1.firebasestorage.app",
      messagingSenderId: "973526589558",
      appId: "1:973526589558:web:01a944e291077e240bff57",
      measurementId: "G-7QT0GT3J9J"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    
    // Direct Image Link Fix (ใช้ lh3.googleusercontent.com/d/ สำหรับดึงไฟล์ตรง)
    const APP_LOGO = "https://lh3.googleusercontent.com/d/1Idx_06TR21D44uHQjWC1arrQM0hD4LZ8";

    function App() {
      const [currentScreen, setCurrentScreen] = useState('splash');
      const [authStatus, setAuthStatus] = useState('checking');
      const [userData, setUserData] = useState({ 
        name: '', email: '', farmName: '', phone: '', role: 'เจ้าของฟาร์ม', 
        avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Somchai' 
      });
      
      const [robots, setRobots] = useState([
        { id: 1, name: 'FarmBot-Alpha', ip: '192.168.1.101', status: 'สแกนโรคพืช', zone: 'โซน A', battery: 85, image: 'https://api.dicebear.com/7.x/bottts/svg?seed=Alpha' },
        { id: 2, name: 'FarmBot-Beta', ip: '192.168.1.102', status: 'สถานีชาร์จ', zone: 'สถานีชาร์จ', battery: 100, image: 'https://api.dicebear.com/7.x/bottts/svg?seed=Beta' },
      ]);

      const [plantZones, setPlantZones] = useState([
        { id: 'A', name: 'ผักสลัด', moisture: 45, temp: 28, health: 95 },
        { id: 'B', name: 'มะเขือเทศ', moisture: 30, temp: 31, health: 65 },
      ]);

      const [soilStats, setSoilStats] = useState({ N: 65, P: 40, K: 55, moisture: 45 });
      
      const [alerts] = useState([
        { id: 1, type: 'critical', title: 'พบร่องรอยโรคราน้ำค้าง', zone: 'โซน B', time: '10 นาทีที่แล้ว', detail: 'AI ตรวจพบความผิดปกติบนใบ' },
        { id: 2, type: 'warning', title: 'ความชื้นดินต่ำกว่าเกณฑ์', zone: 'โซน B', time: '1 ชั่วโมงที่แล้ว', detail: 'ความชื้นลดลงเหลือ 30%' },
        { id: 3, type: 'info', title: 'หุ่นยนต์เชื่อมต่อสำเร็จ', zone: 'ระบบ', time: '2 ชั่วโมงที่แล้ว', detail: 'FarmBot-Beta ออนไลน์' },
      ]);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((user) => {
          if (user) {
            setUserData(prev => ({ 
              ...prev, 
              name: user.displayName, 
              email: user.email,
              avatar: user.photoURL || prev.avatar
            }));
            setAuthStatus('logged_in');
          } else { setAuthStatus('logged_out'); }
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (currentScreen === 'login' && authStatus === 'logged_in') { setCurrentScreen('dashboard'); }
      }, [currentScreen, authStatus]);

      const navigate = (screen) => setCurrentScreen(screen);

      return (
        <div className="min-h-screen">
          {currentScreen === 'splash' && <SplashScreen onFinish={() => navigate('login')} />}
          {currentScreen === 'login' && <LoginScreen onNext={() => navigate('register')} setUserData={setUserData} userData={userData} />}
          {currentScreen === 'register' && <RegisterScreen userData={userData} setUserData={setUserData} onNext={() => navigate('robot_setup')} />}
          {currentScreen === 'robot_setup' && <RobotSetup robots={robots} setRobots={setRobots} onNext={() => navigate('dashboard')} />}
          {currentScreen === 'dashboard' && (
            <FarmOS 
              userData={userData} setUserData={setUserData}
              robots={robots} setRobots={setRobots}
              plantZones={plantZones} setPlantZones={setPlantZones}
              soilStats={soilStats} setSoilStats={setSoilStats}
              alerts={alerts}
              onLogout={() => auth.signOut().then(() => navigate('login'))} 
              setCurrentScreen={setCurrentScreen}
            />
          )}
        </div>
      );
    }

    const SplashScreen = ({ onFinish }) => {
      useEffect(() => { const timer = setTimeout(onFinish, 2500); return () => clearTimeout(timer); }, [onFinish]);
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-earth-beige animate-in fade-in duration-1000">
          <img src={APP_LOGO} className="w-40 h-40 object-contain mb-4 drop-shadow-xl animate-bounce" />
          <h1 className="text-4xl font-black text-earth-green tracking-tighter">Farm OS</h1>
          <p className="text-[#8B5A2B] font-bold text-xs uppercase tracking-[0.4em]">Smart Ecosystem</p>
        </div>
      );
    };

    const LoginScreen = ({ onNext, setUserData, userData }) => {
      const [isLoading, setIsLoading] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');

      const handleGoogleLogin = () => {
        setIsLoading(true); setErrorMsg('');
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider)
          .then((result) => {
            setUserData({ ...userData, name: result.user.displayName, email: result.user.email, avatar: result.user.photoURL });
            setIsLoading(false); onNext();
          })
          .catch((error) => {
            setIsLoading(false);
            if (error.code === 'auth/unauthorized-domain') {
              setErrorMsg("โดเมน GitHub ยังไม่ได้รับอนุญาต (ให้ไปเพิ่ม benya-pha.github.io ใน Firebase Authorized Domains)");
            } else if (error.code === 'auth/operation-not-supported-in-this-environment') {
              setErrorMsg("พรีวิวโหมดไม่รองรับ Google Login ระบบจะจำลองข้อมูลให้...");
              setTimeout(() => { setUserData({...userData, name: 'คุณสมชาย (จำลอง)'}); onNext(); }, 2500);
            } else { setErrorMsg(error.message); }
          });
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-earth-beige">
          <div className="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl border border-gray-100 text-center animate-in zoom-in duration-500">
            <img src={APP_LOGO} className="w-24 h-24 mx-auto mb-8" />
            <h2 className="text-3xl font-black text-[#4A5D23] mb-2 tracking-tight tracking-tight">เข้าสู่ระบบ</h2>
            <p className="text-gray-400 mb-10 font-bold">เพื่อเริ่มต้นจัดการฟาร์มอัจฉริยะ</p>
            <div className="space-y-4">
              <button onClick={handleGoogleLogin} className="w-full bg-white border-2 border-gray-100 text-gray-700 py-4 rounded-[1.5rem] font-black hover:bg-gray-50 flex items-center justify-center gap-3">🌐 ล็อกอินด้วย Google</button>
              <button onClick={onNext} className="w-full bg-[#4A5D23] text-white py-4 rounded-[1.5rem] font-black hover:bg-[#3a4a1c] shadow-xl">📱 เบอร์โทรศัพท์ / อีเมล</button>
            </div>
            {errorMsg && <p className="mt-6 text-red-600 text-[10px] whitespace-pre-line font-bold leading-relaxed">{errorMsg}</p>}
          </div>
        </div>
      );
    };

    const RegisterScreen = ({ userData, setUserData, onNext }) => {
      const fileRef = useRef();
      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-earth-beige">
          <div className="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl border border-gray-100 text-center">
            <h2 className="text-2xl font-black text-[#4A5D23] mb-8">ตั้งค่าโปรไฟล์</h2>
            <div className="relative w-28 h-28 mx-auto mb-6 group">
              <img src={userData.avatar} className="w-full h-full rounded-full border-4 border-[#4A5D23] shadow-xl object-cover" />
              <button onClick={() => fileRef.current.click()} className="absolute bottom-0 right-0 bg-white p-2 rounded-full shadow-lg border border-gray-100">📷</button>
              <input type="file" ref={fileRef} className="hidden" accept="image/*" onChange={(e) => {
                const r = new FileReader(); r.onload = (ev) => setUserData({...userData, avatar: ev.target.result}); r.readAsDataURL(e.target.files[0]);
              }} />
            </div>
            <div className="space-y-4 text-left">
              <div><label className="text-[10px] font-bold text-gray-400 ml-3 uppercase">ชื่อเล่น</label><input type="text" className="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-green-100" value={userData.name} onChange={e => setUserData({...userData, name: e.target.value})} /></div>
              <div><label className="text-[10px] font-bold text-gray-400 ml-3 uppercase">ชื่อฟาร์ม</label><input type="text" className="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-green-100" value={userData.farmName} onChange={e => setUserData({...userData, farmName: e.target.value})} /></div>
            </div>
            <button onClick={onNext} className="w-full mt-10 bg-[#4A5D23] text-white py-4 rounded-2xl font-black text-xl shadow-xl hover:scale-105 transition-all">เริ่มต้นใช้งาน →</button>
          </div>
        </div>
      );
    };

    const RobotSetup = ({ robots, setRobots, onNext }) => {
      const [editingBot, setEditingBot] = useState(null);
      const [isManage, setIsManage] = useState(false);
      const botFileRef = useRef();

      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-earth-beige">
          {editingBot ? (
            <div className="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm modal-enter text-center">
              <h2 className="text-xl font-bold mb-8">ตั้งค่าหุ่นยนต์</h2>
              <div className="relative w-24 h-24 mx-auto mb-6">
                 <img src={editingBot.image} className="w-full h-full rounded-2xl object-cover shadow-inner border" />
                 <button onClick={() => botFileRef.current.click()} className="absolute -bottom-2 -right-2 bg-white p-1.5 rounded-full shadow border">📷</button>
                 <input type="file" ref={botFileRef} className="hidden" onChange={(e) => {
                   const r = new FileReader(); r.onload = (ev) => setEditingBot({...editingBot, image: ev.target.result}); r.readAsDataURL(e.target.files[0]);
                 }} />
              </div>
              <input type="text" placeholder="ชื่อหุ่นยนต์" className="w-full border p-3 rounded-xl mb-4 outline-none" value={editingBot.name} onChange={e=>setEditingBot({...editingBot, name: e.target.value})} />
              <input type="text" placeholder="IP Address" className="w-full border p-3 rounded-xl mb-6 outline-none" value={editingBot.ip} onChange={e=>setEditingBot({...editingBot, ip: e.target.value})} />
              <div className="flex gap-2">
                <button onClick={() => setEditingBot(null)} className="flex-1 bg-gray-50 py-3 rounded-xl font-bold text-gray-400">ยกเลิก</button>
                <button onClick={() => { if(robots.find(r=>r.id===editingBot.id)) { setRobots(robots.map(r=>r.id===editingBot.id?editingBot:r)); } else { setRobots([...robots, editingBot]); } setEditingBot(null); }} className="flex-1 bg-[#4A5D23] text-white py-3 rounded-xl font-bold shadow-lg">บันทึก</button>
              </div>
            </div>
          ) : (
            <>
              <h1 className="text-3xl font-black text-[#4A5D23] mb-1 tracking-tight">เลือกหุ่นยนต์</h1>
              <p className="text-gray-400 text-xs font-bold mb-8 uppercase tracking-[0.2em]">Select robot to control</p>
              <div className="flex flex-wrap justify-center gap-6">
                {robots.map(r => (
                  <div key={r.id} className="relative">
                    {isManage && <button onClick={() => setRobots(robots.filter(b => b.id !== r.id))} className="absolute -top-2 -right-2 bg-red-500 text-white w-7 h-7 rounded-full z-10 font-bold shadow-lg border-2 border-white">✕</button>}
                    <div onClick={() => isManage && setEditingBot(r)} className={`w-28 h-28 rounded-[2.5rem] bg-white shadow-xl flex items-center justify-center overflow-hidden border-4 ${isManage ? 'border-blue-200 scale-110' : 'border-white'} transition-all`}><img src={r.image} className="w-full h-full object-cover" /></div>
                    <p className="text-center mt-3 font-bold text-sm text-gray-600">{r.name}</p>
                  </div>
                ))}
                <div onClick={() => setEditingBot({id:Date.now(), name:'New Bot', ip:'', image:'https://api.dicebear.com/7.x/bottts/svg?seed='+Date.now()})} className="w-28 h-28 rounded-[2.5rem] border-4 border-dashed border-gray-300 flex items-center justify-center text-4xl text-gray-300 cursor-pointer hover:border-green-400 transition-all">➕</div>
              </div>
              <div className="mt-16 flex flex-col gap-4 w-full max-w-xs">
                <button onClick={onNext} className="w-full bg-[#4A5D23] text-white py-4 rounded-full font-black text-xl shadow-2xl hover:scale-105 transition-all">เข้าสู่ Dashboard →</button>
                <button onClick={() => setIsManage(!isManage)} className="text-blue-600 font-bold underline text-sm">{isManage ? 'เสร็จสิ้นการตั้งค่า' : 'จัดการหุ่นยนต์'}</button>
              </div>
            </>
          )}
        </div>
      );
    };

    // --- Components: SVG Area Chart ---
    const AreaChart = ({ data, color }) => {
      const max = 100;
      const points = data.map((d, i) => `${(i / (data.length - 1)) * 100},${100 - (d / max) * 100}`).join(' ');
      const fillPoints = `0,100 ${points} 100,100`;
      return (
        <div className="w-full h-full relative p-2">
           <svg viewBox="0 0 100 100" className="w-full h-full overflow-visible" preserveAspectRatio="none">
             {/* Grid Lines */}
             <line x1="0" y1="0" x2="100" y2="0" stroke="#f3f4f6" strokeWidth="0.5" />
             <line x1="0" y1="25" x2="100" y2="25" stroke="#f3f4f6" strokeWidth="0.5" />
             <line x1="0" y1="50" x2="100" y2="50" stroke="#f3f4f6" strokeWidth="0.5" />
             <line x1="0" y1="75" x2="100" y2="75" stroke="#f3f4f6" strokeWidth="0.5" />
             <line x1="0" y1="100" x2="100" y2="100" stroke="#e5e7eb" strokeWidth="1" />
             
             {/* Area Fill */}
             <polygon points={fillPoints} fill={color} fillOpacity="0.15" className="area-chart-path" />
             {/* Line */}
             <polyline points={points} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="area-chart-path" />
             
             {/* Dots */}
             {data.map((d, i) => (
               <circle key={i} cx={(i / (data.length - 1)) * 100} cy={100 - (d / max) * 100} r="3" fill="white" stroke={color} strokeWidth="2" />
             ))}
           </svg>
        </div>
      );
    };

    const FarmOS = ({ userData, setUserData, robots, setRobots, plantZones, soilStats, setSoilStats, alerts, onLogout, setCurrentScreen }) => {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [alertFilter, setAlertFilter] = useState('all');
      const [showProfileEditor, setShowProfileEditor] = useState(false);
      const [showMobileMenu, setShowMobileMenu] = useState(false);
      const profFileRef = useRef();

      const menuItems = [
        { id: 'dashboard', label: 'ภาพรวม', icon: '📊' },
        { id: 'plant', label: 'สุขภาพพืช', icon: '🌿' },
        { id: 'soil', label: 'วิเคราะห์ดิน', icon: '🧪' },
        { id: 'resource', label: 'ควบคุมระบบ', icon: '💧' },
      ];

      const filteredAlerts = alertFilter === 'all' ? alerts : alerts.filter(a => a.type === alertFilter);

      return (
        <div className="flex flex-col md:flex-row h-screen relative bg-[#FDFCF0]">
          
          {/* Profile Editor Modal */}
          {showProfileEditor && (
            <div className="fixed inset-0 bg-black/50 z-[400] flex items-center justify-center p-4 backdrop-blur-sm">
               <div className="bg-white p-8 rounded-[2.5rem] w-full max-w-sm modal-enter text-center">
                  <h3 className="text-xl font-black mb-8">แก้ไขโปรไฟล์</h3>
                  <div className="relative w-24 h-24 mx-auto mb-6 group">
                    <img src={userData.avatar} className="w-full h-full rounded-full border-4 border-[#4A5D23] object-cover shadow-xl" />
                    <button onClick={()=>profFileRef.current.click()} className="absolute bottom-0 right-0 bg-white p-2 rounded-full shadow border">📷</button>
                    <input type="file" ref={profFileRef} className="hidden" accept="image/*" onChange={(e)=>{
                      const r = new FileReader(); r.onload = (ev) => setUserData({...userData, avatar: ev.target.result}); r.readAsDataURL(e.target.files[0]);
                    }} />
                  </div>
                  <div className="space-y-4 text-left">
                    <input type="text" className="w-full border p-3 rounded-xl mb-4" value={userData.name} onChange={e=>setUserData({...userData, name: e.target.value})} placeholder="ชื่อ" />
                    <input type="text" className="w-full border p-3 rounded-xl mb-6" value={userData.farmName} onChange={e=>setUserData({...userData, farmName: e.target.value})} placeholder="ชื่อฟาร์ม" />
                  </div>
                  <button onClick={() => setShowProfileEditor(false)} className="w-full bg-[#4A5D23] text-white py-3 rounded-2xl font-bold shadow-lg">บันทึกข้อมูล</button>
                  <button onClick={() => setShowProfileEditor(false)} className="mt-4 text-gray-400 font-bold block w-full text-center">ยกเลิก</button>
               </div>
            </div>
          )}

          {/* Management Menu (Mobile Drawer) */}
          {showMobileMenu && (
             <div className="fixed inset-0 bg-black/60 z-[350] flex items-end backdrop-blur-sm">
                <div className="w-full bg-white rounded-t-[3rem] p-8 pb-14 modal-enter shadow-2xl">
                   <div className="flex justify-between items-center mb-8"><h3 className="text-2xl font-black text-[#4A5D23]">เมนูจัดการ</h3><button onClick={()=>setShowMobileMenu(false)} className="text-3xl text-gray-200">✕</button></div>
                   <div className="grid grid-cols-2 gap-4">
                      <button onClick={()=>{setActiveTab('robot_list'); setShowMobileMenu(false);}} className="p-6 bg-gray-50 rounded-[2rem] flex flex-col items-center gap-2 border">
                         <span className="text-4xl">🤖</span><span className="font-bold">จัดการหุ่นยนต์</span>
                      </button>
                      <button onClick={()=>{setActiveTab('reports'); setShowMobileMenu(false);}} className="p-6 bg-gray-50 rounded-[2rem] flex flex-col items-center gap-2 border">
                         <span className="text-4xl">📈</span><span className="font-bold">สถิติระบบ</span>
                      </button>
                      <button onClick={()=>{setShowProfileEditor(true); setShowMobileMenu(false);}} className="col-span-2 p-6 bg-blue-50 rounded-[2rem] flex flex-col items-center gap-2 border border-blue-100">
                         <span className="text-3xl">👤</span><span className="font-bold text-blue-700">แก้ไขข้อมูลส่วนตัว</span>
                      </button>
                   </div>
                   <button onClick={onLogout} className="w-full mt-6 py-4 bg-red-50 text-red-500 rounded-2xl font-black shadow-inner">Log Out</button>
                </div>
             </div>
          )}

          {/* Sidebar Desktop */}
          <aside className="hidden md:flex flex-col w-64 bg-[#EAE4D3] h-full border-r border-[#D9D1BE] p-6 shadow-sm">
            <div className="flex items-center gap-3 mb-10">
              <img src={APP_LOGO} className="w-10 h-10 object-contain" />
              <h1 className="text-2xl font-black text-[#4A5D23] truncate">{userData.farmName || 'Farm OS'}</h1>
            </div>
            <div className="flex-1 space-y-1.5 overflow-y-auto hide-scrollbar">
              {menuItems.map(item => (
                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-left transition-all ${activeTab === item.id ? 'bg-[#4A5D23] text-white shadow-xl scale-105' : 'text-[#5C564B] hover:bg-white/40'}`}>
                  <span className="text-xl">{item.icon}</span> {item.label}
                </button>
              ))}
              <button onClick={() => setActiveTab('robot_list')} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-left transition-all ${activeTab === 'robot_list' ? 'bg-[#4A5D23] text-white' : 'text-[#5C564B] hover:bg-white/40'}`}><span>🤖</span> หุ่นยนต์</button>

                    <div key={z.id} className="p-8 bg-white rounded-[3rem] shadow-sm border group hover:border-[#4A5D23] transition-all flex flex-col">
                       <div className="flex justify-between items-start mb-8">
                          <div><h3 className="font-black text-2xl text-gray-800 tracking-tight">Zone {z.id}</h3><p className="text-xs font-bold text-gray-400 uppercase tracking-widest">{z.name}</p></div>
                          <span className={`w-14 h-14 rounded-2xl flex items-center justify-center font-black text-xl shadow-inner ${z.moisture < 40 ? 'bg-orange-100 text-orange-500 animate-pulse' : 'bg-blue-100 text-blue-600'}`}>{z.moisture}%</span>
                       </div>
                       <button className="w-full bg-blue-500 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-100 hover:bg-blue-600">Activate Water</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* TAB: ROBOT */}
            {activeTab === 'robot' && (
              <div className="space-y-6 animate-in fade-in duration-500">
                <div className="flex justify-between items-center"><h2 className="text-2xl font-black">OPERATIVE BOTS</h2><button onClick={() => setCurrentScreen('robot_setup')} className="bg-[#4A5D23] text-white px-5 py-2.5 rounded-full font-black text-xs shadow-xl">+ จัดการ</button></div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                   {robots.map(r => (
                     <div key={r.id} className="p-8 bg-white rounded-[3rem] shadow-sm flex items-center gap-6 border border-white hover:border-green-100 transition-all">
                        <img src={r.image} className="w-20 h-20 rounded-[1.5rem] object-cover border shadow-md" />
                        <div className="flex-1">
                           <h4 className="font-black text-xl text-gray-800 leading-tight">{r.name}</h4>
                           <p className="text-[10px] text-blue-600 font-bold uppercase tracking-[0.2em] mb-3">{r.status}</p>
                           <div className="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden mb-1"><div className="h-full bg-green-500" style={{width: r.battery+'%'}}></div></div>
                           <p className="text-[8px] font-black text-gray-300">BATTERY {r.battery}%</p>
                        </div>
                     </div>
                   ))}
                </div>
              </div>
            )}

            {/* TAB: STATS (Reports) */}
            {activeTab === 'reports' && (
              <div className="space-y-6 animate-in fade-in duration-500 text-center">
                 <h2 className="text-2xl font-black text-left">Farm Intelligence Statistics</h2>
                 <div className="p-10 bg-white rounded-[3.5rem] shadow-sm border border-white">
                    <h3 className="font-black text-gray-400 mb-10 uppercase text-[10px] tracking-[0.3em]">Yield Improvement Rate</h3>
                    <div className="flex justify-center items-end gap-10 h-40 border-b border-gray-50 pb-2">
                       <div className="flex flex-col items-center gap-3"><div className="w-16 bg-gray-100 rounded-t-2xl" style={{height:'35%'}}></div><span className="text-[8px] font-black opacity-40">LAST SEASON</span></div>
                       <div className="flex flex-col items-center gap-3"><div className="w-16 bg-[#4A5D23] rounded-t-2xl shadow-xl shadow-green-100 animate-pulse" style={{height:'88%'}}></div><span className="text-[8px] font-black text-earth-green">FARM OS MODE (+45%)</span></div>
                    </div>
                    <p className="mt-10 text-[11px] font-bold text-gray-400">สรุป: ผลผลิตในรอบปัจจุบันเพิ่มขึ้น 45% จากการควบคุมน้ำและแร่ธาตุด้วย AI</p>
                 </div>
              </div>
            )}

            {/* TAB: ALERTS (Notification Center) */}
            {activeTab === 'alerts' && (
              <div className="space-y-6 animate-in fade-in duration-500">
                 <h2 className="text-2xl font-black">Alert Hub</h2>
                 <div className="flex gap-2 overflow-x-auto pb-4 hide-scrollbar">
                   {['all', 'critical', 'warning', 'info'].map(f => (
                     <button key={f} onClick={()=>setAlertFilter(f)} className={`px-5 py-2 rounded-full text-xs font-black transition-all border-2 ${alertFilter === f ? 'bg-black border-black text-white' : 'bg-white border-gray-100 text-gray-400'}`}>
                       {f === 'all' ? 'All' : f === 'critical' ? '🔴 Critical' : f === 'warning' ? '🟡 Warning' : '🔵 Info'}
                     </button>
                   ))}
                 </div>
                 <div className="space-y-4">
                    {filteredAlerts.length > 0 ? filteredAlerts.map(a => (
                      <div key={a.id} className={`p-6 rounded-[2.5rem] border-2 shadow-sm ${a.type==='critical'?'bg-red-50 border-red-100 text-red-700':'bg-white border-gray-100'}`}>
                         <div className="flex justify-between items-center mb-1"><h4 className="font-black text-lg">{a.title}</h4><span className="text-[10px] opacity-40">{a.time}</span></div>
                         <p className="text-sm opacity-70 font-bold mb-3">{a.detail}</p>
                         <span className="text-[9px] bg-gray-100 px-3 py-1 rounded-full font-black uppercase tracking-widest opacity-50">{a.zone}</span>
                      </div>
                    )) : <div className="text-center py-20 font-bold text-gray-300">ไม่มีการแจ้งเตือนในขณะนี้</div>}
                 </div>
              </div>
            )}
          </main>

          {/* Bottom Nav Mobile */}
          <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-4 z-[150] rounded-t-[2.5rem] shadow-2xl">
             <button onClick={() => setActiveTab('dashboard')} className={`text-2xl transition-all ${activeTab === 'dashboard' ? 'scale-125 text-[#4A5D23] opacity-100' : 'opacity-20'}`}>📊</button>
             <button onClick={() => setActiveTab('resource')} className={`text-2xl transition-all ${activeTab === 'resource' ? 'scale-125 text-[#4A5D23] opacity-100' : 'opacity-20'}`}>💧</button>
             <button onClick={() => setActiveTab('soil')} className={`text-2xl transition-all ${activeTab === 'soil' ? 'scale-125 text-[#4A5D23] opacity-100' : 'opacity-20'}`}>🧪</button>
             <button onClick={() => setActiveTab('alerts')} className={`text-2xl transition-all ${activeTab === 'alerts' ? 'scale-125 text-[#4A5D23] opacity-100' : 'opacity-20'}`}>🔔</button>
             <button onClick={() => setShowMobileMenu(true)} className="text-2xl opacity-20">⚙️</button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
