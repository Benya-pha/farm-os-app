  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        fontFamily: {
          sans: ['Prompt', 'sans-serif'],
          mono: ['DM Mono', 'monospace'],
        },
        extend: {
          colors: { primary: '#10b981', 'primary-dark': '#059669' },
          animation: {
            blob: "blob 15s infinite alternate",
            scan: "scan 3s linear infinite",
            toastIn: "toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards",
            toastOut: "toastOut 0.3s ease-in forwards",
            rain: "rain 0.8s linear infinite",
            float: "float 4s ease-in-out infinite",
            slideUp: "slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards"
          },
          keyframes: {
            blob: {
              "0%": { transform: "translate(0px, 0px) scale(1)" },
              "33%": { transform: "translate(5vw, -10vh) scale(1.1)" },
              "66%": { transform: "translate(-5vw, 10vh) scale(0.9)" },
              "100%": { transform: "translate(0px, 0px) scale(1)" },
            },
            scan: {
              "0%": { top: "-10%" },
              "100%": { top: "110%" },
            },
            toastIn: {
              "0%": { opacity: 0, transform: "translateY(-30px) scale(0.9)" },
              "100%": { opacity: 1, transform: "translateY(0) scale(1)" }
            },
            toastOut: {
              "0%": { opacity: 1, transform: "translateY(0) scale(1)" },
              "100%": { opacity: 0, transform: "translateY(-20px) scale(0.9)" }
            },
            rain: {
              "0%": { transform: "translateY(-5px)", opacity: 0 },
              "50%": { opacity: 1 },
              "100%": { transform: "translateY(5px)", opacity: 0 }
            },
            float: {
              "0%, 100%": { transform: "translateY(0)" },
              "50%": { transform: "translateY(-8px)" }
            },
            slideUp: {
              "0%": { opacity: 0, transform: "translateY(20px)" },
              "100%": { opacity: 1, transform: "translateY(0)" }
            }
          }
        }
      }
    }
  </script>

    .glass-input { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.8); transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }

    .gradient-text { background: linear-gradient(135deg, #059669, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .dark .gradient-text { background: linear-gradient(135deg, #34d399, #6ee7b7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    input[type="range"] { accent-color: #10b981; background: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.3); }
    .dark input[type="range"] { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); }

    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.4); border-radius: 10px; }
    .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(16, 185, 129, 0.7); }

            <span className="truncate tracking-wide flex-1">{message}</span>
          </div>
        </div>
      );
    };

    const TopControls = ({ lang, setLang, isDarkMode, setIsDarkMode }) => (
       <div id="top-controls" className="absolute top-5 md:top-8 right-5 md:right-10 z-[100] flex gap-3">
         <button onClick={() => setLang(lang === 'th' ? 'en' : 'th')} className="glass-panel px-5 py-2.5 rounded-[1rem] text-xs font-black text-gray-800 dark:text-white hover:bg-white/80 dark:hover:bg-slate-800/80 transition-all duration-300 uppercase tracking-[0.2em] shadow-md hover:-translate-y-0.5">{lang === 'th' ? 'EN' : 'TH'}</button>
         <button onClick={() => setIsDarkMode(!isDarkMode)} className="glass-panel p-2.5 rounded-[1rem] text-gray-800 dark:text-yellow-400 hover:bg-white/80 dark:hover:bg-slate-800/80 transition-all duration-300 shadow-md hover:-translate-y-0.5">
            {isDarkMode ? <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg> 
                        : <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>}
         </button>
       </div>
    );

    // --- MAIN APP COMPONENT ---
    function App() {
      const [currentScreen, setCurrentScreen] = useState('splash');
      const [lang, setLang] = useState('th');
      const [isDarkMode, setIsDarkMode] = useState(false);
      const [toastMsg, setToastMsg] = useState('');
      const t = i18n[lang];

      const showToast = (msg) => { setToastMsg(''); setTimeout(()=>setToastMsg(msg), 50); };

      const [savedAccounts, setSavedAccounts] = useState(() => {
        const saved = localStorage.getItem('farmos_accounts'); return saved ? JSON.parse(saved) : [];
      });
      useEffect(() => { localStorage.setItem('farmos_accounts', JSON.stringify(savedAccounts)); }, [savedAccounts]);
      useEffect(() => { if (isDarkMode) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); }, [isDarkMode]);

      // --- Global Interactive States ---
      const [userData, setUserData] = useState({ 
        id: null, isGoogleAuth: false, name: '', farmName: '', role: 'Owner', 
        avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Farmer&backgroundColor=transparent',
        farms: [] 
      });
      
      const [robots, setRobots] = useState([
        { id: 1, name: 'FarmBot-Alpha', ip: '192.168.1.101', status: 'Active (Scanning)', battery: 85, image: 'https://api.dicebear.com/7.x/bottts/svg?seed=Alpha&backgroundColor=transparent' },
        { id: 2, name: 'FarmBot-Beta', ip: '192.168.1.102', status: 'Charging', battery: 40, image: 'https://api.dicebear.com/7.x/bottts/svg?seed=Beta&backgroundColor=transparent' },
        { id: 3, name: 'FarmBot-Delta', ip: '192.168.1.103', status: 'Standby', battery: 95, image: 'https://api.dicebear.com/7.x/bottts/svg?seed=Delta&backgroundColor=transparent' }
      ]);
      const [plantZones, setPlantZones] = useState([
        { id: 'A', name: 'Zone A (Lettuce)', emoji: '🥬', health: 95, moisture: 45, issue: null, color: 'from-emerald-400/60 to-emerald-300/60' },
        { id: 'B', name: 'Zone B (Tomato)', emoji: '🍅', health: 65, moisture: 30, issue: 'Fungus', color: 'from-red-400/60 to-orange-300/60' },
        { id: 'C', name: 'Zone C (Melon)', emoji: '🍈', health: 88, moisture: 42, issue: null, color: 'from-yellow-400/60 to-orange-300/60' },
        { id: 'D', name: 'Zone D (Strawberry)', emoji: '🍓', health: 75, moisture: 38, issue: 'Aphids', color: 'from-pink-400/60 to-rose-300/60' }
      ]);
      const [soilStats, setSoilStats] = useState({ N: 65, P: 40, K: 55, moisture: 45, pH: 6.2 });
      const [alerts, setAlerts] = useState([
        { id: 1, type: 'urgent', text: 'พบจุดสีน้ำตาลบนใบ (Suspected Rust)', time: 'Just now', zone: 'Zone A' },
        { id: 2, type: 'warn', text: 'ความชื้นดินโซน B แห้งเกินไป', time: '1 hr ago', zone: 'Zone B' },
        { id: 3, type: 'info', text: 'FarmBot-Beta กำลังชาร์จแบตเตอรี่', time: '2 hrs ago', zone: 'System' }
      ]);
      
      const [autoSprinklerOn, setAutoSprinklerOn] = useState(false);

      useEffect(() => {
        if (userData.role !== 'guest' && userData.id) {
          if (userData.isGoogleAuth && auth && auth.currentUser) {
            const unsubscribe = db.collection('artifacts').doc(appId).collection('users').doc(auth.currentUser.uid).collection('robots')
              .onSnapshot(snapshot => { if (!snapshot.empty) setRobots(snapshot.docs.map(doc => ({ ...doc.data(), id: doc.data().id || doc.id }))); });
            return () => unsubscribe();
          } else {
            const local = localStorage.getItem('farmos_robots_' + userData.id); if (local) setRobots(JSON.parse(local)); 
          }
        }
      }, [userData.id, userData.role, userData.isGoogleAuth]);

      const handleLogout = () => {
        if (userData.isGoogleAuth && auth && auth.currentUser) auth.signOut().catch(()=>{});
        setUserData({ id: null, isGoogleAuth: false, name: '', farmName: '', role: 'Owner', avatar: '', farms: [] });
        setCurrentScreen('login');
      };

      const sharedProps = { t, lang, setLang, isDarkMode, setIsDarkMode, savedAccounts, setSavedAccounts, showToast };

      return (
        <div className="min-h-screen font-sans relative flex flex-col items-center">
          <Toast message={toastMsg} onClose={() => setToastMsg('')} />
          <LiquidBackground />
          <div className="relative z-10 w-full h-full min-h-screen flex">
            {currentScreen === 'splash' && <SplashScreen onFinish={() => setCurrentScreen('login')} t={t} />}
            {currentScreen === 'login' && <LoginScreen 
              onRegister={() => setCurrentScreen('register')} 
              onLoginDirect={() => setCurrentScreen('dashboard')}
              onGuest={() => {
                setUserData({...userData, id: 'guest_'+Date.now(), name: lang==='th'?'ผู้เยี่ยมชม':'Guest', farmName: 'Demo Farm', role: 'guest', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Guest&backgroundColor=transparent', farms: [{id: 'demo1', name: 'Demo Farm'}]});
                setCurrentScreen('dashboard');
              }} 
              setUserData={setUserData} userData={userData} {...sharedProps} 
            />}
            {currentScreen === 'register' && <RegisterScreen userData={userData} setUserData={setUserData} onNext={() => setCurrentScreen('robot_setup')} {...sharedProps} />}
            {currentScreen === 'robot_setup' && <RobotSetup userData={userData} robots={robots} setRobots={setRobots} onNext={() => setCurrentScreen('dashboard')} {...sharedProps} />}
            {currentScreen === 'dashboard' && (
              <FarmOS 
                userData={userData} setUserData={setUserData}
                robots={robots} setRobots={setRobots}
                plantZones={plantZones} setPlantZones={setPlantZones}
                soilStats={soilStats} setSoilStats={setSoilStats} 
                alerts={alerts} setAlerts={setAlerts}
                autoSprinklerOn={autoSprinklerOn} setAutoSprinklerOn={setAutoSprinklerOn}
                onLogout={handleLogout} setCurrentScreen={setCurrentScreen} {...sharedProps}
              />
            )}
          </div>
        </div>
      );
    }

    // --- SCREENS (Auth & Setup) ---
    const SplashScreen = ({ onFinish, t }) => {
      useEffect(() => { const timer = setTimeout(onFinish, 1800); return () => clearTimeout(timer); }, []);
      return (
        <div className="flex w-full items-center justify-center min-h-screen p-4">
          <div className="flex flex-col items-center animate-in duration-1000 glass-panel-strong p-12 md:p-20 rounded-[3rem] shadow-[0_20px_60px_rgba(0,0,0,0.15)] dark:shadow-[0_20px_60px_rgba(0,0,0,0.4)]">
            <AppLogo className="w-40 h-40 md:w-52 md:h-52 drop-shadow-2xl mb-8" />
            <h1 className="text-5xl md:text-7xl font-black gradient-text tracking-tighter mb-4 drop-shadow-sm">{t.app_name}</h1>
            <p className="text-emerald-700 dark:text-emerald-400 font-bold text-xs md:text-sm uppercase tracking-[0.3em]">{t.platform_desc}</p>
          </div>
        </div>
      );
    };

    const LoginScreen = ({ onRegister, onLoginDirect, onGuest, setUserData, userData, savedAccounts, setSavedAccounts, t, lang, setLang, isDarkMode, setIsDarkMode, showToast }) => {
      const [isLoading, setIsLoading] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');

      const handleGoogleLogin = () => {
        setIsLoading(true); setErrorMsg('');
        if(!auth) { setErrorMsg('No Firebase connection available.'); setIsLoading(false); return; }
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then((result) => {
            const fName = `${result.user.displayName}'s Farm`;
            const newAcc = { id: result.user.uid, isGoogleAuth: true, name: result.user.displayName, farmName: fName, role: 'Owner', avatar: result.user.photoURL, farms: [{id: 'f1', name: fName}] };
            if (!savedAccounts.find(a => a.id === newAcc.id)) setSavedAccounts(prev => [...prev, newAcc]);
            setUserData(newAcc); setIsLoading(false); 
            savedAccounts.find(a => a.id === newAcc.id) ? onLoginDirect() : onRegister();
          }).catch((error) => {
            setIsLoading(false); if (error.code === 'auth/unauthorized-domain') { setErrorMsg(t.demo_mode_msg); setTimeout(() => createRandomProfile(), 1500); } else setErrorMsg(error.message);
          });
      };

      const createRandomProfile = () => {
        const fName = lang === 'th' ? 'ฟาร์มไฮเทค' : 'Hi-Tech Farm';
        const newAcc = { id: 'local_' + Date.now(), isGoogleAuth: false, name: lang === 'th' ? 'ชาวนา AI' : 'AI Farmer', farmName: fName, role: 'Owner', avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${Math.random()}&backgroundColor=transparent`, farms: [{id: 'f1', name: fName}] };
        setSavedAccounts(prev => [newAcc, ...prev]); setUserData(newAcc); showToast(`Welcome, ${newAcc.name}!`); onLoginDirect();
      };

      const removeAccount = (e, id) => {
        e.stopPropagation();
        setSavedAccounts(savedAccounts.filter(a => a.id !== id));
        showToast("Account removed");
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-screen w-full p-4 relative">
          <TopControls lang={lang} setLang={setLang} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />
          <div className="w-full max-w-[420px] glass-panel-strong p-8 md:p-12 rounded-[2.5rem] relative z-10 modal-enter shadow-[0_20px_50px_rgba(0,0,0,0.15)] dark:shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
            <div className="text-center mb-10">
              <div className="inline-block p-5 bg-white/60 dark:bg-black/40 rounded-[2rem] shadow-inner mb-6 border border-white/50"><AppLogo className="w-16 h-16" /></div>
              <h2 className="text-3xl md:text-4xl font-black text-gray-900 dark:text-white tracking-tight drop-shadow-md">{t.login}</h2>
            </div>
            <div className="space-y-5 w-full">
              {savedAccounts.length > 0 && (
                <div className="mb-8 w-full text-left">
                   <p className="text-[10px] font-black text-gray-500 dark:text-gray-400 uppercase tracking-[0.2em] mb-4 pl-2">{t.saved_accounts}</p>
                   <div className="space-y-3 max-h-[240px] overflow-y-auto custom-scroll pr-2">
                     {savedAccounts.map(acc => (
                       <div key={acc.id} onClick={() => {setUserData({...acc, farms: acc.farms || [{id:'default', name:acc.farmName}]}); showToast(`Welcome back!`); onLoginDirect();}} className="glass-card flex items-center gap-4 p-3 sm:p-4 rounded-[1.5rem] cursor-pointer group relative overflow-hidden shadow-sm">
                          <img src={acc.avatar} className="w-12 h-12 rounded-[1rem] object-cover border-2 border-white/60 bg-white/60 shadow-sm" />
                          <div className="flex-1 overflow-hidden">
                            <p className="text-sm sm:text-base font-black text-gray-900 dark:text-white truncate tracking-tight">{acc.name}</p>
                            <p className="text-[10px] sm:text-xs text-emerald-700 dark:text-emerald-400 font-bold truncate">{acc.farmName}</p>
                          </div>
                          <button onClick={(e) => removeAccount(e, acc.id)} className="p-2.5 text-gray-400 hover:text-white hover:bg-red-500 rounded-xl transition-all duration-300 md:opacity-0 md:group-hover:opacity-100 z-20 shadow-sm">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                          </button>
                       </div>
                     ))}
                   </div>
                </div>
              )}
              <button onClick={handleGoogleLogin} disabled={isLoading} className="w-full glass-card text-gray-900 dark:text-white py-4 rounded-[1.5rem] font-black hover:bg-white/70 flex items-center justify-center gap-3 transition-transform duration-300 hover:-translate-y-1 shadow-md text-sm sm:text-base">
                <svg className="w-6 h-6 drop-shadow-sm" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                {isLoading ? t.connecting : t.login_google}
              </button>
              <button onClick={createRandomProfile} className="w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-white py-4 rounded-[1.5rem] font-black shadow-[0_10px_30px_rgba(16,185,129,0.3)] flex items-center justify-center gap-3 border border-emerald-400/50 hover:brightness-110 transition-all duration-300 hover:-translate-y-1 text-sm sm:text-base">
                 {t.random_profile}
              </button>
              <div className="relative flex items-center py-2"><div className="flex-grow border-t border-white/50 dark:border-white/20"></div><span className="mx-4 text-gray-500 font-black text-[10px] uppercase tracking-[0.2em]">{t.or_choice}</span><div className="flex-grow border-t border-white/50 dark:border-white/20"></div></div>
              <button onClick={onGuest} className="w-full glass-card text-gray-700 dark:text-gray-300 py-4 rounded-[1.5rem] font-black flex items-center justify-center gap-2 border-dashed border-2 hover:bg-white/60 transition-all duration-300 hover:-translate-y-1 shadow-sm text-sm sm:text-base">
                 {t.guest_login}
              </button>
            </div>
            {errorMsg && <div className="mt-6 p-4 bg-red-500/20 border border-red-500/40 text-red-800 dark:text-red-300 font-bold text-sm text-center rounded-[1.5rem] animate-pulse shadow-inner">{errorMsg}</div>}
          </div>
        </div>
      );
    };

    const RegisterScreen = ({ userData, setUserData, savedAccounts, setSavedAccounts, onNext, t, lang, setLang, isDarkMode, setIsDarkMode, showToast }) => {
      const fileRef = useRef();
      const handleSaveAndNext = () => {
         const newAcc = { ...userData, id: userData.id || 'local_' + Date.now(), farms: [{id: 'f1', name: userData.farmName}] };
         const existingIndex = savedAccounts.findIndex(a => a.id === newAcc.id);
         if (existingIndex >= 0) { const newSaved = [...savedAccounts]; newSaved[existingIndex] = newAcc; setSavedAccounts(newSaved); } 
         else { setSavedAccounts([newAcc, ...savedAccounts]); }
         setUserData(newAcc); showToast(`Profile created!`); onNext();
      };
      return (
        <div className="flex flex-col items-center justify-center min-h-screen w-full p-4 relative">
          <TopControls lang={lang} setLang={setLang} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />
          <div className="w-full max-w-md glass-panel-strong p-6 sm:p-8 md:p-12 rounded-[2.5rem] modal-enter shadow-[0_20px_50px_rgba(0,0,0,0.15)] dark:shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
            <h2 className="text-2xl sm:text-3xl font-black text-gray-900 dark:text-white mb-8 text-center tracking-tight">{t.create_profile}</h2>
            <div className="relative w-24 h-24 sm:w-32 sm:h-32 mx-auto mb-10 cursor-pointer group" onClick={() => fileRef.current.click()}>
              <div className="absolute inset-0 rounded-[2rem] bg-white/50 dark:bg-black/40 backdrop-blur-md border-2 border-emerald-400/50 shadow-inner group-hover:scale-105 transition-transform duration-300"></div>
              <img src={userData.avatar} className="w-full h-full rounded-[2rem] object-cover p-2 sm:p-2.5 relative z-10" />
              <div className="absolute -bottom-2 -right-2 z-20 bg-emerald-500 text-white p-2.5 sm:p-3 rounded-xl shadow-[0_5px_15px_rgba(16,185,129,0.5)] group-hover:scale-110 transition-transform duration-300"><svg className="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg></div>
              <input type="file" ref={fileRef} className="hidden" accept="image/*" onChange={(e)=>{ const r = new FileReader(); r.onload=(ev)=>setUserData({...userData, avatar: ev.target.result}); r.readAsDataURL(e.target.files[0]); }} />
            </div>
            <div className="space-y-5">
              <div><label className="text-[10px] font-black tracking-[0.2em] uppercase text-gray-500 dark:text-gray-400 ml-2 mb-1.5 block">{t.name}</label><input type="text" className="w-full glass-input p-3 sm:p-4 rounded-[1.5rem] text-gray-900 dark:text-white font-black text-base sm:text-lg shadow-inner" value={userData.name} onChange={e => setUserData({...userData, name: e.target.value})} /></div>
              <div><label className="text-[10px] font-black tracking-[0.2em] uppercase text-gray-500 dark:text-gray-400 ml-2 mb-1.5 block">{t.farm_name}</label><input type="text" className="w-full glass-input p-3 sm:p-4 rounded-[1.5rem] text-gray-900 dark:text-white font-black text-base sm:text-lg shadow-inner" value={userData.farmName} onChange={e => setUserData({...userData, farmName: e.target.value})} /></div>
            </div>
            <button onClick={handleSaveAndNext} className="w-full mt-10 bg-emerald-500 text-white py-3.5 sm:py-4 rounded-[1.5rem] font-black text-base sm:text-lg shadow-[0_10px_30px_rgba(16,185,129,0.3)] hover:-translate-y-1 transition-transform duration-300 border border-emerald-400/50">{t.next}</button>
          </div>
        </div>
      );
    };

    const RobotSetup = ({ userData, robots, setRobots, onNext, t, lang, setLang, isDarkMode, setIsDarkMode, showToast }) => {
       const [editingBot, setEditingBot] = useState(null);
       const botFileRef = useRef();

       const handleSaveBot = () => {
         if (userData.role !== 'guest') {
           if (userData.isGoogleAuth && auth && auth.currentUser) {
             db.collection('artifacts').doc(appId).collection('users').doc(auth.currentUser.uid).collection('robots').doc(editingBot.id.toString()).set(editingBot);
           } else {
             const newRobots = robots.find(r=>r.id===editingBot.id) ? robots.map(r=>r.id===editingBot.id?editingBot:r) : [...robots, editingBot];
             setRobots(newRobots); localStorage.setItem('farmos_robots_' + userData.id, JSON.stringify(newRobots));
           }
         }
         showToast(`Saved robot: ${editingBot.name}`); setEditingBot(null);
       };

       const handleDeleteBot = (botId) => {
         if (userData.role !== 'guest') {
           if (userData.isGoogleAuth && auth && auth.currentUser) {
             db.collection('artifacts').doc(appId).collection('users').doc(auth.currentUser.uid).collection('robots').doc(botId.toString()).delete();
           } else {
             const newRobots = robots.filter(b => b.id !== botId);
             setRobots(newRobots); localStorage.setItem('farmos_robots_' + userData.id, JSON.stringify(newRobots));
           }
           showToast(`Robot deleted.`);
         }
       };

       return (
        <div className="flex flex-col items-center justify-center min-h-screen w-full p-4 relative">
          <TopControls lang={lang} setLang={setLang} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />
          {editingBot ? (
            <div className="glass-panel-strong p-6 sm:p-8 md:p-12 rounded-[2.5rem] w-full max-w-md modal-enter shadow-2xl">
              <h2 className="text-2xl sm:text-3xl font-black text-gray-900 dark:text-white mb-8 text-center tracking-tight">{t.setup_bot}</h2>
              <div className="relative w-28 h-28 sm:w-36 sm:h-36 mx-auto mb-10 cursor-pointer group" onClick={() => botFileRef.current.click()}>
                 <div className="absolute inset-0 bg-white/50 dark:bg-black/40 backdrop-blur-md rounded-[2rem] border-2 border-emerald-400/50 shadow-inner group-hover:scale-105 transition-transform duration-300"></div>
                 <img src={editingBot.image} className="w-full h-full rounded-[2rem] object-contain p-2 sm:p-3 relative z-10" />
                 <input type="file" ref={botFileRef} className="hidden" accept="image/*" onChange={(e)=>{ const r = new FileReader(); r.onload=(ev)=>setEditingBot({...editingBot, image: ev.target.result}); r.readAsDataURL(e.target.files[0]); }} />
                 <div className="absolute -bottom-2 -right-2 z-20 bg-emerald-500 text-white p-2.5 sm:p-3 rounded-xl shadow-[0_5px_15px_rgba(16,185,129,0.5)] group-hover:scale-110 transition-transform"><svg className="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></div>
              </div>
              <div className="space-y-4 mb-10">
                <div><label className="text-[10px] font-black tracking-[0.2em] uppercase text-gray-500 dark:text-gray-400 ml-2 mb-1.5 block">{t.bot_name}</label><input type="text" className="w-full glass-input p-3 sm:p-4 rounded-[1.5rem] text-gray-900 dark:text-white font-black text-base sm:text-lg shadow-inner" value={editingBot.name} onChange={e=>setEditingBot({...editingBot, name: e.target.value})} /></div>
              </div>
              <div className="flex gap-4">
                <button onClick={() => setEditingBot(null)} className="flex-1 glass-card py-3 sm:py-4 rounded-[1.5rem] font-black hover:bg-white/60 transition-colors text-sm sm:text-base">{t.cancel}</button>
                <button onClick={handleSaveBot} className="flex-1 bg-emerald-500 text-white py-3 sm:py-4 rounded-[1.5rem] font-black shadow-[0_8px_30px_rgba(16,185,129,0.3)] border border-emerald-400/50 hover:-translate-y-1 transition-transform text-sm sm:text-base">{t.save}</button>
              </div>
            </div>
          ) : (
            <div className="w-full max-w-4xl flex flex-col items-center z-10 modal-enter">
              <h1 className="text-4xl sm:text-5xl md:text-6xl font-black text-gray-900 dark:text-white mb-4 text-center tracking-tight drop-shadow-md">Fleet Init</h1>
              <p className="text-gray-600 dark:text-gray-300 text-xs sm:text-base font-black tracking-widest uppercase mb-10 md:mb-12 text-center">{t.manage_bots}</p>
              <div className="flex flex-wrap justify-center gap-4 sm:gap-6 md:gap-8 w-full">
                {robots.map(r => (
                  <div key={r.id} className="relative flex flex-col items-center group">
                    <button onClick={(e) => { e.stopPropagation(); handleDeleteBot(r.id); }} className="absolute -top-2 -right-2 sm:-top-3 sm:-right-3 bg-red-500 text-white w-8 h-8 sm:w-10 sm:h-10 rounded-xl z-20 font-black shadow-lg opacity-0 group-hover:opacity-100 transition-all hover:bg-red-600 hover:scale-110 flex items-center justify-center border-2 border-white/20">✕</button>
                    <div onClick={() => setEditingBot(r)} className="w-28 h-28 sm:w-36 sm:h-36 md:w-44 md:h-44 rounded-[2rem] sm:rounded-[2.5rem] glass-panel flex items-center justify-center overflow-hidden cursor-pointer hover:border-emerald-400 hover:scale-105 transition-all shadow-xl"><img src={r.image} className="w-[75%] h-[75%] object-contain drop-shadow-md group-hover:scale-110 transition-transform duration-500" /></div>
                    <p className="mt-4 sm:mt-5 font-black text-sm sm:text-base text-gray-900 dark:text-white text-center truncate px-2 drop-shadow-sm tracking-tight w-28 sm:w-36">{r.name}</p>
                  </div>
                ))}
                <div onClick={() => setEditingBot({id:Date.now(), name:'New Bot', ip:'', status:'Standby', battery:100, image:'https://api.dicebear.com/7.x/bottts/svg?seed='+Date.now()+'&backgroundColor=transparent'})} className="w-28 h-28 sm:w-36 sm:h-36 md:w-44 md:h-44 rounded-[2rem] sm:rounded-[2.5rem] glass-card flex flex-col items-center justify-center cursor-pointer border-dashed border-2 hover:text-emerald-600 hover:border-emerald-500/50 transition-colors gap-2 sm:gap-3 shadow-sm">
                  <span className="text-2xl sm:text-3xl font-black">+</span><span className="text-xs sm:text-sm font-black tracking-wide">{t.add_bot}</span>
                </div>
              </div>
              <div className="mt-12 sm:mt-16 w-full max-w-sm px-4">
                 <button onClick={onNext} className="w-full bg-gray-900 dark:bg-emerald-600 text-white py-3.5 sm:py-4 rounded-[1.5rem] font-black text-base sm:text-lg shadow-[0_10px_30px_rgba(0,0,0,0.3)] hover:-translate-y-1 transition-transform duration-300 border border-white/10 flex items-center justify-center gap-3">{t.go_to_dashboard} <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg></button>
              </div>
            </div>
          )}
        </div>
       );
    };

    // --- ENTERPRISE DASHBOARD (8 Tabs) ---
    const FarmOS = ({ userData, setUserData, robots, setRobots, plantZones, setPlantZones, soilStats, setSoilStats, alerts, setAlerts, autoSprinklerOn, setAutoSprinklerOn, onLogout, setCurrentScreen, t, lang, setLang, isDarkMode, setIsDarkMode, savedAccounts, setSavedAccounts, showToast }) => {
      const [activeTab, setActiveTab] = useState('overview');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [alertFilter, setAlertFilter] = useState('all');
      
      const [activeRobotIndex, setActiveRobotIndex] = useState(0); 
      const [isScanning, setIsScanning] = useState(false); 
      const [scanStatus, setScanStatus] = useState('idle');
      
      const [isAddingFarm, setIsAddingFarm] = useState(false);
      const [newFarmName, setNewFarmName] = useState('');
      
      const [editProfileName, setEditProfileName] = useState(userData.name);

      const [isEditingZones, setIsEditingZones] = useState(false);
      const [editingZonesData, setEditingZonesData] = useState([]);

      const isGuest = userData.role === 'guest';
      const profFileRef = useRef();

      const tabs = [
        { id: 'overview', name: t.dashboard, icon: Icons.Overview },
        { id: 'plant', name: t.plant_health, icon: Icons.Plant },
        { id: 'soil', name: t.soil_analysis, icon: Icons.Soil },
        { id: 'resource', name: t.resource_control, icon: Icons.Resource },
        { id: 'robot', name: t.robots, icon: Icons.Robot },
        { id: 'alert', name: t.alerts, icon: Icons.Alert },
        { id: 'report', name: t.reports, icon: Icons.Report },
        { id: 'user', name: t.settings, icon: Icons.User },
      ];

      const filteredAlerts = alertFilter === 'all' ? alerts : alerts.filter(a => a.type === alertFilter);

      useEffect(() => {
         if (activeRobotIndex >= robots.length) {
            setActiveRobotIndex(Math.max(0, robots.length - 1));
         }
      }, [robots.length, activeRobotIndex]);

      const handleApplyResource = (zoneId) => {
         if (isGuest) return;
         setPlantZones(prev => prev.map(z => z.id === zoneId ? { ...z, moisture: 100, health: Math.min(100, z.health + 5), issue: null } : z));
         showToast(`${t.apply_success} ${zoneId}`);
      };

      const handleSprinklerToggle = () => {
         if (isGuest) return;
         const newState = !autoSprinklerOn;
         setAutoSprinklerOn(newState);
         if(newState) {
            setPlantZones(prev => prev.map(z => ({ ...z, moisture: 100 })));
            showToast(t.sprinkler_on);
         } else { showToast(t.sprinkler_off); }
      };

      const handleScanPlant = () => {
         if(isScanning) return;
         setIsScanning(true);
         setScanStatus('scanning');
         showToast(t.scanning);
         setTimeout(() => {
            setIsScanning(false);
            setScanStatus('complete');
            showToast(t.scan_complete);
            const diseases = lang === 'th' ? ['ราสนิม (Rust)', 'เพลี้ยแป้ง (Aphids)', 'ใบจุด (Leaf Spot)', 'ขาดสารอาหาร (Deficiency)'] : ['Rust', 'Aphids', 'Leaf Spot', 'Nutrient Deficiency'];
            const randomDisease = diseases[Math.floor(Math.random() * diseases.length)];
            setAlerts(prev => [{ id: Date.now(), type: 'urgent', text: `AI ตรวจพบ: ${randomDisease}`, time: 'Just now', zone: 'Zone B' }, ...prev]);
         }, 2000);
      };

      const handleExportExcel = () => {
         let csv = "Farm OS Report\n\nZone,Crop Name,Health,Moisture\n";
         plantZones.forEach(z => csv += `${z.id},${z.name},${z.health}%,${z.moisture}%\n`);
         csv += `\nSoil Stats\nN,P,K,Moisture,pH\n${soilStats.N}%,${soilStats.P}%,${soilStats.K}%,${soilStats.moisture}%,${soilStats.pH}\n`;
         
         const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' });
         const url = URL.createObjectURL(blob);
         const link = document.createElement('a');
         link.href = url; link.download = 'farm_report.csv';
         document.body.appendChild(link); link.click(); document.body.removeChild(link);
         showToast(t.export_excel + ' Downloaded!');
      };

      const handleExportPDF = () => {
         showToast("Preparing Document...");
         setTimeout(() => { window.print(); showToast(t.export_pdf + ' Initiated!'); }, 500);
      };

      const handleSaveProfile = () => {
         const updatedUser = { ...userData, name: editProfileName };
         setUserData(updatedUser);
         const existingIndex = savedAccounts.findIndex(a => a.id === userData.id);
         if (existingIndex >= 0) { 
             const newSaved = [...savedAccounts]; 
             newSaved[existingIndex] = updatedUser; 
             setSavedAccounts(newSaved); 
         }
         showToast("Profile Updated!");
      };

      const userFarms = userData.farms && userData.farms.length > 0 ? userData.farms : [{ id: 'default', name: userData.farmName }];

      const handleAddFarm = () => {
         const trimmedName = newFarmName.trim();
         if (!trimmedName) return;
         if (userFarms.find(f => f.name.toLowerCase() === trimmedName.toLowerCase())) {
             showToast("Farm name already exists!");
             return;
         }
         
         const newFarm = { id: 'farm_' + Date.now(), name: trimmedName };
         const updatedUser = { ...userData, farms: [...userFarms, newFarm] };
         setUserData(updatedUser); 
         setNewFarmName(''); 
         setIsAddingFarm(false); 
         showToast(`Added farm: ${trimmedName}`);
         
         const existingIndex = savedAccounts.findIndex(a => a.id === userData.id);
         if (existingIndex >= 0) { const newSaved = [...savedAccounts]; newSaved[existingIndex] = updatedUser; setSavedAccounts(newSaved); }
      };

      const handleSwitchFarm = (farm) => {
         if (userData.farmName === farm.name) return;
         
         const updatedUser = { ...userData, farmName: farm.name };
         setUserData(updatedUser);
         showToast(`Loading: ${farm.name}`);
         
         setSoilStats({ N: 40+Math.floor(Math.random()*40), P: 30+Math.floor(Math.random()*40), K: 40+Math.floor(Math.random()*40), moisture: 30+Math.floor(Math.random()*50), pH: (5.5 + Math.random()*1.5).toFixed(1) });
         setPlantZones(prev => prev.map(z => ({...z, health: 50+Math.floor(Math.random()*50), moisture: 30+Math.floor(Math.random()*60), issue: Math.random() > 0.8 ? 'Warning' : null})));
         
         const existingIndex = savedAccounts.findIndex(a => a.id === userData.id);
         if (existingIndex >= 0) { const newSaved = [...savedAccounts]; newSaved[existingIndex] = updatedUser; setSavedAccounts(newSaved); }
      };

      const activeRobot = robots[activeRobotIndex] || null;

      return (
        <div className="flex h-screen w-full overflow-hidden relative">
          <TopControls lang={lang} setLang={setLang} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />

          {/* Desktop Sidebar */}
          <aside className="hidden lg:flex flex-col w-[300px] h-full p-6 z-10 shrink-0">
            <div className="glass-panel-strong rounded-[2.5rem] h-full flex flex-col overflow-hidden shadow-2xl">
              {isGuest && <div className="bg-gray-900 text-white text-[10px] font-black tracking-[0.2em] uppercase py-2.5 text-center border-b border-white/20">{t.guest_mode}</div>}
              <div className="p-8 flex items-center gap-5 border-b border-white/20 bg-white/20 dark:bg-black/20">
                <div className="bg-white/60 dark:bg-black/30 p-3 rounded-[1.2rem] shadow-inner border border-white/50"><AppLogo className="w-10 h-10" /></div>
                <div className="overflow-hidden">
                  <h1 className="text-lg font-black text-gray-900 dark:text-white truncate tracking-tight">{userData.farmName}</h1>
                  <p className="text-[10px] text-emerald-700 dark:text-emerald-400 font-black uppercase tracking-widest mt-0.5">{t.smart_eco}</p>
                </div>
              </div>
              <div className="flex-1 overflow-y-auto custom-scroll p-4 space-y-2">
                {tabs.map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-4 px-5 py-4 rounded-[1.5rem] text-sm font-black transition-all duration-300 ${activeTab === tab.id ? 'bg-emerald-500/20 text-emerald-800 dark:text-emerald-300 border border-emerald-400/50 shadow-sm' : 'text-gray-600 dark:text-gray-400 hover:bg-white/40 dark:hover:bg-slate-700/40 border border-transparent hover:translate-x-1'}`}>
                    {tab.icon} <span className="truncate">{tab.name}</span>
                  </button>
                ))}
              </div>
              <div className="p-6 border-t border-white/20 bg-white/30 dark:bg-black/30 flex items-center gap-4 cursor-pointer hover:bg-white/50 transition-colors" onClick={()=>setActiveTab('user')}>
                 <img src={userData.avatar} className="w-12 h-12 rounded-[1rem] border-2 border-white/80 object-cover bg-white/60 shadow-sm" />
                 <div className="flex-1 overflow-hidden">
                    <p className="text-base font-black text-gray-900 dark:text-white truncate">{userData.name}</p>
                    <p className="text-[10px] font-black text-emerald-800 dark:text-emerald-200 bg-emerald-500/10 px-2.5 py-1 rounded-lg inline-block mt-1.5 uppercase tracking-widest border border-emerald-500/20">{isGuest ? 'Guest' : t.role_owner}</p>
                 </div>
              </div>
            </div>
          </aside>

          {/* Main Content Area */}
          <main id="printable-area" className="flex-1 h-full overflow-y-auto custom-scroll p-3 sm:p-4 md:p-8 lg:p-10 pb-28 lg:pb-10 relative z-0 w-full mx-auto scroll-smooth">
            
            {/* Mobile Header */}
            <div className="lg:hidden glass-panel-strong p-3 sm:p-5 rounded-[1.5rem] sm:rounded-[2rem] flex justify-between items-center shadow-xl mb-4 sm:mb-6 sticky top-2 z-50 border border-white/50">
                <div className="flex items-center gap-3 sm:gap-4">
                   <div className="bg-white/60 dark:bg-black/30 p-2 sm:p-2.5 rounded-xl shadow-inner border border-white/40"><AppLogo className="w-8 h-8 sm:w-10 sm:h-10" /></div>
                   <div className="flex flex-col justify-center">
                     <h1 className="text-sm sm:text-lg font-black text-gray-900 dark:text-white truncate max-w-[150px] sm:max-w-[200px] tracking-tight leading-tight">{userData.farmName}</h1>
                     {isGuest && <p className="text-[9px] sm:text-[10px] text-red-500 font-black uppercase tracking-widest mt-0.5">{t.guest_mode}</p>}
                   </div>
                </div>
                <div onClick={() => setActiveTab('user')} className="cursor-pointer shrink-0">
                   <img src={userData.avatar} className="w-10 h-10 sm:w-10 sm:h-10 rounded-[1rem] border-2 border-white/80 object-cover bg-white/60 shadow-sm" alt="Profile" />
                </div>
            </div>

            {/* Mobile Bottom Navigation Dock */}
            <div className="lg:hidden fixed bottom-4 sm:bottom-6 left-3 right-3 sm:left-4 sm:right-4 z-[500] pointer-events-none">
              <nav className="glass-panel-strong rounded-[2rem] sm:rounded-[2.5rem] flex justify-around items-center p-2 sm:p-2.5 shadow-[0_20px_50px_rgba(0,0,0,0.25)] border border-white/60 pointer-events-auto">
                 {tabs.slice(0, 4).map(tab => (
                   <button 
                     key={tab.id} 
                     onClick={() => setActiveTab(tab.id)} 
                     className={`p-3 sm:p-3.5 rounded-[1.5rem] sm:rounded-[2rem] transition-all duration-300 flex flex-col items-center ${activeTab === tab.id ? 'bg-emerald-500/20 text-emerald-700 dark:text-emerald-400 shadow-inner scale-110' : 'text-gray-500 dark:text-gray-400 hover:bg-white/40 dark:hover:bg-black/20'}`}
                   >
                     {tab.icon}
                   </button>
                 ))}
                 <button onClick={() => setIsMobileMenuOpen(true)} className={`p-3 sm:p-3.5 rounded-[1.5rem] sm:rounded-[2rem] transition-all duration-300 flex flex-col items-center relative ${['robot', 'alert', 'report', 'user'].includes(activeTab) ? 'bg-emerald-500/20 text-emerald-700 dark:text-emerald-400 shadow-inner scale-110' : 'text-gray-500 dark:text-gray-400 hover:bg-white/40 dark:hover:bg-black/20'}`}>
                   <svg className="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 6h16M4 12h16m-7 6h7"/></svg>
                   {alerts.length > 0 && <span className="absolute top-2.5 right-2.5 sm:top-3 sm:right-3 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white shadow-sm animate-pulse"></span>}
                 </button>
              </nav>
            </div>

            {/* Mobile Menu Overlay */}
            {isMobileMenuOpen && (
              <div className="lg:hidden fixed inset-0 z-[600] flex items-end backdrop-blur-xl bg-black/50" onClick={() => setIsMobileMenuOpen(false)}>
                <div className="glass-panel-strong w-full rounded-t-[2.5rem] sm:rounded-t-[3rem] p-5 sm:p-6 pb-28 sm:pb-32 modal-enter grid grid-cols-2 gap-3 sm:gap-4 border-t border-white/40 shadow-[0_-20px_50px_rgba(0,0,0,0.3)]" onClick={e => e.stopPropagation()}>
                  <div className="col-span-2 flex justify-between items-center mb-1 sm:mb-2 px-2">
                    <h3 className="font-black text-gray-900 dark:text-white uppercase tracking-widest text-xs">More Menu</h3>
                    <button onClick={() => setIsMobileMenuOpen(false)} className="text-gray-500 dark:text-gray-400 hover:text-red-500 dark:hover:text-red-400 font-black p-2 bg-white/50 dark:bg-black/30 rounded-full transition-colors">✕</button>
                  </div>
                  {tabs.slice(4).map(tab => (
                    <button key={tab.id} onClick={() => {setActiveTab(tab.id); setIsMobileMenuOpen(false);}} className={`p-4 sm:p-5 rounded-[1.2rem] sm:rounded-[1.5rem] flex flex-col items-center justify-center gap-2 sm:gap-3 text-[10px] sm:text-xs font-black text-center transition-all duration-300 ${activeTab === tab.id ? 'bg-emerald-500/20 text-emerald-800 dark:text-emerald-200 border-2 border-emerald-400/60 shadow-inner' : 'glass-card text-gray-700 dark:text-gray-200 hover:bg-white/50'}`}>
                      {tab.icon} {tab.name.split('.')[1] || tab.name}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* ---------------- TABS CONTENT ---------------- */}
            <div className="animate-in fade-in duration-500 space-y-5 sm:space-y-6 md:space-y-8 max-w-[1400px] mx-auto">
              
              {/* 1. OVERVIEW */}
              {activeTab === 'overview' && (
                <div className="animate-[slideUp_0.6s_ease-out]">
                  <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 md:gap-6 mb-5 sm:mb-6 md:mb-8">
                    {[{l:t.soil_moisture, v:`${soilStats.moisture}%`, c:'text-blue-600 dark:text-blue-400', i:'💧'}, {l:t.active_bots, v:robots.length, c:'text-emerald-600 dark:text-emerald-400', i:'🤖'}, {l:t.active_alerts, v:alerts.length, c:'text-red-600 dark:text-red-400', i:'🔔'}, {l:'Avg Health', v:`${Math.round(plantZones.reduce((a,b)=>a+b.health,0)/plantZones.length)}%`, c:'text-purple-600 dark:text-purple-400', i:'✨'}].map((s,i) => (
                      <div key={i} className="glass-panel p-4 sm:p-5 md:p-6 rounded-[1.2rem] sm:rounded-[1.5rem] flex flex-col justify-between hover:scale-105 transition-transform duration-300 relative overflow-hidden group">
                        <div className="absolute -right-4 -top-4 w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-white/30 blur-2xl group-hover:scale-150 transition-transform duration-500"></div>
                        <div className="flex justify-between items-start mb-3 sm:mb-4 relative z-10">
                          <span className="text-[9px] sm:text-[10px] md:text-xs font-black uppercase text-gray-500 dark:text-gray-400 tracking-wider md:tracking-[0.2em] leading-tight line-clamp-2">{s.l}</span>
                          <span className="text-xl sm:text-2xl opacity-80 drop-shadow-md">{s.i}</span>
                        </div>
                        <span className={`text-3xl sm:text-4xl md:text-5xl font-black mt-1 sm:mt-2 drop-shadow-md relative z-10 tracking-tight ${s.c}`}>{s.v}</span>
                      </div>
                    ))}
                  </div>
                  
                  {/* Interactive Map - Fixed Grid */}
                  <div className="w-full h-[400px] sm:h-[500px] lg:h-[650px] glass-panel-strong rounded-[2rem] sm:rounded-[3rem] relative p-4 sm:p-5 md:p-8 shadow-2xl flex flex-col border border-white/60 dark:border-white/20">
                     <div className="absolute top-5 left-5 sm:top-8 sm:left-8 md:top-10 md:left-10 z-30 glass-card bg-white/70 dark:bg-black/50 px-3 py-1.5 sm:px-5 sm:py-3 rounded-xl flex items-center gap-2 sm:gap-3 border border-white/60 shadow-sm backdrop-blur-xl">
                       <span className="w-2.5 h-2.5 sm:w-3 sm:h-3 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(16,185,129,0.8)]"></span>
                       <span className="text-xs sm:text-sm font-black text-gray-900 dark:text-white tracking-wide">{t.live_map}</span>
                     </div>

                     {!isGuest && (
                        <div className="absolute top-5 right-5 sm:top-8 sm:right-8 md:top-10 md:right-10 z-30">
                           <button onClick={() => { setEditingZonesData(JSON.parse(JSON.stringify(plantZones))); setIsEditingZones(true); }} className="glass-card bg-white/70 dark:bg-black/50 px-3 py-1.5 sm:px-5 sm:py-3 rounded-xl flex items-center gap-1.5 sm:gap-2 border border-white/60 text-[10px] sm:text-xs font-black text-gray-900 dark:text-white hover:bg-white/90 transition-all duration-300 shadow-sm backdrop-blur-xl hover:scale-105">
                              ⚙️ <span className="hidden sm:inline">{t.edit_zones}</span><span className="sm:hidden">Edit</span>
                           </button>
                        </div>
                     )}
                     
                     <div className="flex-1 w-full rounded-[1.5rem] sm:rounded-[2.5rem] farm-pattern relative overflow-hidden bg-black/5 dark:bg-black/30 border border-white/30 p-3 sm:p-5 md:p-12 mt-14 md:mt-0 shadow-inner">
                       {/* Grid for symmetric zone placement */}
                       <div className="w-full h-full grid grid-cols-2 grid-rows-2 gap-3 sm:gap-5 md:gap-10 z-10 relative">
                         {plantZones.map((z) => (
                           <div key={z.id} onClick={()=>handleApplyResource(z.id)} className={`relative rounded-[1.2rem] sm:rounded-[2rem] bg-gradient-to-br ${z.color} flex items-center justify-center backdrop-blur-md border border-white/50 dark:border-white/20 shadow-md group cursor-pointer hover:scale-[1.03] transition-all duration-300 overflow-hidden`}>
                             {autoSprinklerOn && <div className="absolute inset-0 bg-blue-500/10 flex items-center justify-center"><div className="text-blue-500/60 text-4xl sm:text-6xl animate-rain drop-shadow-md">🌧️</div></div>}
                             <div className="text-center relative z-20 flex flex-col items-center justify-center w-full px-1">

                                {(activeRobot.status || '').includes('Scan') && <div className="absolute w-full h-1 sm:h-2 bg-emerald-400 shadow-[0_0_40px_rgba(16,185,129,1)] animate-scan z-10 left-0"></div>}
                             </div>
                          </>
                        ) : (
                          <div className="flex-1 flex items-center justify-center font-black text-gray-500 text-lg sm:text-xl tracking-widest uppercase">No Robot Selected</div>
                        )}
                     </div>
                     
                     <div className="space-y-4 sm:space-y-5 max-h-[350px] sm:max-h-[450px] lg:max-h-[600px] overflow-y-auto custom-scroll pr-2 sm:pr-3">
                       {robots.map((r, index) => (
                         <div key={r.id} onClick={() => {setActiveRobotIndex(index); showToast(`Connected to ${r.name || 'Robot'}`);}} className={`glass-panel p-4 sm:p-6 rounded-[1.5rem] sm:rounded-[2rem] flex flex-col cursor-pointer transition-all duration-300 ${activeRobotIndex === index ? 'border-2 border-emerald-500 scale-[1.03] shadow-[0_15px_40px_rgba(16,185,129,0.3)] bg-emerald-500/10' : 'hover:scale-[1.03] hover:bg-white/50 dark:hover:bg-slate-800/50 shadow-md border-white/50'}`}>
                            <div className="flex justify-between items-start mb-4 sm:mb-5">
                              <div className="flex gap-3 sm:gap-4 items-center">
                                <div className="w-12 h-12 sm:w-16 sm:h-16 bg-white/60 dark:bg-black/40 rounded-[1rem] sm:rounded-[1.5rem] p-1.5 sm:p-2 border border-white/50 shadow-inner"><img src={r.image} className="w-full h-full object-contain drop-shadow-md" /></div>
                                <h4 className="font-black text-sm sm:text-lg text-gray-900 dark:text-white tracking-tight leading-tight">{r.name || 'Unnamed Bot'}</h4>
                              </div>
                              <span className={`text-[9px] sm:text-xs font-black px-2.5 py-1 sm:px-3.5 sm:py-1.5 rounded-lg sm:rounded-xl border-2 shadow-sm ${r.battery > 20 ? 'bg-emerald-100/90 text-emerald-800 border-emerald-400/60 dark:bg-emerald-900/60 dark:text-emerald-300' : 'bg-red-100/90 text-red-800 border-red-400/60 dark:bg-red-900/60 dark:text-red-300'}`}>{r.battery || 0}%</span>
                            </div>
                            <p className="text-[10px] sm:text-xs font-black text-gray-600 dark:text-gray-300 mb-1 bg-white/50 dark:bg-black/30 p-2 sm:p-3 rounded-lg sm:rounded-xl text-center border border-white/30 uppercase tracking-[0.2em]">{r.status || 'Standby'}</p>
                         </div>
                       ))}
                       {robots.length === 0 && <div className="text-center p-8 sm:p-10 glass-panel rounded-[1.5rem] sm:rounded-[2rem] font-black text-gray-500 border-dashed border-[3px] tracking-widest uppercase text-xs sm:text-sm">No Robots Found</div>}
                     </div>
                   </div>
                </div>
              )}

              {/* 6. SMART ALERTS */}
              {activeTab === 'alert' && (
                <div className="max-w-4xl mx-auto animate-[slideUp_0.6s_ease-out]">
                   <div className="flex justify-between items-end mb-6 sm:mb-8 px-1">
                     <h2 className="text-3xl md:text-4xl font-black text-gray-900 dark:text-white drop-shadow-md tracking-tight">{t.alerts}</h2>
                     {alerts.length > 0 && <button onClick={()=>{setAlerts([]); showToast("Alerts Cleared");}} className="text-[10px] sm:text-xs font-black text-red-600 hover:bg-red-500/10 px-3 py-1.5 sm:px-5 sm:py-2.5 rounded-lg sm:rounded-xl transition-all border border-transparent hover:border-red-500/30 uppercase tracking-widest shadow-sm hover:-translate-y-0.5">{t.clear_all}</button>}
                   </div>
                   <div className="flex gap-2 sm:gap-3 overflow-x-auto pb-4 sm:pb-6 hide-scrollbar px-1">
                    {['all', 'urgent', 'warn', 'info'].map(f => (
                       <button key={f} onClick={()=>setAlertFilter(f)} className={`px-4 py-2 sm:px-8 sm:py-3.5 rounded-xl sm:rounded-2xl text-[10px] sm:text-xs font-black transition-all duration-300 whitespace-nowrap tracking-[0.2em] uppercase shadow-md ${alertFilter===f ? 'bg-gray-900 dark:bg-emerald-600 text-white border border-gray-700 dark:border-emerald-400 scale-105' : 'glass-card text-gray-700 dark:text-gray-200 hover:bg-white/60 dark:hover:bg-slate-700/60 border border-white/50'}`}>
                          {f==='all' ? t.filter_all : f==='urgent' ? t.filter_critical : f==='warn' ? t.filter_warning : t.filter_info}
                       </button>
                    ))}
                   </div>
                   <div className="space-y-4 sm:space-y-5 md:space-y-6">
                     {filteredAlerts.map(a => (
                       <div key={a.id} onClick={() => {setAlerts(alerts.filter(al => al.id !== a.id)); showToast("Dismissed");}} className="glass-panel p-4 sm:p-6 md:p-8 rounded-[1.5rem] sm:rounded-[2rem] flex items-center gap-4 sm:gap-6 hover:scale-[1.02] transition-transform duration-300 cursor-pointer relative overflow-hidden group shadow-md border border-white/60">
                          <div className="absolute right-4 sm:right-6 top-1/2 transform -translate-y-1/2 opacity-0 group-hover:opacity-100 text-gray-400 dark:text-gray-500 font-black text-[8px] sm:text-[10px] transition-opacity uppercase tracking-widest bg-white/80 dark:bg-black/50 px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg sm:rounded-xl backdrop-blur-md border border-white/30 hidden sm:block">Dismiss ✕</div>
                          <div className={`text-2xl sm:text-3xl md:text-4xl p-3 sm:p-4 md:p-5 rounded-[1rem] sm:rounded-[1.5rem] border border-white/60 shadow-inner shrink-0 ${a.type==='urgent'?'bg-red-500/20':a.type==='warn'?'bg-yellow-500/20':'bg-blue-500/20'}`}>
                            {a.type === 'urgent' ? '🔴' : a.type === 'warn' ? '🟡' : '🟢'}
                          </div>
                          <div className="flex-1 pr-2 sm:pr-24">
                             <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-2 sm:mb-3 gap-2 sm:gap-3">
                               <h4 className={`font-black text-sm sm:text-base md:text-xl tracking-tight leading-tight ${a.type === 'urgent' ? 'text-red-600 dark:text-red-400' : 'text-gray-900 dark:text-white'}`}>{a.text}</h4>
                               <span className="text-[9px] sm:text-[10px] font-black bg-white/60 dark:bg-black/50 px-2.5 py-1 sm:px-4 sm:py-1.5 rounded-lg border border-gray-200 dark:border-white/20 whitespace-nowrap text-gray-800 dark:text-gray-300 uppercase tracking-widest shadow-sm w-fit">{a.time}</span>
                             </div>
                             <span className="inline-block text-[9px] sm:text-[10px] font-black bg-gray-900/10 dark:bg-black/60 px-3 py-1 sm:px-4 sm:py-2 rounded-lg sm:rounded-xl border border-gray-300 dark:border-white/20 uppercase tracking-[0.2em] text-gray-800 dark:text-gray-200">{a.zone}</span>
                          </div>
                       </div>
                     ))}
                     {filteredAlerts.length === 0 && <div className="text-center text-gray-500 dark:text-gray-400 font-black mt-8 sm:mt-12 glass-panel p-8 sm:p-12 rounded-[2rem] sm:rounded-[3rem] border-dashed border-[2px] sm:border-[3px] border-gray-300 dark:border-slate-700 tracking-widest text-sm sm:text-lg uppercase">No alerts found. All good! ✨</div>}
                   </div>
                </div>
              )}

              {/* 7. REPORTS (Functional Exports) */}
              {activeTab === 'report' && (
                <div className="animate-[slideUp_0.6s_ease-out]">
                   <h2 className="text-3xl md:text-4xl font-black text-gray-900 dark:text-white mb-6 sm:mb-8 drop-shadow-md tracking-tight px-1">{t.reports}</h2>
                   <div className="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6 md:gap-8">
                     <div className="glass-panel p-6 sm:p-8 md:p-12 rounded-[2rem] sm:rounded-[3rem] flex flex-col justify-center items-center min-h-[250px] sm:min-h-[350px] md:min-h-[400px] border-dashed border-[2px] sm:border-[3px] border-emerald-500/40 bg-white/30 shadow-2xl group">
                        <span className="text-6xl sm:text-7xl md:text-8xl mb-4 sm:mb-8 drop-shadow-2xl group-hover:scale-110 transition-transform duration-500">📊</span>
                        <h3 className="font-black text-xl sm:text-2xl md:text-3xl mb-2 sm:mb-3 text-center text-gray-900 dark:text-white tracking-tight">Interactive Export</h3>
                        <p className="text-[10px] sm:text-xs font-black text-gray-500 dark:text-gray-400 mb-6 sm:mb-12 text-center uppercase tracking-widest">Download current data</p>
                        <div className="flex flex-col sm:flex-row gap-3 sm:gap-5 w-full justify-center px-4 sm:px-0">
                           <button onClick={handleExportPDF} className="glass-card bg-red-500/10 text-red-600 dark:text-red-400 font-black px-4 py-3 sm:px-8 py-4 rounded-[1.2rem] sm:rounded-[1.5rem] text-xs sm:text-sm border-2 border-red-500/40 hover:bg-red-500/20 shadow-xl hover:-translate-y-1.5 transition-all duration-300 uppercase tracking-widest">📑 {t.export_pdf}</button>
                           <button onClick={handleExportExcel} className="glass-card bg-emerald-500/10 text-emerald-700 dark:text-emerald-400 font-black px-4 py-3 sm:px-8 sm:py-4 rounded-[1.2rem] sm:rounded-[1.5rem] text-xs sm:text-sm border-2 border-emerald-500/40 hover:bg-emerald-500/20 shadow-xl hover:-translate-y-1.5 transition-all duration-300 uppercase tracking-widest">📗 {t.export_excel}</button>
                        </div>
                     </div>
                     <div className="glass-panel-strong p-6 sm:p-8 md:p-12 rounded-[2rem] sm:rounded-[3rem] bg-gradient-to-br from-purple-500/10 to-blue-500/10 shadow-2xl border-white/60">
                        <h3 className="font-black text-xl sm:text-2xl mb-6 sm:mb-10 tracking-tight">{t.yield_comp}</h3>
                        <div className="space-y-5 sm:space-y-8">
                           {plantZones.map((crop, i) => {
                             const mockGrowth = [12, 5, -2, 8][i % 4];
                             const gStr = mockGrowth >= 0 ? `+${mockGrowth}%` : `${mockGrowth}%`;
                             return (
                               <div key={i} className="group">
                                 <div className="flex justify-between text-xs sm:text-sm font-black mb-2 sm:mb-3 text-gray-900 dark:text-white"><span className="tracking-wide uppercase"><span className="text-lg sm:text-xl mr-2 animate-float inline-block">{crop.emoji}</span> {crop.name}</span> <span className={`text-sm sm:text-base ${mockGrowth >= 0 ? 'text-emerald-600 dark:text-emerald-400' : 'text-red-600 dark:text-red-400'}`}>{gStr}</span></div>
                                 <div className="w-full h-4 sm:h-5 bg-white/50 dark:bg-black/50 rounded-full shadow-inner border border-white/30 overflow-hidden"><div className={`h-full rounded-full shadow-[0_0_15px_rgba(255,255,255,0.6)] transition-all duration-1000 group-hover:brightness-110 ${mockGrowth >= 0 ? 'bg-emerald-500' : 'bg-orange-500'}`} style={{width: `${crop.health}%`}}></div></div>
                               </div>
                             );
                           })}
                        </div>
                     </div>
                  </div>
                </div>
              )}

              {/* 8. USER MANAGEMENT & MULTI-FARM */}
              {activeTab === 'user' && (
                <div className="max-w-2xl mx-auto space-y-6 md:space-y-8 animate-[slideUp_0.6s_ease-out]">
                   <h2 className="text-3xl md:text-4xl font-black text-gray-900 dark:text-white mb-6 sm:mb-8 drop-shadow-md tracking-tight px-1">{t.settings}</h2>
                   
                   <div className="glass-panel-strong p-6 sm:p-8 md:p-10 rounded-[2rem] sm:rounded-[3rem] flex flex-col md:flex-row items-center gap-6 sm:gap-8 md:gap-10 shadow-2xl border-white/70">
                      <div className="relative w-32 h-32 sm:w-40 sm:h-40 group cursor-pointer shrink-0" onClick={() => !isGuest && profFileRef.current.click()}>
                        <div className="absolute inset-0 rounded-[2rem] bg-white/60 dark:bg-black/50 backdrop-blur-md border-[3px] border-emerald-400/60 group-hover:scale-105 transition-transform duration-300 shadow-inner"></div>
                        <img src={userData.avatar} className="w-full h-full rounded-[2rem] object-cover p-3 sm:p-3.5 relative z-10 drop-shadow-xl bg-white/40" />
                        {!isGuest && <div className="absolute -bottom-2 -right-2 sm:-bottom-3 sm:-right-3 z-20 bg-emerald-500 text-white p-2.5 sm:p-3.5 rounded-xl shadow-[0_10px_20px_rgba(16,185,129,0.5)] group-hover:scale-110 transition-transform"><svg className="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg></div>}
                        <input type="file" ref={profFileRef} className="hidden" accept="image/*" onChange={(e)=>{ const r = new FileReader(); r.onload=(ev)=>{setUserData({...userData, avatar: ev.target.result}); showToast("Avatar changed");}; r.readAsDataURL(e.target.files[0]); }} />
                      </div>
                      <div className="flex-1 w-full space-y-4 sm:space-y-5">
                        <div><label className="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 dark:text-gray-400 ml-3 mb-1.5 sm:mb-2 block">{t.name}</label><input disabled={isGuest} type="text" className="w-full glass-input p-3 sm:p-4 rounded-[1.2rem] sm:rounded-[1.5rem] font-black text-base sm:text-xl disabled:opacity-50 text-gray-900 dark:text-white shadow-inner" value={editProfileName} onChange={e=>setEditProfileName(e.target.value)} /></div>
                        <div><label className="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 dark:text-gray-400 ml-3 mb-1.5 sm:mb-2 block">{t.farm_name}</label><input disabled={isGuest} type="text" className="w-full glass-input p-3 sm:p-4 rounded-[1.2rem] sm:rounded-[1.5rem] font-black text-base sm:text-xl disabled:opacity-50 text-gray-900 dark:text-white shadow-inner" value={userData.farmName} onChange={e=>{
                            const newFarmName = e.target.value;
                            const updatedFarms = userFarms.map(f => f.name === userData.farmName ? {...f, name: newFarmName} : f);
                            setUserData({...userData, farmName: newFarmName, farms: updatedFarms});
                        }} /></div>
                      </div>
                   </div>

                   <div className="flex gap-3 sm:gap-5">
                     {!isGuest && <button onClick={handleSaveProfile} className="flex-1 bg-emerald-500 text-white py-3 sm:py-4 rounded-[1.5rem] sm:rounded-[2rem] font-black shadow-[0_10px_30px_rgba(16,185,129,0.3)] hover:-translate-y-1.5 transition-all duration-300 border border-emerald-400/50 tracking-widest uppercase text-xs sm:text-sm">{t.save}</button>}
                     <button onClick={onLogout} className="flex-1 glass-card bg-red-500/10 text-red-600 dark:text-red-400 border-2 border-red-500/30 py-3 sm:py-4 rounded-[1.5rem] sm:rounded-[2rem] font-black hover:bg-red-500/20 hover:-translate-y-1.5 transition-all duration-300 tracking-widest uppercase text-xs sm:text-sm shadow-md">{t.logout}</button>
                   </div>

                   <div className="glass-panel p-6 sm:p-8 md:p-10 rounded-[2rem] sm:rounded-[3rem] mt-8 sm:mt-10 shadow-xl border-white/50">
                      <h3 className="font-black text-lg sm:text-xl mb-4 sm:mb-6 flex justify-between items-center tracking-tight">
                        Farms Managed 
                        <span className="text-[9px] sm:text-[10px] font-black tracking-widest bg-white/70 dark:bg-black/50 px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg sm:rounded-xl border border-gray-300 dark:border-white/30 text-gray-800 dark:text-gray-200 uppercase shadow-sm">{t.multi_farm}</span>
                      </h3>
                      <div className="space-y-3 sm:space-y-4">
                         {userFarms.map(f => (
                           <div key={f.id} onClick={() => handleSwitchFarm(f)} className={`glass-card p-4 sm:p-5 rounded-[1.2rem] sm:rounded-[1.5rem] flex items-center justify-between cursor-pointer transition-all duration-300 hover:scale-[1.03] shadow-md ${userData.farmName === f.name ? 'border-[3px] border-emerald-500/60 bg-emerald-500/10' : 'border-[3px] border-transparent dark:border-slate-700 hover:border-gray-300 dark:hover:border-gray-500'}`}>
                              <span className="font-black text-base sm:text-lg truncate mr-2">{f.name}</span>
                              {userData.farmName === f.name ? (
                                  <span className="text-[9px] sm:text-[10px] text-emerald-700 dark:text-emerald-400 font-black px-2 sm:px-3 py-1 sm:py-1.5 bg-emerald-100/90 dark:bg-emerald-900/60 rounded-lg sm:rounded-xl shadow-sm border border-emerald-300 dark:border-emerald-700 tracking-widest uppercase shrink-0">ACTIVE</span>
                              ) : (
                                  <span className="text-[9px] sm:text-[10px] text-gray-600 dark:text-gray-300 font-black px-2 sm:px-3 py-1 sm:py-1.5 bg-white/60 dark:bg-black/40 rounded-lg sm:rounded-xl border border-gray-300 dark:border-slate-600 hover:bg-white/90 tracking-widest uppercase shadow-sm shrink-0">SWITCH</span>
                              )}
                           </div>
                         ))}
                         
                         {isAddingFarm && !isGuest ? (
                             <div className="glass-card p-4 sm:p-5 rounded-[1.2rem] sm:rounded-[1.5rem] flex flex-col sm:flex-row gap-3 border-[3px] border-emerald-500/40 shadow-inner bg-white/50 dark:bg-black/30">
                                 <input type="text" autoFocus placeholder="Enter farm name..." value={newFarmName} onChange={(e)=>setNewFarmName(e.target.value)} className="flex-1 bg-white/80 dark:bg-black/60 border border-white/70 dark:border-slate-600 rounded-[1rem] sm:rounded-[1.2rem] px-4 py-2.5 sm:py-3 text-sm font-black outline-none focus:border-emerald-500 text-gray-900 dark:text-white shadow-inner" />
                                 <div className="flex gap-2">
                                   <button onClick={handleAddFarm} className="flex-1 sm:flex-none bg-emerald-500 text-white px-4 sm:px-5 py-2.5 sm:py-3 rounded-[1rem] sm:rounded-[1.2rem] text-[10px] sm:text-xs font-black hover:bg-emerald-600 tracking-widest uppercase shadow-md transition-colors">Add</button>
                                   <button onClick={()=>setIsAddingFarm(false)} className="flex-1 sm:flex-none bg-gray-400 dark:bg-slate-600 text-white px-4 sm:px-5 py-2.5 sm:py-3 rounded-[1rem] sm:rounded-[1.2rem] text-[10px] sm:text-xs font-black hover:bg-gray-500 tracking-widest uppercase shadow-md transition-colors">Cancel</button>
                                 </div>
                             </div>
                         ) : !isGuest && (
                             <div onClick={()=>setIsAddingFarm(true)} className="glass-card p-4 sm:p-5 rounded-[1.2rem] sm:rounded-[1.5rem] flex items-center justify-center border-dashed border-[3px] border-gray-400 dark:border-slate-600 cursor-pointer text-gray-600 dark:text-gray-400 hover:text-emerald-600 dark:hover:text-emerald-400 hover:border-emerald-400 hover:bg-emerald-500/10 font-black text-xs sm:text-sm transition-all duration-300 tracking-widest uppercase shadow-sm hover:shadow-md">
                                + Add New Farm
                             </div>
                         )}
                      </div>
                   </div>
                </div>
              )}

            </div>
            
            {/* Zone Edit Modal */}
            {isEditingZones && (
              <div className="fixed inset-0 z-[700] flex items-center justify-center backdrop-blur-xl bg-black/60 p-4" onClick={() => setIsEditingZones(false)}>
                 <div className="glass-panel-strong w-full max-w-md rounded-[2.5rem] sm:rounded-[3rem] p-6 sm:p-8 md:p-10 modal-enter shadow-[0_30px_80px_rgba(0,0,0,0.5)] border border-white/50" onClick={e => e.stopPropagation()}>
                    <h3 className="text-2xl sm:text-3xl font-black mb-6 sm:mb-8 text-gray-900 dark:text-white drop-shadow-md tracking-tight text-center">{t.edit_zones}</h3>
                    <div className="space-y-4 sm:space-y-5 max-h-[50vh] overflow-y-auto custom-scroll pr-2 sm:pr-3">
                       {editingZonesData.map((z, idx) => (
                          <div key={z.id} className="glass-card p-4 sm:p-5 rounded-[1.2rem] sm:rounded-[1.5rem] flex gap-3 sm:gap-4 items-center shadow-md border border-white/60">
                             <div className="w-16 sm:w-20 shrink-0">
                                <label className="text-[9px] sm:text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400 ml-1 mb-1 sm:mb-2 block text-center">{t.zone_emoji}</label>
                                <input type="text" className="w-full glass-input p-2 sm:p-3 rounded-xl sm:rounded-[1.2rem] text-center text-2xl sm:text-3xl shadow-inner font-black" value={z.emoji} onChange={e => {
                                   const newZones = [...editingZonesData];
                                   newZones[idx].emoji = e.target.value;
                                   setEditingZonesData(newZones);
                                }} />
                             </div>
                             <div className="flex-1">
                                <label className="text-[9px] sm:text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400 ml-2 mb-1 sm:mb-2 block">{t.zone_name}</label>
                                <input type="text" className="w-full glass-input p-3 sm:p-4 rounded-xl sm:rounded-[1.2rem] font-black text-xs sm:text-sm text-gray-900 dark:text-white shadow-inner tracking-wide" value={z.name} onChange={e => {
                                   const newZones = [...editingZonesData];
                                   newZones[idx].name = e.target.value;
                                   setEditingZonesData(newZones);
                                }} />
                             </div>
                          </div>
                       ))}
                    </div>
                    <div className="flex gap-3 sm:gap-4 mt-8 sm:mt-10">
                       <button onClick={() => setIsEditingZones(false)} className="flex-1 glass-card py-3 sm:py-4 rounded-[1.2rem] sm:rounded-[1.5rem] font-black hover:bg-white/70 tracking-widest uppercase text-xs sm:text-sm shadow-md transition-colors">{t.cancel}</button>
                       <button onClick={() => { setPlantZones(editingZonesData); setIsEditingZones(false); showToast(t.save); }} className="flex-1 bg-emerald-500 text-white py-3 sm:py-4 rounded-[1.2rem] sm:rounded-[1.5rem] font-black shadow-[0_10px_30px_rgba(16,185,129,0.3)] border border-emerald-400/50 hover:bg-emerald-600 hover:-translate-y-1 transition-transform tracking-widest uppercase text-xs sm:text-sm">{t.save}</button>
                    </div>
                 </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
