<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Farm OS | Smart Agriculture Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #10b981; /* Emerald 500 */
      --primary-dark: #059669; /* Emerald 600 */
      --surface: #ffffff;
      --background: #f3f4f6; /* Gray 100 */
    }

    body { 
      font-family: 'Prompt', sans-serif; 
      background-color: var(--background); 
      -webkit-tap-highlight-color: transparent; 
      color: #1f2937;
    }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .modal-enter { animation: modalFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    .area-chart-path { 
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
      stroke-dasharray: 2000;
      stroke-dashoffset: 0;
      animation: drawLine 1.5s ease-out forwards;
    }

    @keyframes drawLine {
      from { stroke-dashoffset: 2000; }
      to { stroke-dashoffset: 0; }
    }
    
    /* Custom Utilities */
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .glass-nav {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.05);
      border-top: 1px solid rgba(255,255,255,0.8);
    }

    .card-shadow {
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.06);
    }

    /* Farm Map Realistic Grid */
    .farm-pattern {
      background-color: #e0e7ff; /* light indigo */
      background-image: 
        linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    
    .gradient-text {
      background: linear-gradient(135deg, var(--primary-dark), #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Input Focus Styles */
    input[type="text"]:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
      border-color: var(--primary);
    }
    
    input[type="range"] {
      accent-color: var(--primary);
    }
    input[type="range"]:disabled {
      accent-color: #9ca3af;
      cursor: not-allowed;
    }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="overflow-x-hidden antialiased selection:bg-emerald-200 selection:text-emerald-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyDs8yRihR4Vz123JRjEA6SWcF-pw77c-qU",
      authDomain: "m4kul-1.firebaseapp.com",
      projectId: "m4kul-1",
      storageBucket: "m4kul-1.firebasestorage.app",
      messagingSenderId: "973526589558",
      appId: "1:973526589558:web:01a944e291077e240bff57"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    
    const APP_LOGO = "https://lh3.googleusercontent.com/d/1Idx_06TR21D44uHQjWC1arrQM0hD4LZ8";

    // --- Main App Component ---
    function App() {
      const [currentScreen, setCurrentScreen] = useState('splash');
      const [authStatus, setAuthStatus] = useState('checking');
      const [userData, setUserData] = useState({ 
        name: '', email: '', farmName: '', phone: '', role: 'เจ้าของฟาร์ม', 
        avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Farmer&backgroundColor=e2e8f0' 
      });
      
      const [robots, setRobots] = useState([
        { id: 1, name: 'FarmBot-Alpha', ip: '192.168.1.101', status: 'สแกนโรคพืช', battery: 85, image: 'https://api.dicebear.com/7.x/bottts/svg?seed=Alpha&backgroundColor=dcfce7' },
        { id: 2, name: 'FarmBot-Beta', ip: '192.168.1.102', status: 'ออนไลน์', battery: 100, image: 'https://api.dicebear.com/7.x/bottts/svg?seed=Beta&backgroundColor=e0e7ff' },
      ]);

      const [plantZones, setPlantZones] = useState([
        { id: 'A', name: 'แปลงสลัด A', moisture: 45, health: 95, icon: '🥬', top: '15%', left: '15%', color: 'from-green-400 to-green-300' },
        { id: 'B', name: 'มะเขือเทศ B', moisture: 30, health: 65, icon: '🍅', top: '15%', left: '60%', color: 'from-red-400 to-red-300' },
        { id: 'C', name: 'แปลงเมลอน C', moisture: 38, health: 82, icon: '🍈', top: '55%', left: '15%', color: 'from-yellow-400 to-orange-300' },
        { id: 'D', name: 'สตรอว์เบอร์รี D', moisture: 52, health: 88, icon: '🍓', top: '55%', left: '60%', color: 'from-pink-400 to-rose-300' },
      ]);

      const [soilStats, setSoilStats] = useState({ N: 65, P: 40, K: 55, moisture: 45 });
      
      const [alerts] = useState([
        { id: 1, type: 'critical', title: 'พบเชื้อราในมะเขือเทศ', zone: 'โซน B', time: '10 นาทีที่แล้ว', detail: 'AI ตรวจพบความผิดปกติบนใบ 94%' },
        { id: 2, type: 'warning', title: 'ดินโซน B แห้งเกินไป', zone: 'โซน B', time: '1 ชั่วโมงที่แล้ว', detail: 'ความชื้นลดลงเหลือ 30%' },
        { id: 3, type: 'info', title: 'หุ่นยนต์เชื่อมต่อสำเร็จ', zone: 'ระบบ', time: '2 ชั่วโมงที่แล้ว', detail: 'FarmBot-Beta ออนไลน์' },
      ]);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((user) => {
          if (user) {
            setUserData(prev => ({ ...prev, name: user.displayName || 'ผู้ใช้', email: user.email, avatar: user.photoURL || prev.avatar, role: 'เจ้าของฟาร์ม' }));
            setAuthStatus('logged_in');
          } else { setAuthStatus('logged_out'); }
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (currentScreen === 'login' && authStatus === 'logged_in' && userData.role !== 'guest') { 
          setCurrentScreen('dashboard'); 
        }
      }, [currentScreen, authStatus]);

      const navigate = (screen) => setCurrentScreen(screen);

      const handleLogout = () => {
        auth.signOut().catch(()=>{}); // ignore errors for guest
        setUserData({ name: '', email: '', farmName: '', phone: '', role: 'เจ้าของฟาร์ม', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Farmer&backgroundColor=e2e8f0' });
        navigate('login');
      };

      return (
        <div className="min-h-screen">
          {currentScreen === 'splash' && <SplashScreen onFinish={() => navigate('login')} />}
          {currentScreen === 'login' && <LoginScreen onNext={() => navigate('register')} onGuest={() => {
             setUserData({...userData, name: 'ผู้เยี่ยมชม', farmName: 'Demo Farm', role: 'guest', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Guest&backgroundColor=f3f4f6'});
             navigate('dashboard');
          }} setUserData={setUserData} userData={userData} />}
          {currentScreen === 'register' && <RegisterScreen userData={userData} setUserData={setUserData} onNext={() => navigate('robot_setup')} />}
          {currentScreen === 'robot_setup' && <RobotSetup robots={robots} setRobots={setRobots} onNext={() => navigate('dashboard')} />}
          {currentScreen === 'dashboard' && (
            <FarmOS 
              userData={userData} setUserData={setUserData}
              robots={robots} setRobots={setRobots}
              plantZones={plantZones} setPlantZones={setPlantZones}
              soilStats={soilStats} setSoilStats={setSoilStats}
              alerts={alerts}
              onLogout={handleLogout} 
              setCurrentScreen={setCurrentScreen}
            />
          )}
        </div>
      );
    }

    // --- Screens ---

    const SplashScreen = ({ onFinish }) => {
      useEffect(() => { const timer = setTimeout(onFinish, 2500); return () => clearTimeout(timer); }, [onFinish]);
      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-white relative overflow-hidden">
          <div className="absolute inset-0 bg-gradient-to-br from-emerald-50 to-white z-0"></div>
          <div className="z-10 flex flex-col items-center animate-in fade-in zoom-in duration-1000">
            <div className="relative mb-6">
              <div className="absolute inset-0 bg-emerald-400 blur-3xl opacity-20 animate-pulse"></div>
              <img src={APP_LOGO} className="w-40 h-40 object-contain drop-shadow-2xl relative z-10 hover:scale-105 transition-transform" />
            </div>
            <h1 className="text-5xl font-extrabold gradient-text tracking-tight mb-2">Farm OS</h1>
            <p className="text-emerald-600/70 font-semibold text-sm uppercase tracking-[0.4em]">Smart Ecosystem</p>
          </div>
        </div>
      );
    };

    const LoginScreen = ({ onNext, onGuest, setUserData, userData }) => {
      const [isLoading, setIsLoading] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');

      const handleGoogleLogin = () => {
        setIsLoading(true); setErrorMsg('');
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider)
          .then((result) => {
            setUserData({ ...userData, name: result.user.displayName, email: result.user.email, avatar: result.user.photoURL, role: 'เจ้าของฟาร์ม' });
            setIsLoading(false); onNext();
          })
          .catch((error) => {
            setIsLoading(false);
            if (error.code === 'auth/unauthorized-domain' || error.code === 'auth/operation-not-supported-in-this-environment') {
              setErrorMsg("โหมด Preview กำลังจำลองบัญชีผู้ใช้ให้ชั่วคราว...");
              setTimeout(() => { setUserData({...userData, name: 'ผู้ดูแลฟาร์ม (Demo)', role: 'เจ้าของฟาร์ม'}); onNext(); }, 2000);
            } else { setErrorMsg(error.message); }
          });
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-gray-50 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] relative">
          <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-emerald-400 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-blob"></div>
          <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-blob animation-delay-2000"></div>
          
          <div className="w-full max-w-md bg-white/80 backdrop-blur-xl p-10 md:p-12 rounded-[2.5rem] card-shadow border border-white relative z-10 modal-enter">
            <div className="text-center mb-10">
              <img src={APP_LOGO} className="w-20 h-20 mx-auto mb-6 drop-shadow-md" />
              <h2 className="text-3xl font-bold text-gray-800 tracking-tight">เข้าสู่ระบบ</h2>
              <p className="text-gray-500 mt-2 text-sm">Farm Management Platform</p>
            </div>
            
            <div className="space-y-4">
              <button onClick={handleGoogleLogin} disabled={isLoading} className="w-full bg-white border border-gray-200 text-gray-700 py-4 rounded-2xl font-semibold hover:bg-gray-50 focus:ring-4 focus:ring-gray-100 flex items-center justify-center gap-3 transition-all active:scale-[0.98] shadow-sm">
                <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                {isLoading ? 'กำลังเชื่อมต่อ...' : 'เข้าสู่ระบบด้วย Google'}
              </button>
              
              <button onClick={onNext} className="w-full bg-gray-900 text-white py-4 rounded-2xl font-semibold hover:bg-gray-800 shadow-md transition-all active:scale-[0.98]">
                ใช้งานด้วยอีเมล / เบอร์โทร
              </button>

              <div className="relative flex items-center py-2">
                <div className="flex-grow border-t border-gray-200"></div>
                <span className="flex-shrink-0 mx-4 text-gray-400 text-xs uppercase tracking-widest">ทางเลือก</span>
                <div className="flex-grow border-t border-gray-200"></div>
              </div>

              {/* Guest Login Button */}
              <button onClick={onGuest} className="w-full bg-white border-2 border-dashed border-gray-300 text-gray-500 py-3.5 rounded-2xl font-semibold hover:border-emerald-400 hover:text-emerald-600 transition-all flex items-center justify-center gap-2">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                เข้าสู่ระบบแบบผู้เยี่ยมชม
              </button>
            </div>
            {errorMsg && <div className="mt-6 p-4 bg-red-50 rounded-xl text-red-600 text-sm text-center font-medium animate-pulse">{errorMsg}</div>}
          </div>
        </div>
      );
    };

    const RegisterScreen = ({ userData, setUserData, onNext }) => {
      // ... (RegisterScreen remains unchanged)
      const fileRef = useRef();
      const handleImg = (e) => {
        const r = new FileReader(); r.onload = (ev) => setUserData({...userData, avatar: ev.target.result}); r.readAsDataURL(e.target.files[0]);
      };
      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-gray-50">
          <div className="w-full max-w-md bg-white p-10 md:p-12 rounded-[2.5rem] card-shadow border border-gray-100 modal-enter">
            <h2 className="text-3xl font-bold text-gray-800 mb-2 text-center">สร้างโปรไฟล์</h2>
            <p className="text-gray-500 mb-8 text-center text-sm">ตั้งค่าข้อมูลฟาร์มของคุณเพื่อเริ่มต้น</p>
            <div className="relative w-32 h-32 mx-auto mb-8 group cursor-pointer" onClick={() => fileRef.current.click()}>
              <div className="absolute inset-0 rounded-full border-4 border-emerald-100 group-hover:border-emerald-300 transition-colors"></div>
              <img src={userData.avatar} className="w-full h-full rounded-full object-cover p-1" />
              <div className="absolute bottom-1 right-1 bg-emerald-500 text-white p-2 rounded-full shadow-lg hover:scale-110 transition-transform"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></div>
              <input type="file" ref={fileRef} className="hidden" accept="image/*" onChange={handleImg} />
            </div>
            <div className="space-y-5">
              <div><label className="text-xs font-semibold text-gray-500 ml-1 mb-1 block">ชื่อผู้ดูแล</label><input type="text" className="w-full border border-gray-200 bg-gray-50 p-4 rounded-2xl text-gray-800 placeholder-gray-400 transition-all" value={userData.name} onChange={e => setUserData({...userData, name: e.target.value})} /></div>
              <div><label className="text-xs font-semibold text-gray-500 ml-1 mb-1 block">ชื่อฟาร์ม</label><input type="text" className="w-full border border-gray-200 bg-gray-50 p-4 rounded-2xl text-gray-800 placeholder-gray-400 transition-all" value={userData.farmName} onChange={e => setUserData({...userData, farmName: e.target.value})} /></div>
            </div>
            <button onClick={onNext} className="w-full mt-10 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-emerald-500/30 hover:-translate-y-0.5 transition-all">ถัดไป</button>
          </div>
        </div>
      );
    };

    const RobotSetup = ({ robots, setRobots, onNext }) => {
       // ... (RobotSetup remains unchanged)
       const [editingBot, setEditingBot] = useState(null);
       const [isManage, setIsManage] = useState(false);
       const botFileRef = useRef();
       return (
        <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-gray-50">
          {editingBot ? (
            <div className="bg-white p-8 md:p-10 rounded-[2.5rem] card-shadow border border-gray-100 w-full max-w-sm modal-enter">
              <h2 className="text-2xl font-bold text-gray-800 mb-8 text-center">ตั้งค่าหุ่นยนต์</h2>
              <div className="relative w-28 h-28 mx-auto mb-8 cursor-pointer group" onClick={() => botFileRef.current.click()}>
                 <div className="absolute inset-0 bg-gray-100 rounded-2xl group-hover:bg-gray-200 transition-colors"></div>
                 <img src={editingBot.image} className="w-full h-full rounded-2xl object-cover p-2 relative z-10" />
                 <div className="absolute -bottom-3 -right-3 bg-emerald-500 text-white p-2 rounded-xl shadow-lg z-20 hover:scale-110 transition-transform"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></div>
                 <input type="file" ref={botFileRef} className="hidden" accept="image/*" onChange={(e)=>{ const r = new FileReader(); r.onload=(ev)=>setEditingBot({...editingBot, image: ev.target.result}); r.readAsDataURL(e.target.files[0]); }} />
              </div>
              <div className="space-y-4 mb-8">
                <div><label className="text-xs font-semibold text-gray-500 ml-1 mb-1 block">ชื่อหุ่นยนต์</label><input type="text" className="w-full border border-gray-200 bg-gray-50 p-4 rounded-2xl" value={editingBot.name} onChange={e=>setEditingBot({...editingBot, name: e.target.value})} /></div>
              </div>
              <div className="flex gap-3">
                <button onClick={() => setEditingBot(null)} className="flex-1 bg-white border border-gray-200 py-3.5 rounded-xl font-semibold text-gray-600">ยกเลิก</button>
                <button onClick={() => { if(robots.find(r=>r.id===editingBot.id)) { setRobots(robots.map(r=>r.id===editingBot.id?editingBot:r)); } else { setRobots([...robots, editingBot]); } setEditingBot(null); }} className="flex-1 bg-emerald-500 text-white py-3.5 rounded-xl font-semibold shadow-lg shadow-emerald-500/30">บันทึก</button>
              </div>
            </div>
          ) : (
            <div className="w-full max-w-4xl flex flex-col items-center">
              <h1 className="text-3xl md:text-4xl font-extrabold text-gray-800 mb-2 text-center tracking-tight">Fleet Management</h1>
              <p className="text-gray-500 text-sm mb-12 text-center">จัดการหุ่นยนต์ในฟาร์มของคุณ</p>
              <div className="flex flex-wrap justify-center gap-6 md:gap-8">
                {robots.map(r => (
                  <div key={r.id} className="relative text-center group">
                    {isManage && <button onClick={() => setRobots(robots.filter(b => b.id !== r.id))} className="absolute -top-3 -right-3 bg-red-500 text-white w-8 h-8 rounded-full z-10 font-bold shadow-lg flex items-center justify-center">✕</button>}
                    <div onClick={() => isManage && setEditingBot(r)} className={`w-32 h-32 md:w-40 md:h-40 rounded-[2rem] bg-white card-shadow flex items-center justify-center overflow-hidden border-2 ${isManage ? 'border-blue-400 cursor-pointer scale-105' : 'border-transparent'} transition-all duration-300 relative`}><img src={r.image} className="w-[80%] h-[80%] object-contain relative z-10 group-hover:scale-110 transition-transform duration-500" /></div>
                    <p className="mt-4 font-semibold text-sm text-gray-700">{r.name}</p>
                  </div>
                ))}

    // --- UPGRADED: High Quality SVG Area Chart (Smooth Curves & Dropshadow) ---
    const AreaChart = ({ dataSets, labels, height = "h-72", maxValue = 100, isWhite = false }) => {
      const stepX = 100 / (labels.length - 1);
      
      // Function to generate smooth bezier curves (Catmull-Rom to Bezier)
      const getSmoothPath = (points) => {
        if (points.length === 0) return '';
        let d = `M ${points[0].x},${points[0].y}`;
        for (let i = 0; i < points.length - 1; i++) {
          const p0 = i === 0 ? points[0] : points[i - 1];
          const p1 = points[i];
          const p2 = points[i + 1];
          const p3 = i + 2 < points.length ? points[i + 2] : p2;
          // Calculate control points
          const cp1x = p1.x + (p2.x - p0.x) / 6;
          const cp1y = p1.y + (p2.y - p0.y) / 6;
          const cp2x = p2.x - (p3.x - p1.x) / 6;
          const cp2y = p2.y - (p3.y - p1.y) / 6;
          
          d += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`;
        }
        return d;
      };

      return (
        <div className={`w-full ${height} flex items-stretch gap-3`}>
          <div className="flex flex-col justify-between text-[10px] font-medium text-gray-400 py-2 text-right w-8">
             <span className={isWhite?'text-white/60':''}>{maxValue}</span>
             <span className={isWhite?'text-white/60':''}>{Math.round(maxValue*0.75)}</span>
             <span className={isWhite?'text-white/60':''}>{Math.round(maxValue*0.5)}</span>
             <span className={isWhite?'text-white/60':''}>{Math.round(maxValue*0.25)}</span>
             <span className={isWhite?'text-white/60':''}>0</span>
          </div>
          <div className="flex-1 flex flex-col relative overflow-hidden">
            <div className="flex-1 relative">
               <svg viewBox="0 0 100 100" className="w-full h-full overflow-visible" preserveAspectRatio="none">
                 <defs>
                   {dataSets.map((ds, idx) => (
                     <linearGradient key={`grad-${idx}`} id={`gradient-${idx}`} x1="0" x2="0" y1="0" y2="1">
                       <stop offset="0%" stopColor={ds.color} stopOpacity={ds.fillOpacity || "0.4"} />
                       <stop offset="100%" stopColor={ds.color} stopOpacity="0.01" />
                     </linearGradient>
                   ))}
                   {/* Glow / Shadow effect for lines */}
                   <filter id="glowShadow" x="-20%" y="-20%" width="140%" height="140%">
                      <feDropShadow dx="0" dy="4" stdDeviation="3" floodColor="#000" floodOpacity="0.15" />
                   </filter>
                 </defs>
                 
                 {/* Horizontal Grid Lines */}
                 {[0, 25, 50, 75, 100].map(v => <line key={v} x1="0" y1={v} x2="100" y2={v} stroke={isWhite?"rgba(255,255,255,0.1)":"#f3f4f6"} strokeWidth="0.5" strokeDasharray="2,2" />)}
                 
                 {dataSets.map((ds, idx) => {
                    const pointsArr = ds.data.map((d, i) => ({ x: i * stepX, y: 100 - (Math.min(maxValue, Math.max(0, d)) / maxValue) * 100 }));
                    
                    const smoothCurveD = getSmoothPath(pointsArr);
                    // Create fill path by connecting ends to bottom
                    const fillPathD = `${smoothCurveD} L 100,100 L 0,100 Z`;
                    
                    return (
                      <g key={idx}>
                         {/* Gradient Area Fill */}
                         <path d={fillPathD} fill={`url(#gradient-${idx})`} className="area-chart-path" stroke="none" />
                         
                         {/* Smooth Line Curve */}
                         <path d={smoothCurveD} fill="none" stroke={ds.color} strokeWidth={ds.strokeWidth || "2.5"} strokeLinecap="round" strokeLinejoin="round" className="area-chart-path" filter="url(#glowShadow)" />
                         
                         {/* Data Point Circles */}
                         {pointsArr.map((p, i) => (
                           <g key={i}>
                             <circle cx={p.x} cy={p.y} r="2.5" fill={isWhite?"var(--primary)":"white"} stroke={isWhite?"white":ds.color} strokeWidth="2" className="transition-all duration-500 hover:r-[4px] cursor-pointer" />
                           </g>
                         ))}
                      </g>
                    );
                 })}
               </svg>
            </div>
            <div className="flex justify-between mt-4 px-1">
               {labels.map(l => <span key={l} className={`text-[10px] font-medium ${isWhite?'text-white/70':'text-gray-400'}`}>{l}</span>)}
            </div>
          </div>
        </div>
      );
    };
