      darkMode: 'class',
      theme: {
        extend: {
          colors: { primary: '#10b981', 'primary-dark': '#059669' },
          animation: {
            blob: "blob 15s infinite alternate",
            scan: "scan 3s linear infinite",
            toastIn: "toastIn 0.3s ease-out forwards",
            toastOut: "toastOut 0.3s ease-in forwards",
            rain: "rain 0.8s linear infinite"
          },
          keyframes: {
            blob: {
              "0%": { transform: "translate(0px, 0px) scale(1)" },
              "33%": { transform: "translate(5vw, -10vh) scale(1.1)" },
              "66%": { transform: "translate(-5vw, 10vh) scale(0.9)" },
              "100%": { transform: "translate(0px, 0px) scale(1)" },
            },
            scan: { "0%": { top: "-10%" }, "100%": { top: "110%" } },
            toastIn: { "0%": { opacity: 0, transform: "translateY(-20px)" }, "100%": { opacity: 1, transform: "translateY(0)" } },
            toastOut: { "0%": { opacity: 1, transform: "translateY(0)" }, "100%": { opacity: 0, transform: "translateY(-20px)" } },
            rain: { "0%": { transform: "translateY(-5px)", opacity: 0 }, "50%": { opacity: 1 }, "100%": { transform: "translateY(5px)", opacity: 0 } }
          }
        }
      }
    }

                {isLoading ? t.connecting : t.login_google}

    const RegisterScreen = ({ userData, setUserData, savedAccounts, setSavedAccounts, onNext, t, lang, setLang, isDarkMode, setIsDarkMode, showToast }) => {

    const RobotSetup = ({ userData, robots, setRobots, onNext, t, lang, setLang, isDarkMode, setIsDarkMode, showToast }) => {
       const [editingBot, setEditingBot] = useState(null);
       const botFileRef = useRef();

         if (userData.role !== 'guest') {
           if (userData.isGoogleAuth && auth && auth.currentUser) {
             db.collection('artifacts').doc(appId).collection('users').doc(auth.currentUser.uid).collection('robots').doc(editingBot.id.toString()).set(editingBot);
           } else {
             const newRobots = robots.find(r=>r.id===editingBot.id) ? robots.map(r=>r.id===editingBot.id?editingBot:r) : [...robots, editingBot];
             setRobots(newRobots); localStorage.setItem('farmos_robots_' + userData.id, JSON.stringify(newRobots));
           }
         }
         showToast(`Saved robot: ${editingBot.name}`); setEditingBot(null);
       };

       const handleDeleteBot = (botId) => {
         if (userData.role !== 'guest') {
           if (userData.isGoogleAuth && auth && auth.currentUser) {
             db.collection('artifacts').doc(appId).collection('users').doc(auth.currentUser.uid).collection('robots').doc(botId.toString()).delete();
           } else {
             const newRobots = robots.filter(b => b.id !== botId);
             setRobots(newRobots); localStorage.setItem('farmos_robots_' + userData.id, JSON.stringify(newRobots));
           }
           showToast(`Robot deleted.`);
         }
       };

       return (

    // --- ENTERPRISE DASHBOARD (8 Tabs) ---
    const FarmOS = ({ userData, setUserData, robots, setRobots, plantZones, setPlantZones, soilStats, setSoilStats, alerts, setAlerts, autoSprinklerOn, setAutoSprinklerOn, onLogout, setCurrentScreen, t, lang, setLang, isDarkMode, setIsDarkMode, savedAccounts, setSavedAccounts, showToast }) => {
      const [activeTab, setActiveTab] = useState('overview');

      const [activeRobotIndex, setActiveRobotIndex] = useState(0);

        { id: 'overview', name: t.dashboard, icon: Icons.Overview },
        { id: 'plant', name: t.plant_health, icon: Icons.Plant },

        { id: 'resource', name: t.resource_control, icon: Icons.Resource },
        { id: 'robot', name: t.robots, icon: Icons.Robot },

        { id: 'user', name: t.settings, icon: Icons.User },
      ];

      const filteredAlerts = alertFilter === 'all' ? alerts : alerts.filter(a => a.type === alertFilter);

      // --- Interactive Handlers ---
      const handleApplyResource = (zoneId) => {
         if (isGuest) return;
         setPlantZones(prev => prev.map(z => z.id === zoneId ? { ...z, moisture: 100, health: Math.min(100, z.health + 5), issue: null } : z));
         showToast(`${t.apply_success} ${zoneId}`);
      };

      const handleSprinklerToggle = () => {
         if (isGuest) return;
         const newState = !autoSprinklerOn;
         setAutoSprinklerOn(newState);
         if(newState) {
            setPlantZones(prev => prev.map(z => ({ ...z, moisture: 100 })));
            showToast(t.sprinkler_on);
         } else { showToast(t.sprinkler_off); }
      };

      const handleScanPlant = () => {
         if(isScanning) return;
         setIsScanning(true);
         showToast(t.scanning);
         setTimeout(() => {
            setIsScanning(false);
            showToast(t.scan_complete);
            const diseases = lang === 'th' ? ['ราสนิม (Rust)', 'เพลี้ยแป้ง (Aphids)', 'ใบจุด (Leaf Spot)', 'ขาดสารอาหาร (Deficiency)'] : ['Rust', 'Aphids', 'Leaf Spot', 'Nutrient Deficiency'];
            const randomDisease = diseases[Math.floor(Math.random() * diseases.length)];
            setAlerts(prev => [{ id: Date.now(), type: 'urgent', text: `AI ตรวจพบ: ${randomDisease}`, time: 'Just now', zone: 'Scan Res' }, ...prev]);
         }, 2000);

                   <div className="flex justify-between items-end mb-6">
                     <h2 className="text-3xl font-black drop-shadow-sm">{t.robots}</h2>
                     {!isGuest && <button onClick={() => setCurrentScreen('robot_setup')} className="glass-card text-emerald-700 dark:text-emerald-300 font-bold px-4 py-2 rounded-xl text-xs hover:bg-emerald-500/10 border border-emerald-500/30">{t.manage_bots}</button>}
                   </div>
                   <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                     {/* Dynamic Camera Feed */}
                     <div className="lg:col-span-2 glass-panel-strong p-4 rounded-[3rem] relative h-[400px] lg:h-[500px] flex flex-col border-2 border-emerald-500/30 shadow-2xl group">
                        {activeRobot ? (
                          <>
                             <div className="absolute top-6 left-6 z-20 bg-black/60 backdrop-blur-md text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 border border-white/20">
                                <span className={`w-2.5 h-2.5 rounded-full ${activeRobot.battery > 20 ? 'bg-red-500 animate-pulse' : 'bg-gray-500'}`}></span> {t.live_cam} - {activeRobot.name}
                             </div>
                             <div className="w-full h-full rounded-[2.5rem] overflow-hidden relative bg-black">
                                <img src="https://images.unsplash.com/photo-1592982537447-6f2a6a0a38cc?auto=format&fit=crop&q=80&w=800&h=600" className="w-full h-full object-cover opacity-50" />
                                <img src={activeRobot.image} className="absolute bottom-10 right-10 w-40 h-40 opacity-90 drop-shadow-[0_0_20px_rgba(16,185,129,0.8)]" />
                                <div className="absolute inset-0 border-4 border-emerald-500/20 z-0 rounded-[2.5rem]"></div>
                                {/* HUD Overlay */}
                                <div className="absolute top-1/2 left-1/2 w-32 h-32 border border-emerald-500/30 rounded-full transform -translate-x-1/2 -translate-y-1/2 flex items-center justify-center">
                                  <div className="w-4 h-4 border-2 border-emerald-500"></div>
                                </div>
                                <div className="absolute bottom-6 left-6 text-emerald-400 font-mono text-xs font-bold">
                                  <p>BAT: {activeRobot.battery}%</p><p>STAT: {activeRobot.status}</p>
                                </div>
                                {activeRobot.status.includes('Scan') && <div className="absolute w-full h-1 bg-emerald-500/80 shadow-[0_0_20px_rgba(16,185,129,1)] animate-scan z-10"></div>}
                             </div>
                          </>
                        ) : (
                          <div className="flex-1 flex items-center justify-center font-bold text-gray-500">No Robot Selected</div>
                        )}
                     </div>
                     
                     {/* Selectable Robot List */}
                     <div className="space-y-4 max-h-[400px] lg:max-h-[500px] overflow-y-auto custom-scroll pr-2">
                       {robots.map((r, index) => (
                         <div key={r.id} onClick={() => {setActiveRobotIndex(index); showToast(`Connected to ${r.name}`);}} className={`glass-panel p-5 rounded-[2.5rem] flex flex-col cursor-pointer transition-all ${activeRobotIndex === index ? 'border-2 border-emerald-500 scale-[1.02] shadow-[0_0_20px_rgba(16,185,129,0.2)] bg-emerald-500/10' : 'hover:scale-[1.02] hover:bg-white/40 dark:hover:bg-slate-800/40'}`}>
                            <div className="flex justify-between items-start mb-4">
                              <div className="flex gap-3 items-center">
                                <div className="w-12 h-12 bg-white/40 dark:bg-black/20 rounded-[1.2rem] p-1 border border-white/30"><img src={r.image} className="w-full h-full object-contain" /></div>
                                <h4 className="font-black text-base">{r.name}</h4>
                              </div>
                              <span className={`text-[10px] font-black px-2.5 py-1 rounded-xl border ${r.battery > 20 ? 'bg-emerald-100/50 text-emerald-700 border-emerald-400/50 dark:text-emerald-300' : 'bg-red-100/50 text-red-700 border-red-400/50 dark:text-red-400'}`}>{r.battery}%</span>
                            </div>
                            <p className="text-xs font-bold text-gray-500 dark:text-gray-400 mb-2">{r.status || 'Standby'}</p>
                         </div>
                       ))}
                       {robots.length === 0 && <div className="text-center p-8 glass-panel rounded-[2.5rem] font-bold text-gray-500 border-dashed border-2">No Robots Found</div>}
                     </div>
                   </div>
                </>
              )}

              {/* 6. SMART ALERTS */}
              {activeTab === 'alert' && (
                <div className="max-w-3xl mx-auto">
                   <div className="flex justify-between items-end mb-6">
                     <h2 className="text-3xl font-black drop-shadow-sm">{t.alerts}</h2>
                     {alerts.length > 0 && <button onClick={()=>{setAlerts([]); showToast("Alerts Cleared");}} className="text-xs font-bold text-red-500 hover:bg-red-500/10 px-3 py-1.5 rounded-lg transition-colors border border-transparent hover:border-red-500/30">{t.clear_all}</button>}
                   </div>
                   <div className="flex gap-2 overflow-x-auto pb-4 hide-scrollbar">
                    {['all', 'urgent', 'warn', 'info'].map(f => (
                       <button key={f} onClick={()=>setAlertFilter(f)} className={`px-5 py-2.5 rounded-xl text-xs font-bold transition-all whitespace-nowrap ${alertFilter===f ? 'bg-gray-800 dark:bg-emerald-600 text-white shadow-md border border-gray-700 dark:border-emerald-400' : 'glass-card text-gray-700 dark:text-gray-200 hover:bg-white/60 dark:hover:bg-slate-700/60'}`}>
                          {f==='all' ? t.filter_all : f==='urgent' ? t.filter_critical : f==='warn' ? t.filter_warning : t.filter_info}
                       </button>
                    ))}
                   </div>
                   <div className="space-y-4">
                     {filteredAlerts.map(a => (
                       <div key={a.id} onClick={() => {setAlerts(alerts.filter(al => al.id !== a.id)); showToast("Dismissed");}} className="glass-panel p-5 rounded-[2.5rem] flex items-center gap-4 hover:scale-[1.01] transition-transform cursor-pointer relative overflow-hidden group">
                          <div className="absolute right-4 top-1/2 transform -translate-y-1/2 opacity-0 group-hover:opacity-100 text-gray-400 dark:text-gray-500 font-bold text-xs transition-opacity">Click to dismiss</div>
                          <div className={`text-3xl p-3 rounded-[1.5rem] border border-white/30 ${a.type==='urgent'?'bg-red-500/20':a.type==='warn'?'bg-yellow-500/20':'bg-blue-500/20'}`}>
                            {a.type === 'urgent' ? '🔴' : a.type === 'warn' ? '🟡' : '🟢'}
                          </div>
                          <div className="flex-1">
                             <div className="flex justify-between items-start mb-1">
                               <h4 className={`font-black text-sm md:text-base ${a.type === 'urgent' ? 'text-red-600 dark:text-red-400' : 'text-gray-800 dark:text-white'}`}>{a.text}</h4>
                               <span className="text-[10px] font-bold bg-white/40 dark:bg-black/30 px-2 py-1 rounded-lg border border-white/20 whitespace-nowrap">{a.time}</span>
                             </div>
                             <span className="inline-block text-[10px] font-black bg-white/50 dark:bg-black/40 px-3 py-1.5 rounded-xl border border-white/30">{a.zone}</span>
                          </div>
                       </div>
                     ))}
                     {filteredAlerts.length === 0 && <div className="text-center text-gray-500 dark:text-gray-400 font-bold mt-10 glass-panel p-8 rounded-[3rem] border-dashed border-2 border-gray-300 dark:border-slate-700">No alerts found. All good! ✨</div>}
                   </div>
                </div>
              )}

              {/* 7. REPORTS (Functional Exports) */}
              {activeTab === 'report' && (
                <>
                   <h2 className="text-3xl font-black mb-6 drop-shadow-sm">{t.reports}</h2>
                   <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                     <div className="glass-panel p-8 rounded-[3rem] flex flex-col justify-center items-center min-h-[300px] border-dashed border-2 border-emerald-500/30">
                        <span className="text-6xl mb-6">📊</span>
                        <h3 className="font-black text-2xl mb-2 text-center">Interactive Export</h3>
                        <p className="text-sm font-bold text-gray-500 mb-8 text-center">Download current data</p>
                        <div className="flex flex-col sm:flex-row gap-4 w-full justify-center">
                           <button onClick={handleExportPDF} className="glass-card bg-red-500/10 text-red-600 dark:text-red-400 font-bold px-6 py-3 rounded-2xl text-sm border-red-500/30 hover:bg-red-500/20 shadow-md">📑 {t.export_pdf}</button>
                           <button onClick={handleExportExcel} className="glass-card bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 font-bold px-6 py-3 rounded-2xl text-sm border-emerald-500/30 hover:bg-emerald-500/20 shadow-md">📗 {t.export_excel}</button>
                        </div>
                     </div>
                     <div className="glass-panel-strong p-8 rounded-[3rem] bg-gradient-to-br from-purple-500/10 to-blue-500/10">
                        <h3 className="font-black text-xl mb-6">{t.yield_comp}</h3>
                        <div className="space-y-6">
                           {[{n:'Lettuce', w:'85%', g:'+12%'}, {n:'Tomato', w:'65%', g:'+5%'}, {n:'Melon', w:'40%', g:'-2%'}].map((crop, i) => (
                             <div key={i}>
                               <div className="flex justify-between text-xs font-black mb-2"><span>{crop.n}</span> <span className={crop.g.includes('+') ? 'text-emerald-600' : 'text-red-500'}>{crop.g}</span></div>
                               <div className="w-full h-4 bg-white/30 dark:bg-black/30 rounded-full shadow-inner border border-white/10 overflow-hidden"><div className={`h-full rounded-full shadow-[0_0_10px_rgba(255,255,255,0.5)] ${crop.g.includes('+') ? 'bg-emerald-500' : 'bg-orange-400'}`} style={{width: crop.w}}></div></div>
                             </div>
                           ))}
                        </div>
                     </div>
                  </div>
                </>
              )}

              {/* 8. USER MANAGEMENT & MULTI-FARM */}
              {activeTab === 'user' && (
                <div className="max-w-2xl mx-auto space-y-6">
                   <h2 className="text-3xl font-black mb-6 drop-shadow-sm">{t.settings}</h2>
                   
                   <div className="glass-panel-strong p-8 rounded-[3rem] flex flex-col md:flex-row items-center gap-8 shadow-xl">
                      <div className="relative w-32 h-32 group cursor-pointer" onClick={() => !isGuest && profFileRef.current.click()}>
                        <div className="absolute inset-0 rounded-full bg-white/40 dark:bg-black/40 backdrop-blur-sm border-2 border-emerald-400/50 group-hover:scale-105 transition-all shadow-inner"></div>
                        <img src={userData.avatar} className="w-full h-full rounded-full object-cover p-2 relative z-10 drop-shadow-md bg-white/50" />
                        {!isGuest && <div className="absolute bottom-0 right-0 z-20 bg-emerald-500/90 text-white p-2.5 rounded-full shadow-lg"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg></div>}
                        <input type="file" ref={profFileRef} className="hidden" accept="image/*" onChange={(e)=>{ const r = new FileReader(); r.onload=(ev)=>{setUserData({...userData, avatar: ev.target.result}); showToast("Avatar changed");}; r.readAsDataURL(e.target.files[0]); }} />
                      </div>
                      <div className="flex-1 w-full space-y-4">
                        <div><label className="text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400 ml-2 mb-1 block">{t.name}</label><input disabled={isGuest} type="text" className="w-full glass-input p-4 rounded-[1.5rem] font-black text-lg disabled:opacity-50" value={userData.name} onChange={e=>setUserData({...userData, name: e.target.value})} /></div>
                        <div><label className="text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400 ml-2 mb-1 block">{t.farm_name}</label><input disabled={isGuest} type="text" className="w-full glass-input p-4 rounded-[1.5rem] font-black text-lg disabled:opacity-50" value={userData.farmName} onChange={e=>{
                            const newFarmName = e.target.value;
                            const updatedFarms = userFarms.map(f => f.name === userData.farmName ? {...f, name: newFarmName} : f);
                            setUserData({...userData, farmName: newFarmName, farms: updatedFarms});
                        }} /></div>
                      </div>
                   </div>

                   <div className="flex gap-4">
                     {!isGuest && <button onClick={handleSaveProfile} className="flex-1 bg-emerald-500/90 text-white py-4 rounded-[2rem] font-black shadow-lg hover:-translate-y-1 transition-transform border border-emerald-400/50">{t.save}</button>}
                     <button onClick={onLogout} className="flex-1 glass-card bg-red-500/10 text-red-600 dark:text-red-400 border-red-500/30 py-4 rounded-[2rem] font-black hover:bg-red-500/20">{t.logout}</button>
                   </div>

                   <div className="glass-panel p-6 md:p-8 rounded-[2.5rem] mt-8">
                      <h3 className="font-black text-lg mb-4 flex justify-between items-center">
                        Farms Managed 
                        <span className="text-[10px] font-bold bg-white/40 dark:bg-black/30 px-3 py-1.5 rounded-lg border border-white/30">{t.multi_farm}</span>
                      </h3>
                      <div className="space-y-3">
                         {userFarms.map(f => (
                           <div key={f.id} onClick={() => handleSwitchFarm(f)} className={`glass-card p-4 rounded-[1.5rem] flex items-center justify-between cursor-pointer transition-all hover:scale-[1.02] ${userData.farmName === f.name ? 'border-emerald-500/50 bg-emerald-500/10' : 'border-transparent dark:border-slate-700 hover:border-gray-300'}`}>
                              <span className="font-black">{f.name}</span>
                              {userData.farmName === f.name ? (
                                  <span className="text-[10px] text-emerald-600 font-black px-2 py-1 bg-white/50 dark:bg-black/50 rounded-lg shadow-sm border border-emerald-200 dark:border-emerald-800">ACTIVE</span>
                              ) : (
                                  <span className="text-[10px] text-gray-500 dark:text-gray-400 font-bold px-2 py-1 bg-white/30 dark:bg-black/30 rounded-lg border border-gray-200 dark:border-slate-700 hover:bg-white/50">SWITCH</span>
                              )}
                           </div>
                         ))}
                         
                         {isAddingFarm && !isGuest ? (
                             <div className="glass-card p-4 rounded-[1.5rem] flex gap-2 border-emerald-500/30">
                                 <input type="text" autoFocus placeholder="Enter farm name..." value={newFarmName} onChange={(e)=>setNewFarmName(e.target.value)} className="flex-1 bg-white/50 dark:bg-black/30 border border-white/40 dark:border-slate-700 rounded-xl px-3 py-2 text-sm font-bold outline-none focus:border-emerald-500" />
                                 <button onClick={handleAddFarm} className="bg-emerald-500 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-emerald-600">Add</button>
                                 <button onClick={()=>setIsAddingFarm(false)} className="bg-gray-400 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-gray-500">Cancel</button>
                             </div>
                         ) : !isGuest && (
                             <div onClick={()=>setIsAddingFarm(true)} className="glass-card p-4 rounded-[1.5rem] flex items-center justify-center border-dashed border-2 border-gray-300 dark:border-slate-700 cursor-pointer text-gray-500 dark:text-gray-400 hover:text-emerald-600 dark:hover:text-emerald-400 hover:border-emerald-400 font-black text-sm transition-colors">
                                + Add New Farm
                             </div>
                         )}
                      </div>
                   </div>
                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
